<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>


    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(0,0,0,0.4); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(0,0,0,0.9); border: 1px solid #ff3b30; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #ff3b30; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; color: #fff; margin-bottom: 30px; margin-top: -10px; }
        .auth-box { background: rgba(10,10,10,0.95); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,59,48,0.5); }
        .auth-btn { background: #ff3b30; color: white; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; box-shadow: 0 4px 15px rgba(255,59,48,0.3); }

        .home-lang-switch { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .home-lang-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .home-lang-btn.active { border-color: #ff3b30; color: white; background: #222; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 85px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #ff3b30; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(255,59,48,0.5); border: 2px solid white; }
        .location-btn img { filter: brightness(0) invert(1); width: 24px; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .settings-btn { position: absolute; top: 70px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .settings-btn img { width: 20px; filter: invert(1); }

        /* STIL ZA OGLAS FOOTER */
        #ad-ticker-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
            background: rgba(10,10,10,0.98); border-top: 3px solid #ffcc00; 
            z-index: 9999; display: none; align-items: center; padding: 0 15px; 
            color: white; backdrop-filter: blur(15px); transition: all 0.3s;
        }
        .ad-ticker-content { display: flex; align-items: center; gap: 12px; width: 100%; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ad-ticker-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #ffcc00; }
        .ad-ticker-text { flex: 1; overflow: hidden; }
        .ad-ticker-name { color: #ffcc00; font-family: 'Oswald'; font-size: 16px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ad-ticker-desc { font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.9; }

        .ad-choice-box { display: flex; flex-direction: column; gap: 8px; padding: 10px; width: 200px; }
        .ad-choice-item { background: #1a1a1a; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; cursor: pointer; }
        .ad-choice-item img { width: 28px; }
        .ad-choice-item span { font-size: 11px; font-weight: 900; color: #fff; }

        .img-upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 5px 0; }
        .img-slot { background: #111; border: 1px dashed #444; height: 55px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #444; overflow: hidden; cursor: pointer; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; }

        .ad-map-icon { background: #ffcc00; border: 2px solid #000; border-radius: 50%; padding: 5px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .ad-map-icon img { width: 20px; height: 20px; }

        /* OSTATAK STILOVA (ZADRŽANO) */
        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .marker-ball-only { font-size: 16px; filter: drop-shadow(0 0 5px #ffcc00); display: block; }
        .zoom-near .marker-ball-only { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 20px solid #ffcc00; display: none; z-index: 10; }
        .zoom-near .marker-pointer { display: block; }
        .status-live-wrapper .marker-pointer { border-top-color: #ff3b30; }
        .live-card-thin { background: rgba(10, 10, 10, 0.98); border: 2px solid #ffcc00; border-radius: 12px; padding: 10px 14px; display: none; flex-direction: column; width: max-content; min-width: 150px; color: white; backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.8); position: relative; overflow: hidden; z-index: 25; margin-bottom: -1px; }
        .card-bg-icon { position: absolute; right: -10px; bottom: -10px; font-size: 60px; opacity: 0.1; transform: rotate(-15deg); pointer-events: none; z-index: 0; }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border-color: #ff3b30; }
        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; position: relative; z-index: 1; margin-bottom: 3px; width: 100%; }
        .team-name-col { font-size: 15px; font-weight: 900; text-transform: uppercase; color: #fff; white-space: nowrap; }
        .score-val-col { font-family: 'Oswald'; font-size: 22px; color: #ffcc00; font-weight: 700; text-align: right; min-width: 30px; }
        .status-live-wrapper .score-val-col { color: #ff3b30; }
        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0a0a; z-index: 7000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">SRB</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container"><img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()"><input type="text" id="city-search" placeholder="Pretraži..." onkeypress="handleSearch(event)"></div>
        <div class="back-btn" onclick="goBackToLogin()">&#10006;</div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
        <div id="user-indicator"></div>
    </div>

    <div id="ad-ticker-footer" onclick="openAdLink()">
        <div id="ad-ticker-content" class="ad-ticker-content"></div>
    </div>

    <div id="lang-modal" onclick="toggleLangModal()">
        <div class="lang-box" onclick="event.stopPropagation()">
            <h3 style="color:white; margin-bottom:20px; font-family:'Oswald';" id="lang-title">JEZIK / LANGUAGE</h3>
            <button class="admin-btn" style="background:#1a1a1a; margin-bottom:10px; border: 1px solid #333;" onclick="setLanguage('sr')">SRPSKI</button>
            <button class="admin-btn" style="background:#1a1a1a; border: 1px solid #333;" onclick="setLanguage('en')">ENGLISH</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], allAds = [], rangeCircle = null, activeAd = null;
        let currentLang = localStorage.getItem('lang') || 'sr';
        let tempImgs = [null, null, null], adRotationIndex = 0, adRotationTimer = null;

        const translations = {
            sr: { subtitle: "Result Tracker", login: "ULAZ U SISTEM", explore: "ISTRAŽI MAPU", search: "Pretraži...", addCourt: "DODAJ TEREN", addAd: "DODAJ REKLAMU", adTitle: "NOVA REKLAMA", adName: "IME REKLAME", adDesc: "OPIS (DO 20 REČI)", adLink: "LINK (URL)", cafe: "KAFIĆ", resto: "RESTORAN", biz: "FIRMA", createAd: "KRENI", limitReached: "LIMIT DOSTIGNUT!", live: "UŽIVO", timeAt: "U" },
            en: { subtitle: "Result Tracker", login: "ENTER SYSTEM", explore: "EXPLORE MAP", search: "Search...", addCourt: "ADD COURT", addAd: "ADD AD", adTitle: "NEW AD", adName: "AD NAME", adDesc: "DESC (MAX 20 WORDS)", adLink: "LINK (URL)", cafe: "CAFE", resto: "RESTAURANT", biz: "BUSINESS", createAd: "CREATE", limitReached: "LIMIT REACHED!", live: "LIVE", timeAt: "AT" }
        };

        const adTypeIcons = { cafe: "https://cdn-icons-png.flaticon.com/512/2734/2734034.png", restoran: "https://cdn-icons-png.flaticon.com/512/3448/3448609.png", firma: "https://cdn-icons-png.flaticon.com/512/9322/9322127.png" };
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); updateUILanguage(); }
        function updateUILanguage() { const t = translations[currentLang]; document.getElementById('txt-subtitle').innerText = t.subtitle; document.getElementById('btn-login').innerText = t.login; document.getElementById('btn-explore').innerText = t.explore; document.getElementById('city-search').placeholder = t.search; }

        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); updateUILanguage(); }
        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); else updateUILanguage(); });

        function initMap() {
            if (map) return;
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: 'white', weight: 1, fillOpacity: 0.03, interactive: false }).addTo(map);

            map.on('move', () => { 
                let c = map.getCenter(); rangeCircle.setLatLng(c); 
                updateAdsInView(c);
            });
            map.on('moveend', () => { renderMarkers(); });
            map.on('click', handleMapClick);
            
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); renderMarkers(); });
            db.ref('oglasi').on('value', snap => { allAds = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allAds.push(d); }); renderMarkers(); updateAdsInView(map.getCenter()); });
            
            trackGPS();
            startAdRotation();
        }

        // ROTACIJA OGLASA
        function startAdRotation() {
            if(adRotationTimer) clearInterval(adRotationTimer);
            adRotationTimer = setInterval(() => {
                const visibleAds = getAdsNear(map.getCenter());
                if(visibleAds.length > 0) {
                    adRotationIndex = (adRotationIndex + 1) % visibleAds.length;
                    displayAd(visibleAds[adRotationIndex]);
                }
            }, 5000);
        }

        function getAdsNear(center) {
            return allAds.filter(ad => map.distance(center, [ad.lat, ad.lng]) <= 100000);
        }

        function updateAdsInView(center) {
            const near = getAdsNear(center);
            const bar = document.getElementById('ad-ticker-footer');
            if (near.length > 0) {
                bar.style.display = 'flex';
                if(!activeAd || !near.includes(activeAd)) displayAd(near[0]);
            } else {
                bar.style.display = 'none';
                activeAd = null;
            }
        }

        function displayAd(ad) {
            if(!ad) return;
            activeAd = ad;
            document.getElementById('ad-ticker-content').innerHTML = `
                <img src="${ad.imgs ? ad.imgs[0] : ''}" class="ad-ticker-img">
                <div class="ad-ticker-text">
                    <div class="ad-ticker-name">${ad.name}</div>
                    <div class="ad-ticker-desc">${ad.desc}</div>
                </div>`;
        }

        function openAdLink() { if(activeAd && activeAd.link) window.open(activeAd.link, '_blank'); }

        function renderMarkers() {
            if (!map) return;
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;

            // Render sport terena
            allTereni.forEach(d => {
                const isLive = d.status === 'live', isEnded = d.status === 'ended', isUpcoming = d.status === 'upcoming' && d.t1;
                const ball = sportEmojis[d.sport] || '⚽';
                let cardBody = "";
                if (isLive || isEnded || isUpcoming) {
                    let s1 = (isLive || isEnded) ? (d.score1 || 0) : "";
                    let s2 = (isLive || isEnded) ? (d.score2 || 0) : "";
                    cardBody = `<div class="live-card-thin"><div class="card-bg-icon">${ball}</div>${d.league ? `<div class="card-league-mini">${d.league}</div>` : ""}<div class="score-row"><span class="team-name-col">${d.t1}</span><span class="score-val-col">${s1}</span></div><div class="score-row"><span class="team-name-col">${d.t2}</span><span class="score-val-col">${s2}</span></div></div><div class="marker-pointer"></div>`;
                } else cardBody = `<div class="live-card-thin"><div style="font-size:12px; text-align:center; color:#fff; font-weight:bold;">${d.name}</div></div><div class="marker-pointer"></div>`;
                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div>${cardBody}</div></div>`;
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0] }) }).addTo(map).on('click', e => { L.DomEvent.stopPropagation(e); if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); });
            });

            // Render oglasa kao IKONICE
            allAds.forEach(ad => {
                const iconHtml = `<div class="ad-map-icon"><img src="${adTypeIcons[ad.type] || adTypeIcons.biz}"></div>`;
                L.marker([ad.lat, ad.lng], { icon: L.divIcon({ className: '', html: iconHtml, iconSize: [30,30], iconAnchor: [15,15] }) }).addTo(map).on('click', e => {
                    L.DomEvent.stopPropagation(e);
                    displayAd(ad); // Prikazuje oglas dole odmah
                });
            });
        }

        function handleMapClick(e) {
            if(!auth.currentUser) return;
            const t = translations[currentLang];
            const html = `
                <div class="ad-choice-box">
                    <button onclick="openTerenForm(${e.latlng.lat}, ${e.latlng.lng})" style="background:#ff3b30; color:white; border:none; padding:12px; font-weight:bold; border-radius:12px;">${t.addCourt}</button>
                    <button onclick="openAdMenu(${e.latlng.lat}, ${e.latlng.lng})" style="background:#ffcc00; color:black; border:none; padding:12px; font-weight:bold; border-radius:12px;">${t.addAd}</button>
                </div>`;
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
        }

        function openAdMenu(lat, lng) {
            const t = translations[currentLang];
            const html = `
                <div class="ad-choice-box">
                    <div class="ad-choice-item" onclick="openOglasForm(${lat}, ${lng}, 'cafe')"><img src="${adTypeIcons.cafe}"><span>${t.cafe}</span></div>
                    <div class="ad-choice-item" onclick="openOglasForm(${lat}, ${lng}, 'restoran')"><img src="${adTypeIcons.restoran}"><span>${t.resto}</span></div>
                    <div class="ad-choice-item" onclick="openOglasForm(${lat}, ${lng}, 'firma')"><img src="${adTypeIcons.firma}"><span>${t.biz}</span></div>
                </div>`;
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        function openOglasForm(lat, lng, type) {
            const t = translations[currentLang];
            tempImgs = [null, null, null];
            const html = `
                <div style="padding:10px; width:220px; display:flex; flex-direction:column; gap:8px;">
                    <h4 style="margin:0; text-align:center; color:#ffcc00; font-family:'Oswald';">${t.adTitle}</h4>
                    <input type="text" id="o_name" placeholder="${t.adName}">
                    <textarea id="o_desc" placeholder="${t.adDesc}" style="height:55px;"></textarea>
                    <input type="text" id="o_link" placeholder="${t.adLink}">
                    <div class="img-upload-grid">
                        <div class="img-slot" onclick="document.getElementById('f0').click()" id="s0">+<input type="file" id="f0" hidden accept="image/*" onchange="loadImg(event,0)"></div>
                        <div class="img-slot" onclick="document.getElementById('f1').click()" id="s1">+<input type="file" id="f1" hidden accept="image/*" onchange="loadImg(event,1)"></div>
                        <div class="img-slot" onclick="document.getElementById('f2').click()" id="s2">+<input type="file" id="f2" hidden accept="image/*" onchange="loadImg(event,2)"></div>
                    </div>
                    <button onclick="saveOglas(${lat}, ${lng}, '${type}')" style="background:#ffcc00; color:black; border:none; padding:10px; font-weight:bold; border-radius:12px;">${t.createAd}</button>
                </div>`;
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        function loadImg(e, i) {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = (ev) => { tempImgs[i] = ev.target.result; document.getElementById('s'+i).innerHTML = `<img src="${ev.target.result}">`; };
            r.readAsDataURL(file);
        }

        async function saveOglas(lat, lng, type) {
            const name = document.getElementById('o_name').value.toUpperCase();
            const desc = document.getElementById('o_desc').value;
            const link = document.getElementById('o_link').value;
            if(!name || !desc) return;
            await db.ref('oglasi').push({
                lat, lng, name, desc, link, type,
                imgs: tempImgs.filter(x => x !== null),
                owner: auth.currentUser.uid,
                ts: Date.now()
            });
            map.closePopup(); // Gubi se kartica
        }

        function trackGPS() { if(!navigator.geolocation) return; navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) { userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map); } else userMarker.setLatLng([currentLat, currentLon]); }, null, { enableHighAccuracy: true }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } } }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function handleSearch(e) { if(e.key === "Enter") { fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) { map.flyTo([data[0].lat, data[0].lon], 15); toggleSearch(); } }); } }

        function openTerenForm(lat, lng) {
            const t = translations[currentLang];
            const html = `<div style="padding:10px;"><select id="p_sport"><option value="FUDBAL">FUDBAL</option><option value="KOŠARKA">KOŠARKA</option><option value="ODBOJKA">ODBOJKA</option><option value="TENIS">TENIS</option><option value="RUKOMET">RUKOMET</option></select><input type="text" id="p_name" placeholder="${t.courtName}" maxlength="15" style="margin:10px 0; width:100%;"><button onclick="saveTeren(${lat}, ${lng})" style="width:100%; background:#ff3b30; color:white; border:none; padding:10px; font-weight:bold; border-radius:12px;">${t.create}</button></div>`; 
            map.closePopup();
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        async function saveTeren(lat, lng) { 
            const n = document.getElementById('p_name').value.toUpperCase();
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0 }); 
            map.closePopup(); 
        }
    </script>
</body>
</html>
