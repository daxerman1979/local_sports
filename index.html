<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Pro Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        :root {
            --primary-yellow: #FFD700;
            --accent-orange: #FF8C00;
            --dark-black: #0A0A0A;
            --surface-gray: #1A1A1A;
            --text-light: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--dark-black); font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: #222; color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); }

        /* --- Search & UI --- */
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid var(--primary-yellow); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(0,0,0,0.95); }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        /* --- Hero --- */
        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: var(--primary-yellow); text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; color: #fff; margin-bottom: 30px; margin-top: -10px; }
        .auth-box { background: rgba(20,20,20,0.95); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--accent-orange); }
        .auth-btn { background: linear-gradient(45deg, var(--primary-yellow), var(--accent-orange)); color: black; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        
        /* --- Map Markers & Cards --- */
        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .marker-ball-only { font-size: 18px; filter: drop-shadow(0 0 5px var(--primary-yellow)); display: block; }
        .zoom-near .marker-ball-only { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 20px solid var(--primary-yellow); display: none; z-index: 10; }
        .zoom-near .marker-pointer { display: block; }
        .status-live-wrapper .marker-pointer { border-top-color: var(--accent-orange); }

        .live-card-thin { 
            background: rgba(10, 10, 10, 0.95); border: 2px solid var(--primary-yellow); border-radius: 12px; padding: 10px 14px; display: none; flex-direction: column; width: max-content; min-width: 160px; color: white; backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.8); position: relative; z-index: 25; margin-bottom: -1px;
        }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border-color: var(--accent-orange); }

        /* --- Admin & Details View --- */
        #match-details-view, #admin-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: var(--dark-black); z-index: 8000; border-top: 4px solid var(--primary-yellow); border-radius: 30px 30px 0 0; padding: 25px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto; color: white; 
        }
        #match-details-view.active, #admin-panel.active { bottom: 0; left: 0; }
        
        .details-main-box { background: var(--surface-gray); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .details-score-line { font-family: 'Oswald'; font-size: 50px; color: var(--primary-yellow); line-height: 1; margin: 5px 0; display: flex; align-items: center; gap: 15px; }

        /* --- Panel za brisanje (Novi zahtev) --- */
        .admin-events-list {
            margin: 15px 0;
            background: #111;
            border-radius: 12px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .admin-event-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #222;
        }
        .admin-event-row:last-child { border-bottom: none; }
        .event-del-btn { color: #ff3b30; cursor: pointer; padding: 5px; font-size: 18px; }

        /* --- UI Elements --- */
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: black; background: var(--primary-yellow); text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: var(--primary-yellow); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 2px solid black; }
        .location-btn img { width: 24px; }
        
        .user-location-dot { background: #007AFF; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 20px #007AFF; }
        .score-val-col { font-family: 'Oswald'; font-size: 22px; color: var(--primary-yellow); font-weight: 700; text-align: right; min-width: 30px; }
        .status-live-wrapper .score-val-col { color: var(--accent-orange); }
        
        .animated-range-circle { animation: pulse-circle 4s infinite ease-in-out; }
        @keyframes pulse-circle { 0% { stroke-opacity: 0.8; stroke-width: 1px; } 50% { stroke-opacity: 0.3; stroke-width: 2.5px; } 100% { stroke-opacity: 0.8; stroke-width: 1px; } }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 15px;">
                <div id="h-lang-sr" onclick="setLanguage('sr')" style="cursor:pointer; font-weight:900;">SRB</div>
                <div id="h-lang-en" onclick="setLanguage('en')" style="cursor:pointer; font-weight:900;">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container"><img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()"><input type="text" id="city-search" placeholder="Pretraži..." onkeypress="handleSearch(event)"></div>
        <div onclick="goBackToLogin()" style="position: absolute; top: 20px; right: 20px; z-index: 5500; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; color:white; border:1px solid #444;">&#10006;</div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
    </div>

    <div id="match-details-view">
        <div style="text-align: center; margin-bottom: 20px; position: relative;">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:-10px; font-size:35px; color:var(--primary-yellow); cursor:pointer;">&times;</div>
            <span id="det-league" style="color:var(--primary-yellow); font-weight:900; font-size:12px; letter-spacing:2px; text-transform:uppercase;"></span>
        </div>
        <div class="details-main-box">
            <div id="det-t1" style="font-size: 22px; font-weight: 900;"></div>
            <div id="det-score" class="details-score-line"></div>
            <div id="det-t2" style="font-size: 22px; font-weight: 900;"></div>
            <div id="det-extra-info" style="color:var(--primary-yellow); font-weight:800;"></div>
        </div>
        <div id="det-periods" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        <div id="det-stats-container" style="display:none; margin-top:20px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div id="det-events-home" style="display:flex; flex-direction:column; gap:5px;"></div>
                <div id="det-events-away" style="display:flex; flex-direction:column; gap:5px; text-align:right;"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:var(--primary-yellow);">ADMIN</div>
            <div onclick="closeAdmin()" style="font-size:40px; color:white; cursor:pointer;">&times;</div>
        </div>
        
        <div id="adm-score-view" style="display:none; flex-direction:column;">
            <div style="background:var(--surface-gray); border:1px solid var(--primary-yellow); border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:var(--primary-yellow);">0 : 0</div>
                <div id="adm-sub-display" style="color:var(--accent-orange); font-weight:900;"></div>
            </div>
            
            <div id="adm-sport-controls"></div>
            
            <div id="adm-events-manager" class="admin-events-list"></div>

            <button class="admin-btn" style="background:#444; color:white;" onclick="triggerLogic('period')" id="btn-save-period">SAČUVAJ PERIOD</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF; color:white;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#ff3b30; color:white; display:none;" onclick="triggerLogic('end')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:var(--accent-orange); display:none;" onclick="resetMatch()">RESET</button>
        </div>

        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LIGA">
            <input type="text" id="adm-t1" placeholder="TIM 1">
            <input type="text" id="adm-t2" placeholder="TIM 2">
            <input type="datetime-local" id="adm-time">
            <button class="admin-btn" onclick="setupMatch()" id="btn-schedule">ZAKAŽI MEČ</button>
        </div>
        <button style="background:none; border:none; color:#555; margin-top:20px; font-weight:bold;" onclick="adminDelete()">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], rangeCircle = null;
        let currentLang = localStorage.getItem('lang') || 'sr';
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        const translations = {
            sr: { subtitle: "Result Tracker", live: "UŽIVO", goal: "GOL", yellow: "ŽUTI", red: "CRVENI", player: "IGRAČ", confirmDelete: "OBRISATI?" },
            en: { subtitle: "Result Tracker", live: "LIVE", goal: "GOAL", yellow: "YELLOW", red: "RED", player: "PLAYER", confirmDelete: "DELETE?" }
        };

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); location.reload(); }
        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); }
        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); });

        function initMap() {
            if (map) return;
            // Zapamćena lokacija korisnika (iz guidelines-a)
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            map.on('moveend', () => { 
                let c = map.getCenter(); 
                localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); 
                renderMarkers(); 
            });
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); renderMarkers(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;

            allTereni.forEach(d => {
                const isLive = d.status === 'live';
                const ball = sportEmojis[d.sport] || '⚽';
                let cardHtml = `<div class="live-card-thin">${d.t1 || d.name} vs ${d.t2 || ''}<br><span style="color:var(--primary-yellow); font-family:Oswald;">${d.score1||0}:${d.score2||0}</span></div>`;
                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div>${cardHtml}<div class="marker-pointer"></div></div></div>`;
                
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0] }) }).addTo(map).on('click', e => { 
                    L.DomEvent.stopPropagation(e); 
                    if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); 
                });
            });
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }

        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('adm-name').innerText = d.name;
            document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            
            const ctrl = document.getElementById('adm-sport-controls');
            ctrl.innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                    <button class="admin-btn" style="background:#28a745; color:white;" onclick="proScore(1,1)">+ TIM A</button>
                    <button class="admin-btn" style="background:#28a745; color:white;" onclick="proScore(2,1)">+ TIM B</button>
                </div>
            `;

            if(d.sport === "FUDBAL") {
                ctrl.innerHTML += `
                    <div style="background:#222; padding:15px; border-radius:12px;">
                        <input type="text" id="event-player" placeholder="IME IGRAČA" style="margin-bottom:8px;">
                        <select id="event-team" style="margin-bottom:8px;"><option value="1">${d.t1}</option><option value="2">${d.t2}</option></select>
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                            <button onclick="addEvent('⚽')" class="admin-btn">GOL</button>
                            <button onclick="addEvent('🟨')" class="admin-btn" style="background:#C0A000;">ŽUTI</button>
                            <button onclick="addEvent('🟥')" class="admin-btn" style="background:#A00000;">CRVENI</button>
                        </div>
                    </div>
                `;
            }

            // PANEL SA KORPICOM ZA BRISANJE
            const evMgr = document.getElementById('adm-events-manager');
            evMgr.innerHTML = "";
            if(d.events) {
                Object.keys(d.events).forEach(ekey => {
                    const ev = d.events[ekey];
                    const row = document.createElement('div');
                    row.className = 'admin-event-row';
                    row.innerHTML = `
                        <span>${ev.emoji} ${ev.player} (${ev.team == 1 ? 'T1' : 'T2'})</span>
                        <i class="fas fa-trash-alt event-del-btn" onclick="removeEvent('${ekey}')"></i>
                    `;
                    evMgr.appendChild(row);
                });
            }

            if(d.t1) { document.getElementById('adm-score-view').style.display = 'flex'; document.getElementById('match-setup').style.display = 'none'; } 
            else { document.getElementById('adm-score-view').style.display = 'none'; document.getElementById('match-setup').style.display = 'flex'; }
            
            document.getElementById('end-match-btn').style.display = d.status==='live' ? 'block' : 'none';
        }

        // --- Logika ---
        function proScore(team, sign) { db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (allTereni.find(x=>x.key===currentAdminKey)[`score${team}`] || 0) + sign) }); }
        function addEvent(emoji) { const p = document.getElementById('event-player').value.toUpperCase(), t = document.getElementById('event-team').value; if(!p) return; db.ref(`tereni/${currentAdminKey}/events`).push({ player: p, team: t, emoji: emoji }); document.getElementById('event-player').value = ""; }
        function removeEvent(ekey) { if(confirm(translations[currentLang].confirmDelete)) db.ref(`tereni/${currentAdminKey}/events/${ekey}`).remove(); }
        function setupMatch() { const l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value; db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0 }); }
        function triggerLogic(type) { if(type === 'end') db.ref(`tereni/${currentAdminKey}`).update({ status: 'ended' }); }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm("OBRIŠI TEREN?")) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        function handleMapClick(e) { if(!auth.currentUser) return; openTerenForm(e.latlng.lat, e.latlng.lng); }
        function openTerenForm(lat, lng) { let n = prompt("NAZIV TERENA:"); if(n) saveTeren(lat, lng, n); }
        async function saveTeren(lat, lng, n) { await db.ref('tereni').push({ name: n.toUpperCase(), lat, lng, owner: auth.currentUser.uid, sport: 'FUDBAL', status: 'upcoming', score1: 0, score2: 0 }); }
        function trackGPS() { navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot' }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function handleSearch(e) { if(e.key === "Enter") { fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) map.flyTo([data[0].lat, data[0].lon], 15); }); } }
        async function handleAuth() { let e = document.getElementById('email').value, p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { await auth.createUserWithEmailAndPassword(e, p); } }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function openDetails(key) { 
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('det-league').innerText = d.league || "LOKALNI MEČ";
            document.getElementById('det-t1').innerText = d.t1 || d.name;
            document.getElementById('det-t2').innerText = d.t2 || "";
            document.getElementById('det-score').innerText = `${d.score1||0} : ${d.score2||0}`;
            document.getElementById('match-details-view').classList.add('active');
        }
    </script>
</body>
</html>
