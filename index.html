<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; 
            text-transform: uppercase; 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(18, 16, 14, 0.6); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid rgba(255,149,0,0.3); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(10,8,5,0.95); border: 1px solid #FF9500; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,14,0.5), rgba(18,16,14,0.9)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #FF9500; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; color: #fff; margin-bottom: 30px; margin-top: -10px; }
        .auth-box { background: rgba(18,16,14,0.95); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,149,0,0.4); }
        .auth-btn { background: #FF9500; color: white; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; box-shadow: 0 4px 15px rgba(255,149,0,0.3); }

        .home-lang-switch { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .home-lang-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .home-lang-btn.active { border-color: #FF9500; color: white; background: #222; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #FF9500; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(255,149,0,0.4); border: 2px solid white; }
        .location-btn img { filter: brightness(0) invert(1); width: 24px; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .back-btn img { width: 18px; filter: invert(1); }
        .settings-btn { position: absolute; top: 70px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .settings-btn img { width: 20px; filter: invert(1); }

        .leaflet-popup-content-wrapper { background: rgba(18, 16, 14, 0.95) !important; color: white !important; border: 1px solid #FF9500 !important; border-radius: 20px !important; backdrop-filter: blur(10px); }
        .leaflet-popup-content { margin: 15px !important; width: 220px !important; }

        #disclaimer-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .disclaimer-box { background: #12100e; padding: 30px; border-radius: 30px; border: 1px solid #FF9500; width: 100%; max-width: 400px; text-align: center; color: white; }
        
        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-ball-only { font-size: 16px; filter: drop-shadow(0 0 2px black); position: relative; z-index: 5; }
        .ball-halo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, rgba(255,149,0,0.6) 0%, rgba(255,149,0,0) 70%); z-index: 4; animation: halo-pulse 2s infinite ease-in-out; }

        @keyframes halo-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .live-card-thin { 
            background: rgba(22, 18, 15, 0.98); border: 2px solid #FFCC00; border-radius: 12px; padding: 10px 14px; 
            display: none; flex-direction: column; width: max-content; min-width: 180px; color: white; 
            backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.8); position: relative; z-index: 25;
        }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border-color: #FF9500; }

        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 4px; }
        .score-val-col { font-family: 'Oswald'; font-size: 20px; color: #FFCC00; font-weight: 700; }
        .status-live-wrapper .score-val-col { color: #FF9500; }

        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #12100e; z-index: 8000; border-top: 3px solid #FF9500; border-radius: 30px 30px 0 0; padding: 20px; transition: 0.5s; overflow-y: auto; color: white; }
        #match-details-view.active { bottom: 0; }
        
        .details-score-line { font-family: 'Oswald'; font-size: 50px; color: #FF9500; display: flex; align-items: center; gap: 15px; justify-content: center; }
        .detail-period-tag { background: #0a0a0a; padding: 8px 12px; border-radius: 10px; font-size: 12px; border-bottom: 3px solid #FFCC00; color: white; margin: 5px; flex: 1; text-align: center; }

        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #12100e; z-index: 7000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }
        
        .user-location-dot { background: #007AFF; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 20px #007AFF; }
    </style>
</head>
<body>

    <div id="disclaimer-modal">
        <div class="disclaimer-box">
            <h2 id="disclaimer-h2">NAPOMENA</h2>
            <p id="disclaimer-text">Sav sadržaj je nezvaničnog karaktera. Sajt služi isključivo u svrhe zabave.</p>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px; text-align:left;">
                <input type="checkbox" id="disclaimer-check" style="width:25px;">
                <label for="disclaimer-check" id="disclaimer-label">Prihvatam uslove.</label>
            </div>
            <button class="auth-btn" style="width:100%;" onclick="acceptDisclaimer()" id="disclaimer-btn">NASTAVI</button>
        </div>
    </div>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">SRB</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()">
            <input type="text" id="city-search" placeholder="Pretraži..." onkeydown="handleSearch(event)">
        </div>
        <div class="back-btn" onclick="goBackToLogin()">
            <span id="back-x">&#10006;</span>
        </div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
    </div>

    <div id="match-details-view">
        <div class="details-header" style="text-align:center;">
            <div onclick="closeDetails()" style="float:right; font-size:35px; color:#FF9500; cursor:pointer;">&times;</div>
            <span id="det-league" style="color:#FF9500; font-weight:900; display:block;"></span>
        </div>
        <div style="background:#1c1916; border-radius:20px; padding:20px; text-align:center; margin-top:10px;">
            <div id="det-t1" style="font-size:22px; font-weight:900;"></div>
            <div id="det-score" class="details-score-line"></div>
            <div id="det-t2" style="font-size:22px; font-weight:900;"></div>
        </div>
        <div id="det-periods" style="display:flex; overflow-x:auto; margin-top:20px;"></div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#fff;">ADMIN</div>
            <div onclick="closeAdmin()" style="font-size:40px; color:#FF9500; cursor:pointer;">&times;</div>
        </div>
        
        <div id="adm-score-view" style="display:none;">
            <div style="background:#1c1916; border:1px solid #FF9500; border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#FF9500;">0 : 0</div>
            </div>
            
            <div id="adm-sport-controls"></div>
            
            <div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333;">
                <label style="font-size:10px; color:#777;">IZABERI PERIOD:</label>
                <select id="adm-period-dropdown" style="margin-bottom:10px;"></select>
                <button class="admin-btn" style="background:#444;" onclick="savePeriodData()">SAČUVAJ PERIOD I REZULTAT</button>
            </div>

            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#FF9500;" onclick="adminStatus('ended')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#555;" onclick="resetMatch()">RESET MEČA</button>
        </div>

        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LIGA">
            <input type="text" id="adm-t1" placeholder="TIM 1">
            <input type="text" id="adm-t2" placeholder="TIM 2">
            <button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()">ZAKAŽI MEČ</button>
        </div>
        
        <button style="background:none; border:none; color:#ff4444; margin-top:auto; padding:20px;" onclick="adminDelete()">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [];
        let currentLang = localStorage.getItem('lang') || 'sr';
        
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾", "OSTALO": "🏆" };
        const periodsConfig = {
            FUDBAL: ["1. Poluvreme", "2. Poluvreme", "Produžeci", "Penali"],
            KOŠARKA: ["1. Četvrtina", "2. Četvrtina", "3. Četvrtina", "4. Četvrtina", "Produžetak"],
            ODBOJKA: ["1. Set", "2. Set", "3. Set", "4. Set", "5. Set"],
            TENIS: ["1. Set", "2. Set", "3. Set"],
            RUKOMET: ["1. Poluvreme", "2. Poluvreme", "Produžeci"]
        };

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); location.reload(); }

        function exploreMap() { 
            document.getElementById('hero').style.display = 'none'; 
            document.getElementById('map').style.display = 'block'; 
            document.getElementById('ui-controls').style.display = 'block'; 
            initMap(); 
        }

        function goBackToLogin() { auth.signOut(); location.reload(); }

        function initMap() {
            if (map) return;
            const sLat = parseFloat(localStorage.getItem('lastLat')) || 44.7866;
            const sLng = parseFloat(localStorage.getItem('lastLng')) || 20.4489;
            map = L.map('map', { zoomControl: false }).setView([sLat, sLng], 13);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            
            map.on('moveend', () => {
                let c = map.getCenter();
                localStorage.setItem('lastLat', c.lat);
                localStorage.setItem('lastLng', c.lng);
            });

            map.on('click', e => {
                if (!auth.currentUser) return;
                openTerenForm(e.latlng.lat, e.latlng.lng);
            });

            db.ref('tereni').on('value', snap => {
                allTereni = [];
                snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); });
                renderMarkers();
                if(currentAdminKey) refreshAdminPanel(currentAdminKey);
            });
            trackGPS();
        }

        function renderMarkers() {
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            allTereni.forEach(d => {
                const isLive = d.status === 'live';
                const ball = sportEmojis[d.sport] || '⚽';
                const html = `
                    <div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${map.getZoom()>14?'zoom-near':''}">
                        <div class="marker-content-box">
                            <div class="ball-halo"></div>
                            <div class="marker-ball-only">${ball}</div>
                            <div class="live-card-thin">
                                <div style="font-size:9px; color:#FF9500; font-weight:900;">${d.league || d.sport}</div>
                                <div class="score-row"><span>${d.t1 || d.name}</span><span class="score-val-col">${d.score1||0}</span></div>
                                <div class="score-row"><span>${d.t2 || ''}</span><span class="score-val-col">${d.score2||0}</span></div>
                            </div>
                        </div>
                    </div>`;
                
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconAnchor:[0,0] }) }).addTo(map).on('click', e => {
                    L.DomEvent.stopPropagation(e);
                    if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key);
                });
            });
        }

        function openTerenForm(lat, lng) {
            const html = `
            <div style="display:flex; flex-direction:column; gap:10px;">
                <select id="p_sport">
                    <option value="FUDBAL">FUDBAL</option>
                    <option value="KOŠARKA">KOŠARKA</option>
                    <option value="RUKOMET">RUKOMET</option>
                    <option value="ODBOJKA">ODBOJKA</option>
                    <option value="TENIS">TENIS</option>
                </select>
                <input type="text" id="p_name" placeholder="NAZIV TERENA">
                <button onclick="saveTeren(${lat}, ${lng})" style="background:#FF9500; color:white; border:none; padding:10px; border-radius:8px;">KRENI</button>
            </div>`;
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        async function saveTeren(lat, lng) {
            const n = document.getElementById('p_name').value.toUpperCase();
            const s = document.getElementById('p_sport').value;
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: s, status: 'upcoming', score1: 0, score2: 0 });
            map.closePopup();
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }

        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('adm-name').innerText = d.name;
            document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            
            const ctrl = document.getElementById('adm-sport-controls');
            ctrl.innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div style="text-align:center;">
                        <div style="font-size:11px; color:#aaa; margin-bottom:5px;">${d.t1 || 'TIM 1'}</div>
                        <button class="admin-btn" style="background:#28a745;" onclick="changeScore(1, 1)">+</button>
                        <button class="admin-btn" style="background:#444;" onclick="changeScore(1, -1)">-</button>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:11px; color:#aaa; margin-bottom:5px;">${d.t2 || 'TIM 2'}</div>
                        <button class="admin-btn" style="background:#28a745;" onclick="changeScore(2, 1)">+</button>
                        <button class="admin-btn" style="background:#444;" onclick="changeScore(2, -1)">-</button>
                    </div>
                </div>`;

            // Popunjavanje perioda
            const drop = document.getElementById('adm-period-dropdown');
            drop.innerHTML = "";
            const availablePeriods = periodsConfig[d.sport] || [];
            const usedPeriods = d.sub_details ? Object.values(d.sub_details).map(v => v.split(' ')[0]) : [];

            availablePeriods.forEach(p => {
                if(!usedPeriods.includes(p.toUpperCase())) {
                    let opt = document.createElement('option');
                    opt.value = p.toUpperCase();
                    opt.innerText = p;
                    drop.appendChild(opt);
                }
            });

            if(d.t1) {
                document.getElementById('adm-score-view').style.display = 'block';
                document.getElementById('match-setup').style.display = 'none';
            } else {
                document.getElementById('adm-score-view').style.display = 'none';
                document.getElementById('match-setup').style.display = 'flex';
            }
        }

        function changeScore(team, val) {
            const d = allTereni.find(x => x.key === currentAdminKey);
            db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`] || 0) + val) });
        }

        function savePeriodData() {
            const d = allTereni.find(x => x.key === currentAdminKey);
            const pName = document.getElementById('adm-period-dropdown').value;
            if(!pName) return;

            let sub = d.sub_details || {};
            const key = "P" + Object.keys(sub).length;
            sub[key] = `${pName} ${d.score1}:${d.score2}`;

            db.ref(`tereni/${currentAdminKey}`).update({ 
                sub_details: sub,
                score1: 0,
                score2: 0 
            });
        }

        function setupMatch() {
            const l = document.getElementById('adm-league-input').value.toUpperCase();
            const t1 = document.getElementById('adm-t1').value.toUpperCase();
            const t2 = document.getElementById('adm-t2').value.toUpperCase();
            db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, status: 'upcoming' });
        }

        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm("OBRISATI?")) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        function resetMatch() { db.ref(`tereni/${currentAdminKey}`).update({ t1:null, t2:null, score1:0, score2:0, sub_details:null, status:'upcoming' }); }

        function openDetails(key) {
            const d = allTereni.find(x => x.key === key);
            document.getElementById('det-league').innerText = d.league || d.sport;
            document.getElementById('det-t1').innerText = d.t1 || d.name;
            document.getElementById('det-t2').innerText = d.t2 || "";
            document.getElementById('det-score').innerText = `${d.score1||0} : ${d.score2||0}`;
            
            const pDiv = document.getElementById('det-periods');
            pDiv.innerHTML = "";
            if(d.sub_details) Object.values(d.sub_details).forEach(v => {
                pDiv.innerHTML += `<div class="detail-period-tag">${v}</div>`;
            });
            document.getElementById('match-details-view').classList.add('active');
        }

        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }

        function trackGPS() {
            navigator.geolocation.watchPosition(pos => {
                currentLat = pos.coords.latitude;
                currentLon = pos.coords.longitude;
                if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map);
                else userMarker.setLatLng([currentLat, currentLon]);
            }, null, { enableHighAccuracy: true });
        }

        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 17); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function handleSearch(e) { 
            if(e.key === "Enter") {
                const q = e.target.value;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
                .then(r => r.json()).then(data => { if(data[0]) map.flyTo([data[0].lat, data[0].lon], 15); });
            }
        }

        async function handleAuth() {
            const e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } }
        }

        function acceptDisclaimer() {
            if(document.getElementById('disclaimer-check').checked) document.getElementById('disclaimer-modal').style.display = 'none';
        }

        auth.onAuthStateChanged(user => { if(user) exploreMap(); });
    </script>
</body>
</html>
