        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); updateUILanguage(); if(document.getElementById('lang-modal').style.display === 'flex') toggleLangModal(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); }
        function updateUILanguage() { const t = translations[currentLang]; document.getElementById('txt-subtitle').innerText = t.subtitle; document.getElementById('btn-login').innerText = t.login; document.getElementById('btn-explore').innerText = t.explore; document.getElementById('city-search').placeholder = t.search; document.getElementById('txt-period-res').innerText = t.periodRes; document.getElementById('txt-match-events').innerText = t.matchEvents; document.getElementById('adm-name').innerText = t.adminTitle; document.getElementById('btn-save-period').innerText = t.savePeriod; document.getElementById('start-live-btn').innerText = t.goLive; document.getElementById('end-match-btn').innerText = t.endMatch; document.getElementById('reset-match-btn').innerText = t.resetMatch; document.getElementById('btn-schedule').innerText = t.schedule; document.getElementById('btn-delete-court').innerText = t.deleteCourt; document.getElementById('adm-league-input').placeholder = t.league; document.getElementById('adm-t1').placeholder = t.team1; document.getElementById('adm-t2').placeholder = t.team2; document.getElementById('h-lang-sr').classList.toggle('active', currentLang === 'sr'); document.getElementById('h-lang-en').classList.toggle('active', currentLang === 'en'); if(auth.currentUser) { document.getElementById('user-display').style.display = 'flex'; document.getElementById('login-trigger').innerText = 'LOGOUT'; document.getElementById('user-email-text').innerText = auth.currentUser.email.split('@')[0].toUpperCase(); } else { document.getElementById('user-display').style.display = 'none'; document.getElementById('login-trigger').innerText = 'LOGIN'; } }
        function toggleLangModal() { let m = document.getElementById('lang-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); updateUILanguage(); loadSuggestions(); }
        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); else updateUILanguage(); });
        function loadSuggestions() { db.ref('suggestions/leagues').on('value', snap => { let dl = document.getElementById('league-list'); dl.innerHTML = ""; snap.forEach(s => dl.innerHTML += `<option value="${s.val()}">`); }); db.ref('suggestions/teams').on('value', snap => { let dl = document.getElementById('team-list'); dl.innerHTML = ""; snap.forEach(s => dl.innerHTML += `<option value="${s.val()}">`); }); }
        function saveSuggestion(type, value) { if(!value) return; const ref = db.ref(`suggestions/${type}`); ref.once('value', snap => { let ex = false; snap.forEach(s => { if(s.val() === value) ex = true; }); if(!ex) ref.push(value); }); }

        function initMap() {
            if (map) return;
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: 'white', weight: 1, fillOpacity: 0.03, interactive: false, className: 'animated-range-circle' }).addTo(map);
            map.on('move', () => { if(rangeCircle) rangeCircle.setLatLng(map.getCenter()); });
            map.on('moveend', () => { let c = map.getCenter(); localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); renderMarkers(); });
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; const now = Date.now(); snap.forEach(c => { let d = c.val(); if(!d.createdAt || (now - d.createdAt < 86400000)) { d.key = c.key; allTereni.push(d); } }); renderMarkers(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;
            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 30000) return;
                const isLive = d.status === 'live', isEnded = d.status === 'ended', isUpcoming = d.status === 'upcoming' && d.t1;
                const ball = sportEmojis[d.sport] || '⚽';
                
                let cardHtml = "";
                if (isLive || isEnded || isUpcoming) {
                    let s1 = (isLive || isEnded) ? (d.score1 || 0) : "-";
                    let s2 = (isLive || isEnded) ? (d.score2 || 0) : "-";
                    let statusTxt = isLive ? `<div class="blink-live"><span></span>${translations[currentLang].live}</div>` : (d.match_time ? new Date(d.match_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : "");
                    
                    cardHtml = `
                        <div class="live-card-thin">
                            <div class="card-header-mini">
                                <span>${d.league || translations[currentLang].localMatch}</span>
                                ${statusTxt}
                            </div>
                            <div class="card-row">
                                <span class="team-name-col">${d.t1 || "TIM 1"}</span>
                                <span class="score-val-col">${s1}</span>
                            </div>
                            <div class="card-row">
                                <span class="team-name-col">${d.t2 || "TIM 2"}</span>
                                <span class="score-val-col">${s2}</span>
                            </div>
                            ${(d.sport === "TENIS" || d.sport === "ODBOJKA") && (d.p1 !== undefined || d.g1 !== undefined) ? `<div class="card-footer">${d.sport === "ODBOJKA" ? d.p1+":"+d.p2 : d.g1+":"+d.g2}</div>` : ""}
                        </div>
                        <div class="marker-pointer"></div>`;
                } else {
                    cardHtml = `<div class="live-card-thin" style="text-align:center; padding:8px 5px;"><div style="font-weight:900; font-size:11px;">${d.name}</div><div style="font-size:8px; opacity:0.6; margin-top:2px;">${ball} ${d.sport}</div></div><div class="marker-pointer"></div>`;
                }

                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div>${cardHtml}</div></div>`;
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0], iconAnchor: [0, 0] }) }).addTo(map).on('click', e => { L.DomEvent.stopPropagation(e); if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); });
            });
        }

        async function saveTeren(lat, lng) { 
            const n = document.getElementById('p_name').value.toUpperCase();
            const myActiveCourts = allTereni.filter(t => t.owner === auth.currentUser.uid);
            if (myActiveCourts.length >= 3) { alert(translations[currentLang].limitReached); return; }
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0, createdAt: firebase.database.ServerValue.TIMESTAMP }); 
            map.closePopup(); 
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const t = translations[currentLang]; 
            const isTooClose = allTereni.some(court => L.latLng(court.lat, court.lng).distanceTo(e.latlng) < 200);
            if (isTooClose) { alert(t.zoneOccupied); return; } 
            const html = `<div style="padding:10px;"><select id="p_sport"><option value="FUDBAL">FUDBAL</option><option value="KOŠARKA">KOŠARKA</option><option value="ODBOJKA">ODBOJKA</option><option value="TENIS">TENIS</option><option value="RUKOMET">RUKOMET</option></select><input type="text" id="p_name" placeholder="${t.courtName}" maxlength="15" style="margin:10px 0; width:100%;"><button onclick="saveTeren(${e.latlng.lat}, ${e.latlng.lng})" style="width:100%; background:#ff5722; color:white; border:none; padding:12px; font-weight:bold; border-radius:12px; font-family:'Oswald';">${t.create}</button></div>`; 
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map); 
        }

        function openDetails(key) { 
            const d = allTereni.find(x => x.key === key); if(!d) return; 
            const t = translations[currentLang]; 
            
            document.getElementById('det-league').innerText = d.league || t.localMatch; 
            document.getElementById('det-t1').innerText = d.t1 || t.team1; 
            document.getElementById('det-t2').innerText = d.t2 || t.team2; 
            document.getElementById('det-score-main').innerText = `${d.score1||0} : ${d.score2||0}`; 
            
            let ex = ""; 
            if(d.sport === "ODBOJKA") ex = `${d.p1||0} : ${d.p2||0}`; 
            if(d.sport === "TENIS") { 
                const pts1 = (d.g1===6&&d.g2===6)?(d.p1||0):(tennisPoints[d.p1]||"0"); 
                const pts2 = (d.g1===6&&d.g2===6)?(d.p2||0):(tennisPoints[d.p2]||"0"); 
                ex = `${d.g1||0}:${d.g2||0} (${pts1}:${pts2})`; 
            } 
            document.getElementById('det-extra-info').innerText = ex;

            let pDiv = document.getElementById('det-periods'); pDiv.innerHTML = ""; 
            if(d.sub_details) Object.values(d.sub_details).forEach(v => pDiv.innerHTML += `<div class="period-badge">${v}</div>`); 
            
            let eHome = document.getElementById('det-events-home'), eAway = document.getElementById('det-events-away'); 
            eHome.innerHTML = ""; eAway.innerHTML = ""; 
            if(d.events) { 
                document.getElementById('det-stats-container').style.display = 'block'; 
                Object.values(d.events).forEach(ev => { 
                    let item = `<div class="ev-item"><span class="ev-icon">${ev.emoji}</span><span>${ev.player}</span></div>`; 
                    if(ev.team == 1) eHome.innerHTML += item; else eAway.innerHTML += item; 
                }); 
            } else document.getElementById('det-stats-container').style.display = 'none'; 
            
            document.getElementById('match-details-view').classList.add('active'); 
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }
        
        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return; const t = translations[currentLang];
            document.getElementById('adm-name').innerText = d.name; 
            document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            let subS = d.sub_details ? Object.values(d.sub_details).join(' | ') : ""; 
            if(d.sport === "ODBOJKA") subS = t.points + `: ${d.p1 || 0}:${d.p2 || 0} | ` + subS; 
            if(d.sport === "TENIS") { const pts1 = (d.g1===6&&d.g2===6)?(d.p1||0):(tennisPoints[d.p1]||"0"); const pts2 = (d.g1===6&&d.g2===6)?(d.p2||0):(tennisPoints[d.p2]||"0"); subS = t.games + `: ${d.g1 || 0}:${d.g2 || 0} (${pts1}:${pts2}) | ` + subS; }
            document.getElementById('adm-sub-display').innerText = subS;
            const ctrl = document.getElementById('adm-sport-controls'); ctrl.innerHTML = "";
            
            const saveBtn = document.getElementById('btn-save-period');
            saveBtn.style.display = (d.sport === "TENIS" || d.sport === "ODBOJKA") ? 'none' : 'block';

            if(d.sport === "FUDBAL" || d.sport === "RUKOMET") {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;"><div style="display:flex; justify-content:center; gap:8px;"><button class="admin-btn" style="background:rgba(255,255,255,0.05); width:55px;" onclick="proScore(1,-1)">-</button><button class="admin-btn" style="background:#28a745; width:55px;" onclick="proScore(1,1)">+</button></div><div style="display:flex; justify-content:center; gap:8px;"><button class="admin-btn" style="background:rgba(255,255,255,0.05); width:55px;" onclick="proScore(2,-1)">-</button><button class="admin-btn" style="background:#28a745; width:55px;" onclick="proScore(2,1)">+</button></div></div>`;
                if(d.sport === "FUDBAL") ctrl.innerHTML += `<div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);"><input type="text" id="event-player" placeholder="${t.player}" style="width:100%; margin-bottom:10px;"><select id="event-team" style="width:100%; margin-bottom:10px;"><option value="1">${d.t1 || t.team1}</option><option value="2">${d.t2 || t.team2}</option></select><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;"><button onclick="addEvent('⚽')" class="admin-btn" style="background:#444;">${t.goal}</button><button onclick="addEvent('🟨')" class="admin-btn" style="background:#C0A000;">${t.yellow}</button><button onclick="addEvent('🟥')" class="admin-btn" style="background:#A00000;">${t.red}</button></div></div>`;
            } else {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;"><div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:8px; font-weight:800; text-transform:uppercase;">${d.t1 || t.team1}</div><div style="display:flex; justify-content:center; gap:10px;"><button class="admin-btn" style="background:rgba(255,255,255,0.05); width:60px;" onclick="proScore(1,-1)">-</button><button class="admin-btn" style="background:#28a745; width:60px;" onclick="proScore(1,1)">+</button></div></div><div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:8px; font-weight:800; text-transform:uppercase;">${d.t2 || t.team2}</div><div style="display:flex; justify-content:center; gap:10px;"><button class="admin-btn" style="background:rgba(255,255,255,0.05); width:60px;" onclick="proScore(2,-1)">-</button><button class="admin-btn" style="background:#28a745; width:60px;" onclick="proScore(2,1)">+</button></div></div></div>`;
            }
            if(d.t1) { document.getElementById('adm-score-view').style.display = 'flex'; document.getElementById('match-setup').style.display = 'none'; document.getElementById('start-live-btn').style.display = d.status==='upcoming' ? 'block' : 'none'; document.getElementById('end-match-btn').style.display = d.status==='live' ? 'block' : 'none'; document.getElementById('reset-match-btn').style.display = d.status==='ended' ? 'block' : 'none'; } else { document.getElementById('adm-score-view').style.display = 'none'; document.getElementById('match-setup').style.display = 'flex'; }
        }

        function proScore(team, sign) { const d = allTereni.find(x => x.key === currentAdminKey); if(!d || d.status !== 'live') return; if(d.sport === "ODBOJKA") { let p1 = d.p1 || 0, p2 = d.p2 || 0; if(team === 1) p1 = Math.max(0, p1 + sign); else p2 = Math.max(0, p2 + sign); let ts = (d.score1 || 0) + (d.score2 || 0); let target = (ts === 4) ? 15 : 25; if((p1 >= target && (p1 - p2) >= 2)) { autoSaveSet(d, p1, p2, 1); return; } else if ((p2 >= target && (p2 - p1) >= 2)) { autoSaveSet(d, p1, p2, 2); return; } db.ref(`tereni/${currentAdminKey}`).update({ p1, p2 }); } else if(d.sport === "TENIS") { let p1 = d.p1 || 0, p2 = d.p2 || 0, g1 = d.g1 || 0, g2 = d.g2 || 0; if(g1 === 6 && g2 === 6) { if(team === 1) p1 = Math.max(0, p1 + sign); else p2 = Math.max(0, p2 + sign); if(p1 >= 7 && (p1 - p2) >= 2) { autoSaveTennisSet(d, 7, 6, 1); return; } else if(p2 >= 7 && (p2 - p1) >= 2) { autoSaveTennisSet(d, 6, 7, 2); return; } } else { if(sign === 1) { if(team === 1) { if(p1 === 3 && p2 < 3) { g1++; p1=0; p2=0; } else if(p1 === 3 && p2 === 3) p1 = 4; else if(p1 === 3 && p2 === 4) p2 = 3; else if(p1 === 4) { g1++; p1=0; p2=0; } else p1++; } else { if(p2 === 3 && p1 < 3) { g2++; p1=0; p2=0; } else if(p2 === 3 && p1 === 3) p2 = 4; else if(p2 === 3 && p1 === 4) p1 = 3; else if(p2 === 4) { g2++; p1=0; p2=0; } else p2++; } } else { p1 = Math.max(0, p1 - 1); p2 = Math.max(0, p2 - 1); } if((g1 >= 6 && (g1 - g2) >= 2) || g1 === 7) { autoSaveTennisSet(d, g1, g2, 1); return; } else if((g2 >= 6 && (g2 - g1) >= 2) || g2 === 7) { autoSaveTennisSet(d, g1, g2, 2); return; } } db.ref(`tereni/${currentAdminKey}`).update({ p1, p2, g1, g2 }); } else db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`] || 0) + sign) }); }
        function autoSaveSet(d, p1, p2, win) { let sub = d.sub_details || {}; let n = Object.keys(sub).length; sub["S"+n] = `${translations[currentLang].periods[d.sport][n] || "S"+(n+1)} ${p1}:${p2}`; db.ref(`tereni/${currentAdminKey}`).update({ p1: 0, p2: 0, score1: win === 1 ? ((d.score1||0) + 1) : (d.score1||0), score2: win === 2 ? ((d.score2||0) + 1) : (d.score2||0), sub_details: sub }); }
        function autoSaveTennisSet(d, g1, g2, win) { let sub = d.sub_details || {}; let n = Object.keys(sub).length; sub["S"+n] = `${translations[currentLang].periods[d.sport][n] || "S"+(n+1)} ${g1}:${g2}`; db.ref(`tereni/${currentAdminKey}`).update({ p1: 0, p2: 0, g1: 0, g2: 0, score1: win === 1 ? ((d.score1||0) + 1) : (d.score1||0), score2: win === 2 ? ((d.score2||0) + 1) : (d.score2||0), sub_details: sub }); }
        function triggerLogic(type) { const d = allTereni.find(x => x.key === currentAdminKey); if(type === 'period') { let sub = d.sub_details || {}; let n = Object.keys(sub).length; let ph = 0, pa = 0; Object.values(sub).forEach(v => { const match = v.match(/(\d+):(\d+)$/); if(match) { ph += parseInt(match[1]); pa += parseInt(match[2]); } }); sub["P"+n] = `${translations[currentLang].periods[d.sport][n] || "P"+(n+1)} ${(d.score1||0)-ph}:${(d.score2||0)-pa}`; db.ref(`tereni/${currentAdminKey}`).update({ sub_details: sub }); } else if(type === 'end') db.ref(`tereni/${currentAdminKey}`).update({ status: 'ended' }); }
        function addEvent(emoji) { const p = document.getElementById('event-player').value.toUpperCase(), t = document.getElementById('event-team').value; if(!p) return; db.ref(`tereni/${currentAdminKey}/events`).push({ player: p, team: t, emoji: emoji }); document.getElementById('event-player').value = ""; }
        function removeEvent(ekey) { if(!ekey) return; if(confirm('OBRISATI?')) db.ref(`tereni/${currentAdminKey}/events/${ekey}`).remove(); }
        async function setupMatch() { let l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value; if(!t1 || !t2) return; saveSuggestion('leagues', l); saveSuggestion('teams', t1); saveSuggestion('teams', t2); await db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0, events: null, sub_details: null, p1: 0, p2: 0, g1: 0, g2: 0 }); }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function trackGPS() { if(!navigator.geolocation) return; navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) { userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [16, 16] }) }).addTo(map); } else userMarker.setLatLng([currentLat, currentLon]); }, null, { enableHighAccuracy: true }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        function handleSearch(e) { if(e.key === "Enter") { fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) { map.flyTo([data[0].lat, data[0].lon], 15); toggleSearch(); } }); } }
        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } } }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm('OBRISATI?')) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        function resetMatch() { db.ref(`tereni/${currentAdminKey}`).update({ t1: null, t2: null, status: 'upcoming', score1: 0, score2: 0, sub_details: null, events: null, p1: 0, p2: 0, g1: 0, g2: 0 }); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); if(document.getElementById('search-container').classList.contains('expanded')) document.getElementById('city-search').focus(); }
    </script>
</body>
