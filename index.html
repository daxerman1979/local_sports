<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPOINT - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
    /* OSNOVNI RESET I GLOBALNI STILOVI */
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        touch-action: pan-x pan-y; 
    }
    html, body { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background: #000; 
        font-family: 'Inter', sans-serif; position: fixed; 
    }
    
    /* INPUTI I KONTROLE */
    input, select, textarea, datalist { 
        font-size: 16px !important; outline: none !important; 
        text-transform: uppercase; 
        background: #1a1a1a; color: white; border: 1px solid #333; 
        padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
    }
    
    button { 
        font-size: 16px !important; outline: none !important; 
        transition: transform 0.1s active, opacity 0.2s; 
        position: relative; overflow: hidden; 
    }
    button:active { transform: scale(0.96); opacity: 0.8; }

    /* SEARCH KONTEJNER */
    #search-container { 
        position: absolute; top: 20px; left: 20px; z-index: 5000; 
        display: flex; align-items: center; transition: all 0.4s ease; 
        width: 40px; height: 40px; background: rgba(18, 16, 14, 0.6); 
        border-radius: 20px; backdrop-filter: blur(10px); 
        overflow: hidden; border: 1px solid rgba(255,149,0,0.3); 
    }
    #search-container.expanded { 
        width: calc(100% - 80px); background: rgba(10,8,5,0.95); 
        border: 1px solid #FF9500; 
    }
    #city-search { 
        width: 100%; border: none; background: transparent; 
        color: white; padding: 12px 15px 12px 40px; 
        font-size: 16px; outline: none; opacity: 0; 
        transition: 0.3s; pointer-events: none; 
    }
    #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
    .search-icon { 
        position: absolute; left: 10px; width: 20px; height: 20px; 
        filter: brightness(0) invert(1); opacity: 0.8; 
        cursor: pointer; z-index: 5001; 
    }

    /* HERO SEKCIJA */
    #hero { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: linear-gradient(rgba(18,16,14,0.5), rgba(18,16,14,0.9)), 
        url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; 
        display: flex; flex-direction: column; justify-content: center; 
        align-items: center; z-index: 6000; color: white; padding: 20px; 
    }
    .hero-logo { 
        font-family: 'Permanent Marker', cursive; font-size: 72px; 
        color: #FF9500; text-shadow: 4px 4px 0px #000; 
        transform: rotate(-2deg); margin-bottom: 0; 
    }
    .hero-subtitle { 
        font-family: 'Oswald'; font-weight: 700; font-size: 18px; 
        text-transform: uppercase; letter-spacing: 5px; color: #fff; 
        margin-bottom: 30px; margin-top: -10px; 
    }
    .auth-box { 
        background: rgba(18,16,14,0.95); backdrop-filter: blur(25px); 
        padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; 
        display: flex; flex-direction: column; gap: 15px; 
        border: 1px solid rgba(255,149,0,0.4); 
    }
    .auth-btn { 
        background: #FF9500; color: white; border: none; padding: 16px; 
        font-weight: 900; cursor: pointer; text-transform: uppercase; 
        border-radius: 12px; font-family: 'Oswald'; 
        box-shadow: 0 4px 15px rgba(255,149,0,0.3); 
    }

    .home-lang-switch { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
    .home-lang-btn { 
        background: #1a1a1a; border: 1px solid #333; padding: 8px 15px; 
        border-radius: 10px; font-size: 20px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; 
    }
    .home-lang-btn.active { border-color: #FF9500; background: #222; }

    /* MAPA I NAVIGACIJA */
    #map { width: 100vw; height: 100vh; background: #111; display: none; }
    .location-btn { 
        position: absolute; bottom: 40px; right: 20px; z-index: 5500; 
        width: 55px; height: 55px; background: #FF9500; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        cursor: pointer; box-shadow: 0 4px 20px rgba(255,149,0,0.4); border: 2px solid white; 
    }
    .location-btn img { filter: brightness(0) invert(1); width: 24px; }
    .back-btn { 
        position: absolute; top: 20px; right: 20px; z-index: 5500; 
        width: 40px; height: 40px; background: rgba(0,0,0,0.5); 
        border-radius: 50%; display: flex; justify-content: center; 
        align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); 
        color: white; font-weight: bold; 
    }
    .back-btn img { width: 18px; filter: invert(1); }
    .settings-btn { 
        position: absolute; top: 70px; right: 20px; z-index: 5500; 
        width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        cursor: pointer; border: 1px solid rgba(255,255,255,0.2); 
    }
    .settings-btn img { width: 20px; filter: invert(1); }

    /* --- TV PRO SCOREBOARD NOVI GLASS DIZAJN --- */
    .live-card-thin { 
        /* Glassmorphism pozadina */
        background: linear-gradient(135deg, rgba(20, 20, 20, 0.7) 0%, rgba(0, 0, 0, 0.85) 100%);
        backdrop-filter: blur(15px) saturate(180%);
        -webkit-backdrop-filter: blur(15px) saturate(180%);
        
        /* Ivice i senke */
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-left: 4px solid #FF9500;
        border-radius: 12px; 
        
        padding: 0;
        display: none; 
        flex-direction: column;
        width: 250px;
        color: white;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.03);
        position: relative;
        z-index: 100;
        margin-bottom: 20px;
        pointer-events: auto;
        overflow: hidden;

        /* Profi animacija pojavljivanja (wobble/drop) */
        animation: cardWobbleAppear 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    @keyframes cardWobbleAppear {
        0% { opacity: 0; transform: translateY(30px) scale(0.8) rotateX(-20deg); }
        60% { opacity: 1; transform: translateY(-5px) scale(1.03) rotateX(5deg); }
        80% { transform: translateY(2px) scale(0.98) rotateX(-2deg); }
        100% { transform: translateY(0) scale(1) rotateX(0deg); }
    }
    
    .card-league-row { 
        /* Suptilniji glass gradijent za ligu */
        background: linear-gradient(90deg, rgba(255, 149, 0, 0.15) 0%, rgba(255, 204, 0, 0.05) 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex; align-items: center; 
        padding: 8px 14px;
        gap: 9px; width: 100%;
    }
    .league-ball-icon { font-size: 15px; filter: drop-shadow(0 0 5px rgba(255,149,0,0.4)); }
    .card-league-mini { 
        font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 700; 
        letter-spacing: 0.8px; text-transform: uppercase;
        font-family: 'Oswald'; white-space: nowrap;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .score-row { 
        display: flex; justify-content: space-between; 
        align-items: center; padding: 10px 14px;
        background: rgba(255,255,255,0.01);
        border-bottom: 1px solid rgba(255,255,255,0.03);
        width: 100%;
    }
    .team-name-col { 
        font-size: 15px; font-weight: 800; text-transform: uppercase; 
        color: #FFFFFF; overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; max-width: 160px;
        letter-spacing: 0.4px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .score-val-col { 
        font-family: 'Oswald'; font-size: 26px; color: #FFCC00; /* Zlatnija boja */
        font-weight: 700; min-width: 40px; text-align: right;
        text-shadow: 0 0 15px rgba(255,204,0,0.5), 0 2px 4px rgba(0,0,0,0.5);
        line-height: 1;
    }

    .extra-data-row { 
        display: flex; background: rgba(0,0,0,0.2); justify-content: space-around;
        padding: 6px; width: 100%; border-top: 1px solid rgba(255,255,255,0.03);
    }
    .extra-val { 
        font-size: 11px; font-family: 'Oswald'; 
        color: #00E6FF; text-transform: uppercase; font-weight: 700;
        text-shadow: 0 0 10px rgba(0,230,255,0.4);
    }

    .blink-live { 
        background: rgba(255, 0, 0, 0.8); color: white; font-weight: 900;
        font-size: 10px; padding: 3px 12px;
        text-transform: uppercase; align-self: flex-start;
        animation: tv-blink 1.5s infinite; font-family: 'Inter';
        margin: 10px 14px; border-radius: 4px;
        box-shadow: 0 0 15px rgba(255,0,0,0.6);
        letter-spacing: 1px;
    }
    @keyframes tv-blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .card-time-mini { 
        font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; 
        padding: 8px 14px; font-family: 'Oswald';
        background: rgba(0,0,0,0.15);
        border-top: 1px solid rgba(255,255,255,0.03);
    }

    /* POPUP I MODALI */
    .leaflet-popup-content-wrapper { 
        background: rgba(10, 10, 10, 0.8) !important; color: white !important; 
        border: 1px solid rgba(255, 149, 0, 0.5) !important; border-radius: 20px !important; 
        backdrop-filter: blur(20px) !important; box-shadow: 0 20px 50px rgba(0,0,0,0.7) !important;
    }
    .leaflet-popup-tip { background: rgba(255, 149, 0, 0.8) !important; backdrop-filter: blur(20px); }

    #disclaimer-modal { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); 
        z-index: 10000; display: none; justify-content: center; 
        align-items: center; padding: 20px; 
    }
    .disclaimer-box { 
        background: #12100e; padding: 30px; border-radius: 30px; 
        border: 1px solid #FF9500; width: 100%; max-width: 400px; text-align: center; 
    }

    /* --- NOVI UNIFICIRANI MARKER DIZAJN (Profi Glass Čioda) --- */
    .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
    
    /* Dodata lebdeća animacija za celu čiodu */
    .marker-pin-floating-wrapper {
        display: flex; flex-direction: column; align-items: center;
        animation: markerFloat 2s ease-in-out infinite;
    }
    @keyframes markerFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
    }

    /* Glava čiode (Glassmorphism krug) */
    .marker-pin-head {
        width: 36px; height: 36px;
        border-radius: 50%;
        /* Glass efekt */
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        
        /* Ivice */
        border: 2px solid rgba(255, 255, 255, 0.15);
        /* Spoljni plavi prsten (iz iste palete kao i pre, ali sjaniji) */
        box-shadow: 0 0 0 3px #007BFF, 0 8px 20px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.1);
        
        display: flex; justify-content: center; align-items: center;
        font-size: 20px;
        z-index: 6;
        position: relative;
    }

    /* Donji trougao (Ostaje čvrst, Crveni) */
    .marker-pin-tip {
        width: 0; height: 0;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-top: 17px solid #DC3545; /* Jaka crvena */
        margin-top: -5px; /* Da se preklopi sa krugom */
        z-index: 5;
        filter: drop-shadow(0 6px 6px rgba(0,0,0,0.5));
    }
    
    /* UKLONJENA .marker-pin-dot (Crvena tačka) */

    .ball-halo { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        width: 55px; height: 55px; border-radius: 50%; 
        /* Plavi halo, odgovara prstenu */
        background: radial-gradient(circle, rgba(0,123,255,0.25) 0%, rgba(0,123,255,0) 70%); 
        z-index: 4; pointer-events: none; animation: halo-pulse 2.5s infinite ease-in-out; 
    }
    @keyframes halo-pulse {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
        50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.6; }
        100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
    }
    
    /* Prilagođavanje za daleki zoom */
    .zoom-far .marker-pin-head { width: 24px; height: 24px; border-width: 1px; font-size: 14px; box-shadow: 0 0 0 2px #007BFF, 0 5px 10px rgba(0,0,0,0.5); }
    .zoom-far .marker-pin-floating-wrapper { animation: none; } /* Isključujemo animaciju kad je daleko */
    .zoom-far .marker-pin-tip { border-top-width: 12px; border-left-width: 6px; border-right-width: 6px; margin-top: -3px; }

    .zoom-near .live-card-thin { display: flex; }
    .marker-content-box { 
        position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); 
        display: flex; flex-direction: column; align-items: center; 
        pointer-events: none;
    }
    
    /* Kada je zumirano blizu, sakrivamo čiodu, ostaje samo kartica */
    .zoom-near .marker-pin-floating-wrapper, .zoom-near .ball-halo { display: none; }

    /* Mesto klika animacija */
    .click-target-animation {
        width: 60px; height: 60px;
        border: 3px solid #FF9500;
        border-radius: 50%;
        position: absolute;
        animation: clickPulse 1s ease-out infinite;
        pointer-events: none;
    }
    @keyframes clickPulse {
        0% { transform: scale(0.1); opacity: 1; border-width: 10px; }
        100% { transform: scale(1.5); opacity: 0; border-width: 1px; }
    }

    /* MATCH DETAILS VIEW */
    #match-details-view { 
        position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; 
        background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
        z-index: 8000; border-top: 3px solid #FF9500; 
        border-radius: 30px 30px 0 0; padding: 25px; 
        transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto; color: white; 
        border: 1px solid rgba(255,255,255,0.05);
    }
    #match-details-view.active { bottom: 0; }
    #det-events-home, #det-events-away { color: #ffffff !important; font-weight: 500; }

    /* ADMIN & USER DOT */
    #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #12100e; z-index: 7000; transition: 0.4s; padding: 25px; overflow-y: auto; }
    #admin-panel.active { left: 0; }
    .user-location-dot { background: #007AFF; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 20px #007AFF; }
    .animated-range-circle { animation: pulse-circle 4s infinite ease-in-out; }
    @keyframes pulse-circle { 0% { stroke-opacity: 0.8; } 50% { stroke-opacity: 0.3; } 100% { stroke-opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="disclaimer-modal">
        <div class="disclaimer-box">
            <h2 id="disclaimer-h2">NAPOMENA</h2>
            <p id="disclaimer-text">Sav sadržaj na ovom sajtu je nezvaničnog karaktera. Vlasnik sajta ne odgovara za tačnost informacija. Sajt služi isključivo u svrhe zabave.</p>
            <div class="disclaimer-check-row">
                <input type="checkbox" id="disclaimer-check">
                <label for="disclaimer-check" id="disclaimer-label">Prihvatam uslove korišćenja.</label>
            </div>
            <button class="auth-btn" style="width:100%;" onclick="acceptDisclaimer()" id="disclaimer-btn">NASTAVI</button>
        </div>
    </div>

    <div id="hero">
        <div class="hero-logo">MAPOINT</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">🇷🇸</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">🇬🇧</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()">
            <input type="text" id="city-search" placeholder="Pretraži..." onkeydown="handleSearch(event)" onblur="handleSearch(event)" enterkeyhint="search">
        </div>
        <div class="back-btn" onclick="goBackToLogin()" id="main-back-btn">
            <span id="back-x">&#10006;</span>
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828479.png" id="back-icon" style="display:none; width:18px; filter:invert(1);">
        </div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
        <div id="user-indicator" style="position:fixed; bottom:10px; left:10px; color:white; font-size:10px; z-index:5000; opacity:0.5;"></div>
    </div>

    <div id="lang-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; justify-content:center; align-items:center;" onclick="toggleLangModal()">
        <div class="lang-box" style="background:#12100e; padding:30px; border-radius:20px; border:1px solid #FF9500; text-align:center;" onclick="event.stopPropagation()">
            <h3 style="color:white; margin-bottom:20px; font-family:'Oswald';" id="lang-title">JEZIK / LANGUAGE</h3>
            <button class="auth-btn" style="background:#1a1a1a; margin-bottom:10px; border: 1px solid #333; width:100%;" onclick="setLanguage('sr')">🇷🇸 SRPSKI</button>
            <button class="auth-btn" style="background:#1a1a1a; border: 1px solid #333; width:100%;" onclick="setLanguage('en')">🇬🇧 ENGLISH</button>
        </div>
    </div>

    <div id="match-details-view">
        <div class="details-header" style="position:relative; margin-bottom:20px;">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:-10px; font-size:35px; color:#FF9500; cursor:pointer;">&times;</div>
            <div id="det-league" style="font-family:'Oswald'; color:#FF9500; font-size:14px; letter-spacing:1px;"></div>
            <div id="det-time" style="font-size:12px; color:#aaa;"></div>
        </div>
        <div style="background:#1c1916; border-radius:20px; padding:20px; text-align:center; border:1px solid #333;">
            <div id="det-t1" style="font-weight:900; font-size:18px; text-transform:uppercase;"></div>
            <div id="det-score" style="font-family:'Oswald'; font-size:50px; color:#FF9500; margin:10px 0;"></div>
            <div id="det-t2" style="font-weight:900; font-size:18px; text-transform:uppercase;"></div>
            <div id="det-extra-info" style="color:#FFCC00; font-family:'Oswald'; margin-top:10px;"></div>
        </div>
        <h4 id="txt-period-res" style="font-family:'Oswald'; margin-top:20px; border-bottom:1px solid #333; padding-bottom:5px;">Rezultat po periodima</h4>
        <div id="det-periods" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
        <div id="det-stats-container" style="display:none; margin-top:20px;">
            <h4 id="txt-match-events" style="font-family:'Oswald'; border-bottom:1px solid #333; padding-bottom:5px;">Događaji na meču</h4>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:10px;">
                <div id="det-events-home"></div>
                <div id="det-events-away" style="text-align:right;"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;"><div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#fff;">ADMIN TABLA</div><div onclick="closeAdmin()" style="font-size:40px; color:#FF9500; cursor:pointer;">&times;</div></div>
        <div id="adm-score-view" style="display:none; flex-direction:column;">
            <div style="background:#1c1916; border:1px solid #FF9500; border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#FF9500;">0 : 0</div>
                <div id="adm-sub-display" style="color:#FFCC00; font-weight:900; font-family:'Oswald'; margin-top:10px;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            <div id="adm-events-manager" style="margin-bottom:15px; border-top:1px solid #333; padding-top:10px;"></div>
            <div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:10px;">
                <input type="text" id="adm-period-name" placeholder="NAZIV PERIODA (npr. 1.SET)" style="margin-bottom:8px;">
                <button class="auth-btn" style="background:#444; width:100%;" onclick="triggerLogic('period')" id="btn-save-period">SAČUVAJ PERIOD</button>
            </div>
            <button id="start-live-btn" class="auth-btn" style="background:#007AFF; width:100%; margin-bottom:10px;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="auth-btn" style="background:#FF9500; width:100%; display:none; margin-bottom:10px;" onclick="adminStatus('ended')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="auth-btn" style="background:#444; width:100%; display:none;" onclick="resetMatch()">RESET / NOVI MEČ</button>
        </div>
        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LIGA (NOVA)">
            <input type="text" id="adm-t1" placeholder="TIM 1">
            <input type="text" id="adm-t2" placeholder="TIM 2">
            <input type="datetime-local" id="adm-time">
            <button class="auth-btn" style="background:#007AFF;" onclick="setupMatch()" id="btn-schedule">ZAKAŽI MEČ</button>

        <button style="background:none; border:none; color:#ff4444; margin-top:20px; padding:20px; font-weight:bold; width:100%;" onclick="adminDelete()" id="btn-delete-court">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], rangeCircle = null, clickPulseMarker = null;
        let currentLang = localStorage.getItem('lang') || 'sr';
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾", "OSTALO": "🏆" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        const translations = {
            sr: { 
                subtitle: "Result Tracker", login: "ULAZ U SISTEM", explore: "ISTRAŽI MAPU", search: "Pretraži...", periodRes: "Rezultat po periodima", matchEvents: "Događaji na meču", adminTitle: "ADMIN TABLA", savePeriod: "SAČUVAJ PERIOD", goLive: "KRENI UŽIVO", endMatch: "ZAVRŠI MEČ", resetMatch: "RESET / NOVI MEČ", schedule: "ZAKAŽI MEČ", deleteCourt: "OBRIŠI TEREN", zoneOccupied: "ZONA ZAUZETA!", create: "KRENI", courtName: "NAZIV TERENA", player: "IME IGRAČA", team: "TIM", loggedAs: "ULOGOVAN:", localMatch: "LOKALNI MEČ", points: "POENI", games: "GEMOVI", league: "LIGA (NOVA)", team1: "TIM 1", team2: "TIM 2", goal: "GOL", yellow: "ŽUTI", red: "CRVENI", confirmDelete: "OBRISATI TEREN?", confirmEventDelete: "OBRISATI DOGAĐAJ?", timeAt: "U", live: "UŽIVO", limitReached: "LIMIT DOSTIGNUT!", addCourt: "DODAJ TEREN", otherSport: "UPIŠI SPORT", limitPeriod: "MAKSIMALAN BROJ PERIODA!", undo: "PONIŠTI",
                discH2: "NAPOMENA", discText: "Sav sadržaj na ovom sajtu je nezvaničnog karaktera. Vlasnik sajta ne odgovara za tačnost informacija. Sajt služi isključivo u svrhe zabave.", discLabel: "Prihvatam uslove korišćenja.", discBtn: "NASTAVI",
                sportNames: { FUDBAL: "FUDBAL", KOŠARKA: "KOŠARKA", ODBOJKA: "ODBOJKA", TENIS: "TENIS", RUKOMET: "RUKOMET", OSTALO: "OSTALO" },
                periods: { FUDBAL: ["1.POL", "2.POL", "PROD 1", "PROD 2", "PENALI"], KOŠARKA: ["Q1", "Q2", "Q3", "Q4", "PROD"], ODBOJKA: ["S1", "S2", "S3", "S4", "S5"], RUKOMET: ["1.POL", "2.POL", "PROD 1", "PROD 2", "PENALI"], TENIS: ["S1", "S2", "S3", "S4", "S5"], OSTALO: [] } 
            },
            en: { 
                subtitle: "Result Tracker", login: "ENTER SYSTEM", explore: "EXPLORE MAP", search: "Search...", periodRes: "Period Results", matchEvents: "Match Events", adminTitle: "ADMIN PANEL", savePeriod: "SAVE PERIOD", goLive: "GO LIVE", endMatch: "END MATCH", resetMatch: "RESET / NEW MATCH", schedule: "SCHEDULE MATCH", deleteCourt: "DELETE COURT", zoneOccupied: "ZONE OCCUPIED!", create: "CREATE", courtName: "COURT NAME", player: "PLAYER NAME", team: "TEAM", loggedAs: "LOGGED:", localMatch: "LOCAL MATCH", points: "POINTS", games: "GAMES", league: "LEAGUE (NEW)", team1: "TEAM 1", team2: "TEAM 2", goal: "GOAL", yellow: "YELLOW", red: "RED", confirmDelete: "DELETE COURT?", confirmEventDelete: "DELETE EVENT?", timeAt: "AT", live: "LIVE", limitReached: "LIMIT REACHED!", addCourt: "ADD COURT", otherSport: "ENTER SPORT", limitPeriod: "MAX PERIODS REACHED!", undo: "UNDO",
                discH2: "DISCLAIMER", discText: "All content on this site is unofficial. The site owner is not responsible for information accuracy. The site is for entertainment purposes only.", discLabel: "I accept terms of use.", discBtn: "CONTINUE",
                sportNames: { FUDBAL: "FOOTBALL", KOŠARKA: "BASKETBALL", ODBOJKA: "VOLLEYBALL", TENIS: "TENNIS", RUKOMET: "HANDBALL", OSTALO: "OTHER" },
                periods: { FUDBAL: ["1ST H", "2ND H", "ET 1", "ET 2", "PEN"], KOŠARKA: ["Q1", "Q2", "Q3", "Q4", "OT"], ODBOJKA: ["S1", "S2", "S3", "S4", "S5"], RUKOMET: ["1ST H", "2ND H", "ET 1", "ET 2", "PEN"], TENIS: ["S1", "S2", "S3", "S4", "S5"], OSTALO: [] } 
            }
        };

        function setLanguage(lang) { 
            currentLang = lang; 
            localStorage.setItem('lang', lang); 
            updateUILanguage(); 
            document.getElementById('lang-modal').style.display = 'none';
            if(currentAdminKey) refreshAdminPanel(currentAdminKey);
            renderMarkers(); 
        }
        
        function updateUILanguage() { 
            const t = translations[currentLang]; 
            document.getElementById('txt-subtitle').innerText = t.subtitle; 
            document.getElementById('btn-login').innerText = t.login; 
            document.getElementById('btn-explore').innerText = t.explore; 
            document.getElementById('city-search').placeholder = t.search; 
            document.getElementById('txt-period-res').innerText = t.periodRes; 
            document.getElementById('txt-match-events').innerText = t.matchEvents;
            document.getElementById('adm-name').innerText = t.adminTitle; 
            document.getElementById('btn-save-period').innerText = t.savePeriod; 
            document.getElementById('start-live-btn').innerText = t.goLive; 
            document.getElementById('end-match-btn').innerText = t.endMatch; 
            document.getElementById('reset-match-btn').innerText = t.resetMatch; 
            document.getElementById('btn-schedule').innerText = t.schedule; 
            document.getElementById('btn-delete-court').innerText = t.deleteCourt; 
            document.getElementById('adm-league-input').placeholder = t.league; 
            document.getElementById('adm-t1').placeholder = t.team1; 
            document.getElementById('adm-t2').placeholder = t.team2; 
            document.getElementById('disclaimer-h2').innerText = t.discH2;
            document.getElementById('disclaimer-text').innerText = t.discText;
            document.getElementById('disclaimer-label').innerText = t.discLabel;
            document.getElementById('disclaimer-btn').innerText = t.discBtn;
            document.getElementById('h-lang-sr').classList.toggle('active', currentLang === 'sr'); 
            document.getElementById('h-lang-en').classList.toggle('active', currentLang === 'en'); 
            if(auth.currentUser) document.getElementById('user-indicator').innerText = `${t.loggedAs} ${auth.currentUser.email}`; 
        }

        async function checkDisclaimer() {
            const user = auth.currentUser; if (!user) return;
            const deviceKey = `disclaimer_accepted_${user.uid}`;
            if (!localStorage.getItem(deviceKey)) {
                const snap = await db.ref(`users/${user.uid}/disclaimer_accepted`).get();
                if (!snap.exists() || snap.val() !== true) document.getElementById('disclaimer-modal').style.display = 'flex';
                else localStorage.setItem(deviceKey, 'true');
            }
        }

        async function acceptDisclaimer() {
            if (!document.getElementById('disclaimer-check').checked) return;
            const user = auth.currentUser;
            if (user) { await db.ref(`users/${user.uid}/disclaimer_accepted`).set(true); localStorage.setItem(`disclaimer_accepted_${user.uid}`, 'true'); }
            document.getElementById('disclaimer-modal').style.display = 'none';
        }

        function toggleLangModal() { let m = document.getElementById('lang-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        
        function exploreMap() { 
            document.getElementById('hero').style.display = 'none'; 
            document.getElementById('map').style.display = 'block'; 
            document.getElementById('ui-controls').style.display = 'block'; 
            initMap(); 
            updateUILanguage(); 
            checkDisclaimer();
            
            if(auth.currentUser) {
                document.getElementById('back-icon').style.display = 'block';
                document.getElementById('back-x').style.display = 'none';
            } else {
                document.getElementById('back-icon').style.display = 'none';
                document.getElementById('back-x').style.display = 'block';
            }
        }

        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); else updateUILanguage(); });

        function initMap() {
            if (map) return;
            const sLat = parseFloat(localStorage.getItem('lastLat')) || 44.7866;
            const sLng = parseFloat(localStorage.getItem('lastLng')) || 20.4489;
            const sZoom = parseInt(localStorage.getItem('lastZoom')) || 13;

            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: '#FF9500', weight: 1, fillOpacity: 0.03, interactive: false, className: 'animated-range-circle' }).addTo(map);

            map.on('move', () => { 
                let c = map.getCenter(); rangeCircle.setLatLng(c); 
                if(map.getZoom() > 10) rangeCircle.setStyle({opacity: 0, fillOpacity: 0}); else rangeCircle.setStyle({opacity: 1, fillOpacity: 0.03}); 
            });
            map.on('moveend', () => { 
                let c = map.getCenter(); 
                localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); 
                renderMarkers(); 
            });
            map.on('zoomend', renderMarkers); 
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); renderMarkers(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if (l instanceof L.Marker && l !== userMarker && l !== clickPulseMarker) map.removeLayer(l); });

            const zoomNear = map.getZoom() >= 13;
            const zoomFar = map.getZoom() < 11;

            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 30000) return;

                const isLive = d.status === 'live', isEnded = d.status === 'ended';
                const ball = sportEmojis[d.sport] || '⚽';
                const sportName = d.custom_sport || (translations[currentLang].sportNames[d.sport] || d.sport);

                let extraHtml = "";
                if (isLive || isEnded) {
                    if (d.sport === "TENIS") {
                        const p1 = (d.g1===6 && d.g2===6) ? (d.p1||0) : (tennisPoints[d.p1]||"0");
                        const p2 = (d.g1===6 && d.g2===6) ? (d.p2||0) : (tennisPoints[d.p2]||"0");
                        extraHtml = `<div class="extra-data-row"><span class="extra-val">GEMS ${d.g1||0}:${d.g2||0}</span><span class="extra-val">PTS ${p1}:${p2}</span></div>`;
                    } else if (d.sport === "ODBOJKA") {
                        extraHtml = `<div class="extra-data-row"><span class="extra-val">PTS ${d.p1||0}:${d.p2||0}</span></div>`;
                    }
                }

                let timeHtml = "";
                if (isLive) {
                    timeHtml = `<div class="blink-live">${translations[currentLang].live}</div>`;
                } else if (d.match_time) {
                    const mt = new Date(d.match_time);
                    timeHtml = `<div class="card-time-mini">${mt.toLocaleDateString([], {day:'2-digit', month:'2-digit'})} ${translations[currentLang].timeAt} ${mt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
                }

                /* --- KREIRANJE UNIFICIRANOG MARKERA (Glass Pin sa lebdenjem) --- */
                const markerHtml = `
                    <div class="sport-marker-wrapper ${zoomNear ? 'zoom-near' : ''} ${zoomFar ? 'zoom-far' : ''}">
                        <div class="marker-content-box">
                            
                            <div class="live-card-thin">
                                <div class="card-league-row">
                                    <span class="league-ball-icon">${ball}</span>
                                    <span class="card-league-mini">${d.league || sportName}</span>
                                </div>
                                <div class="score-row">
                                    <span class="team-name-col">${d.t1 || d.name}</span>
                                    <span class="score-val-col">${(isLive || isEnded) ? (d.score1 || 0) : ""}</span>
                                </div>
                                <div class="score-row">
                                    <span class="team-name-col">${d.t2 || ""}</span>
                                    <span class="score-val-col">${(isLive || isEnded) ? (d.score2 || 0) : ""}</span>
                                </div>
                                ${extraHtml}
                                ${timeHtml}
                            </div>
                            
                            <div class="marker-pin-floating-wrapper">
                                <div class="ball-halo"></div>
                                <div class="marker-pin-head">
                                    ${ball} </div>
                                <div class="marker-pin-tip"></div> </div>
                            
                        </div>
                    </div>`;

                // Postavljamo anchor na dno trougla [0, 0] u wrapperu, ali wrapper je centriran
                L.marker([d.lat, d.lng], {
                    icon: L.divIcon({ className: '', html: markerHtml, iconSize: [0, 0], iconAnchor: [0, 0] })
                }).addTo(map).on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key);
                    else openDetails(d.key);
                });
            });
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const clickPos = e.latlng; 
            if (allTereni.some(c => clickPos.distanceTo(L.latLng(c.lat, c.lng)) < 200)) { alert(translations[currentLang].zoneOccupied); return; } 
            
            // Dodajemo animaciju klika
            if(clickPulseMarker) map.removeLayer(clickPulseMarker);
            clickPulseMarker = L.marker(e.latlng, {
                icon: L.divIcon({ className: 'click-target-animation', iconSize: [60, 60], iconAnchor: [30, 30] })
            }).addTo(map);

            openTerenForm(e.latlng.lat, e.latlng.lng);
        }

        function openTerenForm(lat, lng) {
            const t = translations[currentLang];
            const html = `
            <div style="display:flex; flex-direction:column; gap:10px; min-width:180px; padding: 5px;">
                <select id="p_sport" onchange="toggleOtherSport(this.value)">
                    <option value="FUDBAL">${t.sportNames.FUDBAL}</option>
                    <option value="KOŠARKA">${t.sportNames.KOŠARKA}</option>
                    <option value="ODBOJKA">${t.sportNames.ODBOJKA}</option>
                    <option value="TENIS">${t.sportNames.TENIS}</option>
                    <option value="RUKOMET">${t.sportNames.RUKOMET}</option>
                    <option value="OSTALO">${t.sportNames.OSTALO}</option>
                </select>
                <input type="text" id="p_custom_sport" placeholder="${t.otherSport}" style="display:none;">
                <input type="text" id="p_name" placeholder="${t.courtName}" maxlength="15">
                <button onclick="saveTeren(${lat}, ${lng})" class="auth-btn" style="padding:10px; border-radius: 8px;">${t.create}</button>
            </div>`; 
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
            
            map.on('popupclose', () => {
                if(clickPulseMarker) { map.removeLayer(clickPulseMarker); clickPulseMarker = null; }
            });
        }

        function toggleOtherSport(val) { document.getElementById('p_custom_sport').style.display = (val === 'OSTALO') ? 'block' : 'none'; }
        
        async function saveTeren(lat, lng) { 
            const n = document.getElementById('p_name').value.toUpperCase();
            const s = document.getElementById('p_sport').value;
            const cs = document.getElementById('p_custom_sport').value.toUpperCase();
            if (allTereni.filter(t => t.owner === auth.currentUser.uid).length >= 3) { alert(translations[currentLang].limitReached); return; }
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: s, custom_sport: cs, status: 'upcoming', score1: 0, score2: 0 }); 
            map.closePopup(); 
        }

        function openDetails(key) { 
            const d = allTereni.find(x => x.key === key); if(!d) return; 
            const t = translations[currentLang]; 
            document.getElementById('det-league').innerText = d.league || d.custom_sport || (t.sportNames[d.sport] || d.sport); 
            document.getElementById('det-time').innerText = d.match_time ? new Date(d.match_time).toLocaleString() : ""; 
            document.getElementById('det-t1').innerText = d.t1 || d.name; 
            document.getElementById('det-t2').innerText = d.t2 || ""; 
            document.getElementById('det-score').innerHTML = `${d.score1||0} : ${d.score2||0}`; 
            
            let ex = ""; 
            if(d.sport === "ODBOJKA") ex = `${d.p1||0} : ${d.p2||0}`; 
            else if(d.sport === "TENIS") { 
                const isTB = (d.g1 === 6 && d.g2 === 6); 
                const pts1 = isTB ? (d.p1||0) : (tennisPoints[d.p1]||"0"); 
                const pts2 = isTB ? (d.p2||0) : (tennisPoints[d.p2]||"0"); 
                ex = `GEMS ${d.g1||0}:${d.g2||0} (PTS ${pts1}:${pts2})`; 
            } 
            
            document.getElementById('det-extra-info').innerText = ex; 
            let pDiv = document.getElementById('det-periods'); pDiv.innerHTML = ""; 
            if(d.sub_details) Object.values(d.sub_details).forEach(v => { pDiv.innerHTML += `<div style="background:#333; padding:5px 10px; border-radius:10px; font-size:12px; color:white;">${v}</div>`; }); 
            
            let eHome = document.getElementById('det-events-home'), eAway = document.getElementById('det-events-away'); 
            eHome.innerHTML = ""; eAway.innerHTML = ""; 
            if(d.events) { 
                document.getElementById('det-stats-container').style.display = 'block'; 
                Object.values(d.events).forEach(ev => { const row = `<div style="font-size:13px; margin-bottom:5px; color:white;">${ev.emoji} ${ev.player}</div>`; if(ev.team == 1) eHome.innerHTML += row; else eAway.innerHTML += row; }); 
            } else document.getElementById('det-stats-container').style.display = 'none'; 
            document.getElementById('match-details-view').classList.add('active'); 
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }
        
        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return; const t = translations[currentLang];
            document.getElementById('adm-name').innerText = d.name; 
            document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            
            let subS = d.sub_details ? Object.values(d.sub_details).join(' | ') : ""; 
            if(d.sport === "ODBOJKA") subS = t.points + `: ${d.p1 || 0}:${d.p2 || 0} | ` + subS; 
            if(d.sport === "TENIS") { 
                const pts1 = (d.g1===6&&d.g2===6) ? (d.p1||0) : (tennisPoints[d.p1]||"0"); 
                const pts2 = (d.g1===6&&d.g2===6) ? (d.p2||0) : (tennisPoints[d.p2]||"0"); 
                subS = t.games + `: ${d.g1||0}:${d.g2||0} (${pts1}:${pts2}) | ` + subS; 
            }
            document.getElementById('adm-sub-display').innerText = subS;
            
            const ctrl = document.getElementById('adm-sport-controls'); ctrl.innerHTML = "";

            if(d.sport === "KOŠARKA") {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                    <div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:5px;">${d.t1}</div>
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(1,1)">+1</button>
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(1,2)">+2</button>
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(1,3)">+3</button>
                            <button class="auth-btn" style="background:#444; grid-column:span 3; padding:5px;" onclick="proScore(1,-1)">${t.undo}</button>
                        </div>
                    </div>
                    <div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:5px;">${d.t2}</div>
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(2,1)">+1</button>
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(2,2)">+2</button>
                            <button class="auth-btn" style="background:#28a745; padding:5px;" onclick="proScore(2,3)">+3</button>
                            <button class="auth-btn" style="background:#444; grid-column:span 3; padding:5px;" onclick="proScore(2,-1)">${t.undo}</button>
                        </div>
                    </div>
                </div>`;
            } else {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:5px;">${d.t1 || t.team1}</div><div style="display:flex; justify-content:center; gap:8px;"><button class="auth-btn" style="background:#444; width:50px; padding:5px;" onclick="proScore(1,-1)">-</button><button class="auth-btn" style="background:#28a745; width:50px; padding:5px;" onclick="proScore(1,1)">+</button></div></div>
                    <div style="text-align:center;"><div style="color:#aaa; font-size:11px; margin-bottom:5px;">${d.t2 || t.team2}</div><div style="display:flex; justify-content:center; gap:8px;"><button class="auth-btn" style="background:#444; width:50px; padding:5px;" onclick="proScore(2,-1)">-</button><button class="auth-btn" style="background:#28a745; width:50px; padding:5px;" onclick="proScore(2,1)">+</button></div></div>
                </div>`;
            }

            if(d.sport === "FUDBAL" || d.sport === "RUKOMET") {
                ctrl.innerHTML += `<div style="background:#111; padding:15px; border-radius:12px; margin-bottom:15px;"><input type="text" id="event-player" placeholder="${t.player}" style="width:100%; margin-bottom:8px;"><select id="event-team" style="width:100%; margin-bottom:8px;"><option value="1">${d.t1 || t.team1}</option><option value="2">${d.t2 || t.team2}</option></select><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;"><button onclick="addEvent('⚽')" class="auth-btn" style="background:#444; padding:5px;">${t.goal}</button><button onclick="addEvent('🟨')" class="auth-btn" style="background:#C0A000; padding:5px;">${t.yellow}</button><button onclick="addEvent('🟥')" class="auth-btn" style="background:#A00000; padding:5px;">${t.red}</button></div></div>`;
            }

            let evM = document.getElementById('adm-events-manager'); evM.innerHTML = "";
            if(d.events) {
                Object.entries(d.events).forEach(([id, ev]) => {
                    evM.innerHTML += `<div style="display:flex; justify-content:space-between; background:#111; padding:8px; border-radius:8px; margin-bottom:5px; color:white;">
                        <span>${ev.emoji} ${ev.player}</span>
                        <span onclick="removeEvent('${id}')" style="cursor:pointer;">🗑️</span>
                    </div>`;
                });
            }

            if(d.t1) { 
                document.getElementById('adm-score-view').style.display = 'flex'; document.getElementById('match-setup').style.display = 'none'; 
                document.getElementById('start-live-btn').style.display = d.status==='upcoming' ? 'block' : 'none'; 
                document.getElementById('end-match-btn').style.display = d.status==='live' ? 'block' : 'none'; 
                document.getElementById('reset-match-btn').style.display = d.status==='ended' ? 'block' : 'none'; 
            } else { 
                document.getElementById('adm-score-view').style.display = 'none'; document.getElementById('match-setup').style.display = 'flex'; 
            }
        }

        function proScore(team, sign) { 
            const d = allTereni.find(x => x.key === currentAdminKey); if(!d || d.status !== 'live') return; 
            
            if(d.sport === "ODBOJKA") { 
                let p1 = d.p1 || 0, p2 = d.p2 || 0, s1 = d.score1 || 0, s2 = d.score2 || 0;
                if(team === 1) p1 = Math.max(0, p1 + sign); else p2 = Math.max(0, p2 + sign);
                const target = (s1+s2 >= 4) ? 15 : 25;
                if(p1 >= target && p1-p2 >= 2) { s1++; p1=0; p2=0; }
                if(p2 >= target && p2-p1 >= 2) { s2++; p1=0; p2=0; }
                db.ref(`tereni/${currentAdminKey}`).update({ p1, p2, score1: s1, score2: s2 }); 
            } else if(d.sport === "TENIS") { 
                let p1 = d.p1 || 0, p2 = d.p2 || 0, g1 = d.g1 || 0, g2 = d.g2 || 0, s1 = d.score1 || 0, s2 = d.score2 || 0;
                if(sign > 0) {
                    if(g1 === 6 && g2 === 6) { 
                        if(team === 1) p1++; else p2++;
                        if(p1 >= 7 && p1-p2 >= 2) { g1++; p1=0; p2=0; }
                        else if(p2 >= 7 && p2-p1 >= 2) { g2++; p1=0; p2=0; }
                    } else {
                        if(team === 1) { 
                            if(p1 === 3 && p2 < 3) { g1++; p1=0; p2=0; } 
                            else if(p1 === 3 && p2 === 3) p1 = 4; 
                            else if(p1 === 3 && p2 === 4) p2 = 3; 
                            else if(p1 === 4) { g1++; p1=0; p2=0; } 
                            else p1++; 
                        } else { 
                            if(p2 === 3 && p1 < 3) { g2++; p1=0; p2=0; } 
                            else if(p2 === 3 && p1 === 3) p2 = 4; 
                            else if(p2 === 3 && p1 === 4) p1 = 3; 
                            else if(p2 === 4) { g2++; p1=0; p2=0; } 
                            else p2++; 
                        }
                    }
                } else { p1 = 0; p2 = 0; } 
                if((g1 >= 6 && g1-g2 >= 2) || g1 === 7) { s1++; g1=0; g2=0; }
                if((g2 >= 6 && g2-g1 >= 2) || g2 === 7) { s2++; g1=0; g2=0; }
                db.ref(`tereni/${currentAdminKey}`).update({ p1, p2, g1, g2, score1: s1, score2: s2 });
            } else { 
                db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`] || 0) + sign) }); 
            }
        }

        function triggerLogic(type) { 
            const d = allTereni.find(x => x.key === currentAdminKey); if(!d) return;
            const t = translations[currentLang];
            if(type === 'period') { 
                let sub = d.sub_details || {}; 
                let n = Object.keys(sub).length;
                let pName = (document.getElementById('adm-period-name').value || (t.periods[d.sport][n] || "P"+(n+1))).toUpperCase();
                let sc1 = d.score1, sc2 = d.score2;
                if(d.sport === "TENIS") { sc1 = d.g1; sc2 = d.g2; }
                else if(d.sport === "ODBOJKA") { sc1 = d.p1; sc2 = d.p2; }
                sub["P"+n] = `${pName} ${sc1}:${sc2}`; 
                db.ref(`tereni/${currentAdminKey}`).update({ sub_details: sub });
                document.getElementById('adm-period-name').value = "";
            } 
        }

        function addEvent(emoji) { const p = document.getElementById('event-player').value.toUpperCase(); if(!p) return; db.ref(`tereni/${currentAdminKey}/events`).push({ player: p, team: document.getElementById('event-team').value, emoji: emoji }); document.getElementById('event-player').value = ""; }
        function removeEvent(eventId) { if(confirm(translations[currentLang].confirmEventDelete)) db.ref(`tereni/${currentAdminKey}/events/${eventId}`).remove(); }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm(translations[currentLang].confirmDelete)) { db.ref(`tereni/${currentAdminKey}/`).remove(); closeAdmin(); } }
        function resetMatch() { db.ref(`tereni/${currentAdminKey}/`).update({ t1: null, t2: null, status: 'upcoming', score1: 0, score2: 0, sub_details: null, events: null, p1: 0, p2: 0, g1: 0, g2: 0 }); }
        
        async function setupMatch() { 
            let l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value; 
            if(!t1 || !t2) return; 
            await db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0, events: null, sub_details: null, p1: 0, p2: 0, g1: 0, g2: 0 }); 
        }
        
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function trackGPS() { if(!navigator.geolocation) return; navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }, null, { enableHighAccuracy: true }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); if(document.getElementById('search-container').classList.contains('expanded')) document.getElementById('city-search').focus(); }
        
        function handleSearch(e) { 
            if (e.key === "Enter" || e.type === "blur") { 
                const query = document.getElementById('city-search').value.toUpperCase();
                if (!query) return;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
                .then(r => r.json())
                .then(data => { 
                    if(data[0]) { 
                        map.flyTo([data[0].lat, data[0].lon], 15); 
                        document.getElementById('search-container').classList.remove('expanded');
                        document.getElementById('city-search').blur(); 
                    } 
                }); 
            } 
        }

        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } } }
    </script>
</body>
</html>
