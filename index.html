<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
            backdrop-filter: blur(10px);
        }

        .leaflet-popup-content-wrapper { border-radius: 15px; background: white; color: black; }
        .leaflet-popup-content select, .leaflet-popup-content input {
            background: #f0f0f0 !important; color: #000 !important; border: 1px solid #ccc !important;
            margin-bottom: 8px !important; display: block !important;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        button:active { transform: scale(0.94); }

        .glass-btn {
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(15px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s; width: 46px; height: 46px; background: rgba(0,0,0,0.6); border-radius: 23px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        #search-container.expanded { width: calc(100% - 130px); border-color: #ff5722; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 45px; opacity: 0; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 13px; width: 20px; height: 20px; filter: invert(1); z-index: 5001; }

        #user-section { position: absolute; top: 20px; right: 20px; z-index: 5000; display: flex; align-items: center; gap: 10px; }
        .login-trigger-btn { background: #ff5722; color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 900; font-family: 'Oswald'; font-size: 13px; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #ff5722; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); }
        .auth-box { background: rgba(10,10,10,0.8); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,87,34,0.3); }
        .auth-btn { background: #ff5722; color: white; border: none; padding: 16px; font-weight: 900; border-radius: 12px; font-family: 'Oswald'; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #ff5722 !important; border: 3px solid white !important; }
        .location-btn img { filter: invert(1); width: 24px; }
        
        .side-controls { position: absolute; top: 80px; right: 20px; z-index: 5500; display: flex; flex-direction: column; gap: 12px; }

        /* KARTICE NA MAPI - REDIZAJN */
        .live-card-thin { 
            background: white; border: 1px solid #ff9800; border-radius: 10px; padding: 10px; 
            display: none; flex-direction: column; width: 170px; color: #1a1a1a; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border: 2px solid #ff5722; }
        .card-league-header { font-size: 8px; color: #777; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .card-match-row { display: grid; grid-template-columns: 1fr 30px; align-items: center; margin-bottom: 4px; gap: 5px; }
        .card-team-name { font-size: 12px; font-weight: 700; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-score-val { font-family: 'Oswald'; font-size: 18px; color: #000; font-weight: 700; text-align: center; background: #f8f8f8; border-radius: 4px; }

        /* DETALJI - PROFESIONALNI SCOREBOARD */
        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 85vh; background: #0a0a0a; z-index: 8000; border-top: 4px solid #ff5722; border-radius: 35px 35px 0 0; padding: 25px; transition: 0.6s ease; overflow-y: auto; color: white; }
        #match-details-view.active { bottom: 0; }
        
        .det-scoreboard-pro { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .det-sc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .det-sc-team { font-size: 19px; font-weight: 900; text-transform: uppercase; flex: 1; line-height: 1.1; }
        .det-sc-score { font-family: 'Oswald'; font-size: 32px; font-weight: 700; color: #ff5722; background: rgba(255,87,34,0.1); padding: 2px 12px; border-radius: 8px; margin-left: 15px; min-width: 50px; text-align: center; }
        .det-extra-info-pro { text-align: center; font-size: 13px; color: #ff9800; font-weight: 800; margin-top: 10px; background: rgba(255,152,0,0.1); padding: 5px; border-radius: 8px; }

        .det-section-title { color: #555; font-size: 10px; font-weight: 900; text-transform: uppercase; margin: 25px 0 12px 0; letter-spacing: 1.5px; border-left: 3px solid #ff5722; padding-left: 10px; }
        .det-periods-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .det-period-item { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; border-bottom: 2px solid #ff9800; }

        /* DOGAĐAJI */
        .det-events-wrapper { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 0; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .det-ev-col { display: flex; flex-direction: column; padding: 10px; }
        .det-ev-line { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
        .det-ev-col.right .det-ev-line { flex-direction: row-reverse; text-align: right; }

        /* ADMIN */
        .adm-event-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; }
        .adm-del-x { color: #ff5722; font-weight: 900; padding: 5px 10px; cursor: pointer; }

        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0a0a; z-index: 7000; transition: 0.5s; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 14px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 15px; font-family: 'Oswald'; margin-bottom: 10px; }

        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .marker-ball-only { font-size: 20px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .zoom-near .marker-ball-only { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 12px solid #ff9800; display: none; margin-top: -1px; }
        .zoom-near .marker-pointer { display: block; }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
        </div>
    </div>

    <div id="map"></div>
    
    <div id="ui-controls" style="display:none;">
        <div id="search-container">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()">
            <input type="text" id="city-search" placeholder="Pretraži..." onkeypress="handleSearch(event)">
        </div>
        <div id="user-section">
            <button id="login-trigger" class="login-trigger-btn" onclick="goBackToLogin()">LOGIN</button>
        </div>
        <div class="side-controls">
            <div class="glass-btn" style="width:44px; height:44px;" onclick="goBackToLogin()">&#10006;</div>
        </div>
        <div class="location-btn glass-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
    </div>

    <div id="match-details-view">
        <div id="det-league" class="det-header-league"></div>
        <div class="det-scoreboard-pro">
            <div class="det-sc-row">
                <span id="det-t1" class="det-sc-team"></span>
                <span id="det-s1" class="det-sc-score">0</span>
            </div>
            <div class="det-sc-row">
                <span id="det-t2" class="det-sc-team"></span>
                <span id="det-s2" class="det-sc-score">0</span>
            </div>
            <div id="det-extra-info" class="det-extra-info-pro" style="display:none;"></div>
        </div>
        <span class="det-section-title">Rezultat po periodima</span>
        <div id="det-periods" class="det-periods-list"></div>
        <div id="det-stats-container" style="display:none;">
            <span class="det-section-title">Događaji na meču</span>
            <div class="det-events-wrapper">
                <div id="det-events-home" class="det-ev-col left"></div>
                <div style="background:rgba(255,255,255,0.05); width:1px;"></div>
                <div id="det-events-away" class="det-ev-col right"></div>
            </div>
        </div>
        <button class="admin-btn" style="background:#444; margin-top:30px;" onclick="closeDetails()">ZATVORI</button>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
            <div id="adm-name" style="font-family:'Oswald'; font-size:24px; text-transform:uppercase;">ADMIN</div>
            <div onclick="closeAdmin()" style="font-size:40px; color:#ff5722; cursor:pointer;">&times;</div>
        </div>
        
        <div id="adm-score-view" style="display:none;">
            <div style="background:rgba(255,255,255,0.03); border:1px solid #ff5722; border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:50px; font-family:'Oswald'; color:#ff5722;">0 : 0</div>
                <div id="adm-sub-display" style="color:#ff9800; font-weight:700; margin-top:5px;"></div>
            </div>
            
            <div id="adm-sport-controls"></div>
            
            <div id="adm-periods-list" style="display:flex; gap:5px; margin:15px 0; overflow-x:auto;"></div>

            <div id="adm-events-manager" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;"></div>

            <button class="admin-btn" style="background:#444; margin-top:15px;" onclick="triggerLogic('period')" id="btn-save-period">SAČUVAJ PERIOD</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#ff5722; display:none;" onclick="triggerLogic('end')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#ff9500; display:none;" onclick="resetMatch()">RESET / NOVI MEČ</button>
        </div>

        <div id="match-setup" style="display:none; flex-direction:column; gap:10px;">
            <input type="text" id="adm-league-input" placeholder="LIGA" list="league-list">
            <input type="text" id="adm-t1" placeholder="TIM 1" maxlength="15">
            <input type="text" id="adm-t2" placeholder="TIM 2" maxlength="15">
            <input type="datetime-local" id="adm-time">
            <button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()">ZAKAŽI MEČ</button>
            <datalist id="league-list"></datalist>
        </div>
        
        <button class="admin-btn" style="background:none; color:#444; margin-top:auto;" onclick="adminDelete()">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [];
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); }
        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); });

        function initMap() {
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.6 }).addTo(map);
            
            map.on('moveend', () => { let c = map.getCenter(); localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); });
            map.on('click', handleMapClick);
            
            db.ref('tereni').on('value', snap => { 
                allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); 
                renderMarkers(); 
                if(currentAdminKey) refreshAdminPanel(currentAdminKey);
            });
            trackGPS();
        }

        function renderMarkers() {
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            allTereni.forEach(d => {
                const isLive = d.status === 'live', ball = sportEmojis[d.sport] || '⚽';
                let cardHtml = d.t1 ? `<div class="live-card-thin"><div class="card-league-header"><span>${d.league || 'Lokalni meč'}</span>${isLive ? '<div class="blink-live"><span></span>LIVE</div>' : ''}</div><div class="card-match-row"><span class="card-team-name">${d.t1}</span><span class="card-score-val">${d.score1||0}</span></div><div class="card-match-row"><span class="card-team-name">${d.t2}</span><span class="card-score-val">${d.score2||0}</span></div></div><div class="marker-pointer"></div>` : `<div class="live-card-thin" style="text-align:center;"><b>${d.name}</b></div><div class="marker-pointer"></div>`;
                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${map.getZoom()>12?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div>${cardHtml}</div></div>`;
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html }) }).addTo(map).on('click', () => { if(auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); });
            });
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const html = `<div style="padding:5px;"><select id="p_sport"><option value="FUDBAL">FUDBAL</option><option value="KOŠARKA">KOŠARKA</option><option value="ODBOJKA">ODBOJKA</option><option value="TENIS">TENIS</option><option value="RUKOMET">RUKOMET</option></select><input type="text" id="p_name" placeholder="NAZIV TERENA"><button onclick="saveTeren(${e.latlng.lat}, ${e.latlng.lng})" style="width:100%; background:#ff5722; color:white; border:none; padding:10px; border-radius:10px;">KRENI</button></div>`;
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
        }

        async function saveTeren(lat, lng) {
            const n = document.getElementById('p_name').value.toUpperCase();
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0, createdAt: Date.now() });
            map.closePopup();
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }

        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('adm-name').innerText = d.name;
            
            // PRIKAZ PERIODA ZA ADMINA
            const pList = document.getElementById('adm-periods-list'); pList.innerHTML = "";
            if(d.sub_details) Object.values(d.sub_details).forEach(v => pList.innerHTML += `<div style="background:#ff5722; color:white; padding:4px 8px; border-radius:5px; font-size:10px; font-weight:900; white-space:nowrap;">${v}</div>`);

            // DINAMIČKI SCOREBOARD
            let scoreText = `${d.score1||0} : ${d.score2||0}`;
            let subText = "";
            if(d.sport === "TENIS") {
                scoreText = `${d.s1||0} : ${d.s2||0}`;
                subText = `GEM: ${d.g1||0}:${d.g2||0} | POEN: ${tennisPoints[d.p1]||0}:${tennisPoints[d.p2]||0}`;
            } else if(d.sport === "ODBOJKA") {
                scoreText = `${d.s1||0} : ${d.s2||0}`;
                subText = `TRENUTNI SET: ${d.score1||0}:${d.score2||0}`;
            }
            document.getElementById('adm-main-score').innerText = scoreText;
            document.getElementById('adm-sub-display').innerText = subText;

            const ctrl = document.getElementById('adm-sport-controls'); ctrl.innerHTML = "";
            if(d.sport === "FUDBAL" || d.sport === "RUKOMET") {
                ctrl.innerHTML = `
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div style="display:flex; justify-content:center; gap:5px;"><button class="admin-btn" style="background:#444; width:50px;" onclick="proScore(1,-1)">-</button><button class="admin-btn" style="background:#28a745; width:50px;" onclick="proScore(1,1)">+</button></div>
                        <div style="display:flex; justify-content:center; gap:5px;"><button class="admin-btn" style="background:#444; width:50px;" onclick="proScore(2,-1)">-</button><button class="admin-btn" style="background:#28a745; width:50px;" onclick="proScore(2,1)">+</button></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px;">
                        <input type="text" id="ev-p" placeholder="IME IGRAČA" style="margin-bottom:8px;">
                        <select id="ev-t" style="margin-bottom:8px;"><option value="1">${d.t1}</option><option value="2">${d.t2}</option></select>
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                            <button onclick="addEv('⚽')" class="admin-btn" style="background:#444;">GOL</button>
                            <button onclick="addEv('🟨')" class="admin-btn" style="background:#C0A000;">ŽUTI</button>
                            <button onclick="addEv('🟥')" class="admin-btn" style="background:#A00000;">RED</button>
                        </div>
                    </div>`;
            } else if(d.sport === "TENIS") {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="admin-btn" style="background:#28a745;" onclick="tennisLogic(1)">+ ${d.t1}</button>
                    <button class="admin-btn" style="background:#28a745;" onclick="tennisLogic(2)">+ ${d.t2}</button>
                </div>`;
            } else if(d.sport === "ODBOJKA") {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="admin-btn" style="background:#28a745;" onclick="volleyLogic(1)">+ ${d.t1}</button>
                    <button class="admin-btn" style="background:#28a745;" onclick="volleyLogic(2)">+ ${d.t2}</button>
                </div>`;
            } else {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="admin-btn" style="background:#28a745;" onclick="proScore(1,1)">+ ${d.t1}</button>
                    <button class="admin-btn" style="background:#28a745;" onclick="proScore(2,1)">+ ${d.t2}</button>
                </div>`;
            }

            const evMgr = document.getElementById('adm-events-manager'); evMgr.innerHTML = "";
            if(d.events) Object.entries(d.events).forEach(([ekey, ev]) => {
                evMgr.innerHTML += `<div class="adm-event-row"><span>${ev.emoji} ${ev.player}</span><span class="adm-del-x" onclick="removeEv('${ekey}')">×</span></div>`;
            });

            if(d.t1) { document.getElementById('adm-score-view').style.display = 'block'; document.getElementById('match-setup').style.display = 'none'; document.getElementById('end-match-btn').style.display = d.status==='live' ? 'block' : 'none'; }
            else { document.getElementById('adm-score-view').style.display = 'none'; document.getElementById('match-setup').style.display = 'flex'; }
        }

        function tennisLogic(team) {
            const d = allTereni.find(x => x.key === currentAdminKey);
            let p1 = d.p1||0, p2 = d.p2||0, g1 = d.g1||0, g2 = d.g2||0, s1 = d.s1||0, s2 = d.s2||0;
            if(team === 1) p1++; else p2++;
            if(p1 > 3 && p1 - p2 >= 2) { p1 = 0; p2 = 0; g1++; }
            if(p2 > 3 && p2 - p1 >= 2) { p1 = 0; p2 = 0; g2++; }
            if(g1 >= 6 && g1 - g2 >= 2) { g1 = 0; g2 = 0; s1++; }
            if(g2 >= 6 && g2 - g1 >= 2) { g1 = 0; g2 = 0; s2++; }
            db.ref(`tereni/${currentAdminKey}`).update({ p1, p2, g1, g2, s1, s2, score1: s1, score2: s2 });
        }

        function volleyLogic(team) {
            const d = allTereni.find(x => x.key === currentAdminKey);
            let sc1 = d.score1||0, sc2 = d.score2||0, s1 = d.s1||0, s2 = d.s2||0;
            if(team === 1) sc1++; else sc2++;
            if(sc1 >= 25 && sc1 - sc2 >= 2) { 
                triggerLogic('period'); // Automatski čuva set u listu
                sc1 = 0; sc2 = 0; s1++; 
            }
            if(sc2 >= 25 && sc2 - sc1 >= 2) { 
                triggerLogic('period');
                sc1 = 0; sc2 = 0; s2++; 
            }
            db.ref(`tereni/${currentAdminKey}`).update({ score1: sc1, score2: sc2, s1, s2 });
        }

        function proScore(team, sign) {
            const d = allTereni.find(x => x.key === currentAdminKey); if(!d || d.status !== 'live') return;
            db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`]||0) + sign) });
        }

        function addEv(emoji) {
            const p = document.getElementById('ev-p').value.toUpperCase(), t = document.getElementById('ev-t').value;
            if(!p) return;
            db.ref(`tereni/${currentAdminKey}/events`).push({ player: p, team: t, emoji });
            document.getElementById('ev-p').value = "";
        }

        function removeEv(ekey) { if(confirm('Obrisati?')) db.ref(`tereni/${currentAdminKey}/events/${ekey}`).remove(); }

        function triggerLogic(type) {
            if(type === 'end') db.ref(`tereni/${currentAdminKey}`).update({ status: 'ended' });
            if(type === 'period') {
                const d = allTereni.find(x => x.key === currentAdminKey);
                let sub = d.sub_details || {}; let n = Object.keys(sub).length;
                let val = d.sport === "TENIS" ? `SET ${n+1} (${d.g1}:${d.g2})` : `P${n+1} ${d.score1}:${d.score2}`;
                sub[`p${n}`] = val;
                db.ref(`tereni/${currentAdminKey}`).update({ sub_details: sub });
            }
        }

        function openDetails(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('det-league').innerText = d.league || "LOKALNI MEČ";
            document.getElementById('det-t1').innerText = d.t1; document.getElementById('det-t2').innerText = d.t2;
            document.getElementById('det-s1').innerText = (d.sport === "TENIS" || d.sport === "ODBOJKA") ? d.s1||0 : d.score1||0;
            document.getElementById('det-s2').innerText = (d.sport === "TENIS" || d.sport === "ODBOJKA") ? d.s2||0 : d.score2||0;
            
            let extra = d.sport === "ODBOJKA" ? `SET POENI: ${d.score1||0}:${d.score2||0}` : (d.sport === "TENIS" ? `GEM: ${d.g1||0}:${d.g2||0} (${tennisPoints[d.p1]||0}:${tennisPoints[d.p2]||0})` : "");
            document.getElementById('det-extra-info').innerText = extra;
            document.getElementById('det-extra-info').style.display = extra ? 'block' : 'none';

            let pDiv = document.getElementById('det-periods'); pDiv.innerHTML = "";
            if(d.sub_details) Object.values(d.sub_details).forEach(v => pDiv.innerHTML += `<div class="det-period-item">${v}</div>`);

            let eHome = document.getElementById('det-events-home'), eAway = document.getElementById('det-events-away');
            eHome.innerHTML = ""; eAway.innerHTML = "";
            if(d.events) {
                document.getElementById('det-stats-container').style.display = 'block';
                Object.values(d.events).forEach(ev => {
                    let row = `<div class="det-ev-line"><span>${ev.emoji}</span><span>${ev.player}</span></div>`;
                    if(ev.team == 1) eHome.innerHTML += row; else eAway.innerHTML += row;
                });
            } else document.getElementById('det-stats-container').style.display = 'none';
            document.getElementById('match-details-view').classList.add('active');
        }

        async function setupMatch() {
            const l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value;
            if(!t1 || !t2) return;
            await db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1:0, score2:0, s1:0, s2:0, p1:0, p2:0, g1:0, g2:0 });
        }

        function resetMatch() { if(confirm('Novi meč?')) db.ref(`tereni/${currentAdminKey}`).update({ t1:null, t2:null, score1:0, score2:0, s1:0, s2:0, p1:0, p2:0, g1:0, g2:0, events:null, sub_details:null, status:'upcoming' }); }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm('Obriši teren?')) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        async function handleAuth() {
            let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } }
        }
        function trackGPS() { navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot' }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 16); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function handleSearch(e) { if(e.key === "Enter") { fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) map.flyTo([data[0].lat, data[0].lon], 14); }); } }
    </script>
</body>
</html>
