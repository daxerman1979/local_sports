<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SCOREPUNKT PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffcc00; --bg: #000; --surface: #111; --text: #fff; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        /* AUTH SECTION */
        #hero { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; background: #000; padding: 20px; }
        .auth-box { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; width: 100%; }
        button { padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Oswald'; }
        
        /* MAP & UI */
        #map { height: 100vh; width: 100vw; display: none; }
        .ui-btn { position: absolute; z-index: 1000; background: #000; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; border: 1px solid #444; }
        
        /* ADMIN PANEL */
        #admin-panel { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            padding: 20px; display: none; flex-direction: column; gap: 20px;
        }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .score-val { font-size: 4rem; font-family: 'Oswald'; color: var(--primary); }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; font-size: 24px; }
        .ctrl-btn.plus { background: var(--primary); color: #000; }
        .ctrl-btn.minus { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div id="hero">
        <h1 style="font-family:'Oswald'; color:var(--primary); font-size:3rem;">SCOREPUNKT</h1>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button style="background:var(--primary);" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button style="background:transparent; color:#888;" onclick="exploreMap()">ISTRAŽI MAPU</button>
        </div>
    </div>

    <div id="map"></div>
    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between;">
            <h2 id="adm-name">MEČ</h2>
            <button onclick="closeAdmin()" style="background:transparent; color:white; font-size:20px;">✕</button>
        </div>
        
        <div class="score-row">
            <div style="text-align:center">
                <div class="score-val" id="s1">0</div>
                <div style="display:flex; gap:10px;">
                    <button class="ctrl-btn minus" onclick="modScore(1, -1)">-</button>
                    <button class="ctrl-btn plus" onclick="modScore(1, 1)">+</button>
                </div>
            </div>
            <div style="text-align:center">
                <div class="score-val" id="s2">0</div>
                <div style="display:flex; gap:10px;">
                    <button class="ctrl-btn minus" onclick="modScore(2, -1)">-</button>
                    <button class="ctrl-btn plus" onclick="modScore(2, 1)">+</button>
                </div>
            </div>
        </div>

        <button style="background:var(--primary); width:100%;" onclick="adminStatus('ended')">ZAVRŠI MEČ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        
        let map, currentAdminKey;

        function exploreMap() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            map = L.map('map').setView([44.7866, 20.4489], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            loadCourts();
        }

        function loadCourts() {
            db.ref('tereni').on('value', snap => {
                map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
                snap.forEach(c => {
                    const d = c.val();
                    L.marker([d.lat, d.lng]).addTo(map).on('click', () => {
                        if(auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(c.key);
                    });
                });
            });
        }

        function openAdmin(key) {
            currentAdminKey = key;
            document.getElementById('admin-panel').style.display = 'flex';
            db.ref(`tereni/${key}`).on('value', snap => {
                const d = snap.val();
                document.getElementById('s1').innerText = d.score1 || 0;
                document.getElementById('s2').innerText = d.score2 || 0;
                document.getElementById('adm-name').innerText = d.name;
            });
        }

        function modScore(t, val) {
            const ref = db.ref(`tereni/${currentAdminKey}`);
            ref.once('value', s => {
                const d = s.val();
                ref.update({ [`score${t}`]: Math.max(0, (d[`score${t}`] || 0) + val) });
            });
        }

        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; db.ref(`tereni/${currentAdminKey}`).off(); }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); exploreMap(); } 
            catch { alert("Pokušaj ponovo ili se registruj."); }
        }
    </script>
</body>
</html>
