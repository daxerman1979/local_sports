<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: rgba(26, 26, 26, 0.8); color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
            backdrop-filter: blur(5px);
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        /* KONTROLE NA EKRANU - Providne */
        .ui-btn { 
            position: absolute; z-index: 5500; 
            width: 45px; height: 45px; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(10px); 
            border-radius: 12px; 
            display: flex; justify-content: center; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            cursor: pointer; transition: 0.3s;
        }
        .ui-btn:active { background: rgba(255, 255, 255, 0.3); }
        .ui-btn img { width: 22px; filter: brightness(0) invert(1); opacity: 0.6; }

        #search-trigger { top: 20px; left: 20px; }
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5600; display: none; width: calc(100% - 40px); background: rgba(0,0,0,0.95); border-radius: 15px; border: 1px solid #ff3b30; }
        #city-search { background: transparent; border: none; padding: 15px; color: white; }

        #btn-gps { bottom: 40px; right: 20px; background: rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.3); }
        #btn-gps img { opacity: 0.9; }
        
        #btn-settings { top: 75px; right: 20px; }
        #btn-logout { top: 130px; right: 20px; }

        /* User indicator - Logged As */
        #user-indicator { 
            position: absolute; top: 20px; right: 20px; z-index: 5400; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            color: #aaa; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        #user-indicator span { color: #ff3b30; font-size: 12px; margin-top: 2px; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #ff3b30; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        
        .auth-box { background: rgba(10,10,10,0.85); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .auth-btn { background: linear-gradient(135deg, #ff3b30, #ff2d55); color: white; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }

        /* MARKERI */
        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .marker-ball-only { font-size: 14px; filter: drop-shadow(0 0 5px rgba(255,204,0,0.6)); display: block; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 50%; border: 1px solid rgba(255,204,0,0.2); }
        .zoom-near .marker-ball-only { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid rgba(255, 204, 0, 0.9); display: none; z-index: 10; }
        .zoom-near .marker-pointer { display: block; }
        .status-live-wrapper .marker-pointer { border-top-color: #ff3b30; }

        .live-card-thin { 
            background: linear-gradient(165deg, rgba(30,30,30,0.95), rgba(10,10,10,0.98)); 
            border: 1.5px solid rgba(255, 204, 0, 0.6); 
            border-radius: 16px; padding: 12px 16px; 
            display: none; flex-direction: column; 
            width: max-content; min-width: 170px; 
            color: white; backdrop-filter: blur(15px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            position: relative; overflow: hidden; z-index: 25; margin-bottom: 2px;
        }
        .zoom-near .live-card-thin { display: flex; animation: cardPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { from { transform: scale(0.5) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .status-live-wrapper .live-card-thin { border-color: #ff3b30; }

        .blink-live { animation: soft-blink 2s infinite ease-in-out; color: #ff3b30; font-weight: 900; text-transform: uppercase; font-size: 10px; z-index: 1; display: flex; align-items: center; gap: 4px; }
        .blink-live::before { content: ''; width: 6px; height: 6px; background: #ff3b30; border-radius: 50%; }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; position: relative; z-index: 1; margin-bottom: 4px; width: 100%; }
        .team-name-col { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #eee; white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
        .score-val-col { font-family: 'Oswald'; font-size: 20px; color: #ffcc00; font-weight: 700; text-align: right; min-width: 25px; }

        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 8000; border-top: 4px solid #ff3b30; border-radius: 30px 30px 0 0; padding: 25px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto; color: white; }
        #match-details-view.active { bottom: 0; }

        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0a0a; z-index: 7000; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); padding: 30px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 16px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 14px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 10px; }
        .user-location-dot { background: #007AFF; width: 16px; height: 16px; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 25px #007AFF; }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div style="font-family:'Oswald'; font-size:14px; letter-spacing:4px; color:#fff; margin-bottom:30px; opacity:0.6;">RESULT TRACKER</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
        </div>
    </div>

    <div id="map"></div>
    
    <div id="ui-controls" style="display:none;">
        <div id="user-indicator">LOGGED AS: <span id="user-email">...</span></div>
        
        <div id="search-trigger" class="ui-btn" onclick="toggleSearch()"><img src="https://cdn-icons-png.flaticon.com/512/622/622669.png"></div>
        <div id="search-container"><input type="text" id="city-search" placeholder="Pretraži grad ili lokaciju..." onkeypress="handleSearch(event)"></div>
        
        <div id="btn-settings" class="ui-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div id="btn-logout" class="ui-btn" onclick="goBackToLogin()"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828427.png"></div>
        <div id="btn-gps" class="ui-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
    </div>

    <div id="match-details-view">
        <div style="text-align:center; position:relative;">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:0; font-size:30px; color:#ff3b30;">&times;</div>
            <span id="det-league" style="color:#ff3b30; font-weight:900; font-size:12px; letter-spacing:2px;"></span>
            <div id="det-t1" style="font-size:22px; font-weight:900; margin-top:20px;"></div>
            <div id="det-score" style="font-family:'Oswald'; font-size:50px; color:#ff3b30; margin:10px 0;"></div>
            <div id="det-t2" style="font-size:22px; font-weight:900;"></div>
            <div id="det-extra-info" style="color:#ffcc00; font-weight:800; margin-top:10px;"></div>
            <div id="det-periods" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;"><div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#fff;">ADMIN TABLA</div><div onclick="closeAdmin()" style="font-size:40px; color:#ff3b30; cursor:pointer;">&times;</div></div>
        <div id="adm-score-view" style="display:none;">
            <div style="background:#1a1a1a; padding:20px; border-radius:20px; text-align:center; border:1px solid #ff3b30; margin-bottom:20px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#ff3b30;">0 : 0</div>
                <div id="adm-sub-display" style="color:#ffcc00; font-weight:900;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            <button class="admin-btn" style="background:#333;" onclick="triggerLogic('period')">SAČUVAJ PERIOD</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#ff3b30; display:none;" onclick="triggerLogic('end')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#ff9500; display:none;" onclick="resetMatch()">NOVI MEČ</button>
        </div>
        <div id="match-setup" style="display:none; flex-direction:column; gap:10px;">
            <input type="text" id="adm-league-input" placeholder="LIGA">
            <input type="text" id="adm-t1" placeholder="TIM 1">
            <input type="text" id="adm-t2" placeholder="TIM 2">
            <button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()">ZAKAŽI MEČ</button>
        </div>
        <button style="margin-top:auto; color:#444; background:none; border:none; padding:20px;" onclick="adminDelete()">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], markersMap = {};
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };

        function exploreMap() { 
            document.getElementById('hero').style.display = 'none'; 
            document.getElementById('map').style.display = 'block'; 
            document.getElementById('ui-controls').style.display = 'block'; 
            initMap(); 
        }

        function goBackToLogin() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => { 
            if (user) {
                document.getElementById('user-email').innerText = user.email.split('@')[0];
                exploreMap(); 
            }
        });

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.7866, 20.4489], 13);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.6 }).addTo(map);
            
            map.on('moveend', renderMarkers);
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { 
                allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); 
                renderMarkers(); 
            });
            trackGPS();
        }

        function renderMarkers() {
            const zoomNear = map.getZoom() > 12;
            allTereni.forEach(d => {
                const ball = sportEmojis[d.sport] || '⚽';
                const isLive = d.status === 'live';
                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''}">
                    <div class="marker-content-box">
                        <div class="marker-ball-only">${ball}</div>
                        <div class="live-card-thin">
                            <div style="font-size:10px; color:#ffcc00; margin-bottom:4px;">${d.league||''}</div>
                            <div class="score-row"><span>${d.t1||d.name}</span><span>${d.score1||0}</span></div>
                            <div class="score-row"><span>${d.t2||''}</span><span>${d.score2||0}</span></div>
                            ${isLive?'<div class="blink-live">LIVE</div>':''}
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                </div>`;
                
                if (markersMap[d.key]) {
                    markersMap[d.key].setIcon(L.divIcon({ className: '', html }));
                } else {
                    markersMap[d.key] = L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html }) }).addTo(map)
                        .on('click', () => { if(auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); });
                }
            });
        }

        function handleMapClick(e) {
            if (!auth.currentUser) return;
            const html = `<div style="padding:10px;">
                <select id="p_sport"><option>FUDBAL</option><option>KOŠARKA</option></select>
                <input type="text" id="p_name" placeholder="Naziv terena" style="margin:10px 0;">
                <button onclick="saveTeren(${e.latlng.lat}, ${e.latlng.lng})" style="width:100%; background:#ff3b30; color:white; border:none; padding:10px; border-radius:8px;">KRENI</button>
            </div>`;
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
        }

        async function saveTeren(lat, lng) {
            const n = document.getElementById('p_name').value.toUpperCase();
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0 });
            map.closePopup();
        }

        function toggleSearch() { 
            const s = document.getElementById('search-container');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
            if(s.style.display === 'block') document.getElementById('city-search').focus();
        }

        function handleSearch(e) {
            if(e.key === "Enter") {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => {
                    if(data[0]) { map.flyTo([data[0].lat, data[0].lon], 15); toggleSearch(); }
                });
            }
        }

        function trackGPS() {
            navigator.geolocation.watchPosition(pos => {
                currentLat = pos.coords.latitude; currentLon = pos.coords.longitude;
                if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot' }) }).addTo(map);
                else userMarker.setLatLng([currentLat, currentLon]);
            });
        }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 17); }

        // Pomoćne funkcije za UI (zadržane)
        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); }
        function openDetails(key) { /* Slična logika kao ranije */ document.getElementById('match-details-view').classList.add('active'); }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        async function handleAuth() {
            let e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch { await auth.createUserWithEmailAndPassword(e, p); }
        }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm('Obrisati?')) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
    </script>
</body>
</html>
