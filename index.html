<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Score Pro - Professional Report</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .setup-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select {
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 1rem;
        }
        .teams-grid {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .score-display {
            font-size: 4rem;
            font-weight: 900;
            margin: 10px 0;
            color: #2ecc71;
        }
        .btn-live { background: #e67e22; color: white; width: 100%; font-size: 1.2rem; padding: 15px; border: none; border-radius: 10px; cursor: pointer; }
        .btn-save { background: #3498db; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .btn-finish { background: #c0392b; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .btn-reset { background: #7f8c8d; color: white; padding: 10px; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        .btn-minus, .btn-plus { width: 50px; height: 50px; font-size: 1.5rem; border: none; border-radius: 50%; cursor: pointer; color: white; }
        .btn-minus { background: #444; }
        .btn-plus { background: #2ecc71; }
        
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #final-report {
            display: none;
            background: #ffffff;
            color: #333;
            border-radius: 15px;
            padding: 25px;
            margin-top: 10px;
            text-align: left;
        }
        .report-header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .report-stadium { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .report-teams { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; text-align: center; }
        .report-team-name { font-size: 1.2rem; font-weight: bold; flex: 1; }
        .report-main-score { font-size: 2.5rem; font-weight: 900; margin: 0 15px; color: #2c3e50; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .report-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .report-table .period-label { text-align: left; color: #7f8c8d; }
        .report-table .period-res { text-align: right; font-weight: bold; }

        .location-footer { margin-top: 20px; font-size: 0.7rem; color: #888; }
    </style>
</head>
<body>

<div class="app-container" id="app-content">
    
    <div id="edit-mode">
        <div class="setup-section">
            <label style="font-weight: bold; letter-spacing: 1px;">KONFIGURACIJA MEČA</label>
            <select id="sport-select" onchange="initSport()">
                <option value="">-- Izaberi Sport --</option>
                <option value="fudbal">Fudbal</option>
                <option value="kosarka">Košarka</option>
                <option value="tenis">Tenis</option>
                <option value="odbojka">Odbojka</option>
                <option value="rukomet">Rukomet</option>
            </select>
            <input type="text" id="stadium" placeholder="Stadion / Hala">
            <input type="datetime-local" id="match-time">
            <input type="text" id="team1-name" placeholder="Domaći tim">
            <input type="text" id="team2-name" placeholder="Gostujući tim">
            <button id="live-start-btn" class="btn-live" onclick="startLive()" style="display:none;">KRENI UŽIVO 🔴</button>
        </div>
    </div>

    <div id="game-area" style="display:none;">
        <div class="teams-grid">
            <div class="team-card">
                <div id="display-t1" style="font-size:1.1rem; font-weight: bold; min-height:1.2em"></div>
                <div class="score-display" id="score1">0</div>
                <div>
                    <button class="btn-minus" onclick="changeScore(1, -1)">-</button>
                    <button class="btn-plus" onclick="changeScore(1, 1)">+</button>
                </div>
            </div>
            <div class="team-card">
                <div id="display-t2" style="font-size:1.1rem; font-weight: bold; min-height:1.2em"></div>
                <div class="score-display" id="score2">0</div>
                <div>
                    <button class="btn-minus" onclick="changeScore(2, -1)">-</button>
                    <button class="btn-plus" onclick="changeScore(2, 1)">+</button>
                </div>
            </div>
        </div>
        <div style="margin-bottom: 10px;">
            <select id="period-name" style="width:100%"></select>
        </div>
        <button class="btn-save" onclick="savePeriod()">Sačuvaj period</button>
        <button class="btn-finish" onclick="finishMatch()">KRAJ MEČA</button>
    </div>

    <div id="final-report">
        <div class="report-header">
            <div id="rep-sport" style="font-weight:bold; color:#e67e22; margin-bottom: 5px;"></div>
            <div id="rep-stadium" class="report-stadium"></div>
            <div id="rep-time" style="font-size:0.8rem; color:#95a5a6"></div>
        </div>
        <div class="report-teams">
            <div class="report-team-name" id="rep-t1"></div>
            <div class="report-main-score" id="rep-final-score"></div>
            <div class="report-team-name" id="rep-t2"></div>
        </div>
        <table class="report-table" id="rep-table"></table>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="clearStadium()" style="background:#eee; color:#333; flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight: bold;">Obriši stadion</button>
            <button onclick="resetAll()" style="background:#2c3e50; color:white; flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight: bold;">Nova priprema</button>
        </div>
    </div>

    <div class="location-footer" id="location-display"></div>
</div>

<script>
    let mainScores = { t1: 0, t2: 0 };
    let lastSavedScores = { t1: 0, t2: 0 };
    let history = [];
    let usedPeriods = [];
    let isLive = false;

    const periodsData = {
        fudbal: ["1. Poluvreme", "2. Poluvreme", "Produžeci", "Penali"],
        kosarka: ["1. Četvrtina", "2. Četvrtina", "3. Četvrtina", "4. Četvrtina", "Produžetak"],
        tenis: ["1. Set", "2. Set", "3. Set", "4. Set", "5. Set"],
        odbojka: ["1. Set", "2. Set", "3. Set", "4. Set", "5. Set"],
        rukomet: ["1. Poluvreme", "2. Poluvreme", "Produžeci"]
    };

    function initSport() {
        const sport = document.getElementById('sport-select').value;
        if (!sport) {
            document.getElementById('live-start-btn').style.display = 'none';
            return;
        }
        document.getElementById('live-start-btn').style.display = 'block';
        const pSelect = document.getElementById('period-name');
        pSelect.innerHTML = "";
        periodsData[sport].forEach(p => {
            let o = document.createElement('option'); 
            o.value = p; 
            o.innerText = p;
            pSelect.appendChild(o);
        });
    }

    function startLive() {
        isLive = true;
        document.getElementById('edit-mode').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('display-t1').innerText = document.getElementById('team1-name').value || "DOMAĆI";
        document.getElementById('display-t2').innerText = document.getElementById('team2-name').value || "GOSTI";
        saveToStorage();
    }

    function changeScore(team, val) {
        if (team === 1) mainScores.t1 = Math.max(0, mainScores.t1 + val);
        else mainScores.t2 = Math.max(0, mainScores.t2 + val);
        document.getElementById('score1').innerText = mainScores.t1;
        document.getElementById('score2').innerText = mainScores.t2;
        saveToStorage();
    }

    function savePeriod() {
        const sport = document.getElementById('sport-select').value;
        const pSelect = document.getElementById('period-name');
        const pName = pSelect.value;
        if (!pName) return;

        let pT1, pT2;
        // Tenis i Odbojka obično resetuju poene po setovima u live prikazu
        if (sport === 'tenis' || sport === 'odbojka') {
            pT1 = mainScores.t1; 
            pT2 = mainScores.t2;
            mainScores = { t1: 0, t2: 0 };
            document.getElementById('score1').innerText = 0;
            document.getElementById('score2').innerText = 0;
        } else {
            pT1 = mainScores.t1 - lastSavedScores.t1;
            pT2 = mainScores.t2 - lastSavedScores.t2;
        }

        history.push({ label: pName, res: `${pT1}:${pT2}` });
        usedPeriods.push(pName);
        
        // Onemogući iskorišćen period
        for (let i = 0; i < pSelect.options.length; i++) {
            if (pSelect.options[i].value === pName) {
                pSelect.options[i].disabled = true;
                break;
            }
        }
        
        if (pSelect.selectedIndex + 1 < pSelect.options.length) {
            pSelect.selectedIndex++;
        }

        lastSavedScores = { ...mainScores };
        saveToStorage();
        alert("Period '" + pName + "' sačuvan!");
    }

    function finishMatch() {
        if (!confirm("Da li ste sigurni da želite da završite meč?")) return;
        
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('edit-mode').style.display = 'none';
        
        document.getElementById('rep-sport').innerText = document.getElementById('sport-select').value.toUpperCase();
        document.getElementById('rep-stadium').innerText = document.getElementById('stadium').value || "Nepoznata lokacija";
        
        const mTime = document.getElementById('match-time').value;
        document.getElementById('rep-time').innerText = mTime ? new Date(mTime).toLocaleString('sr-RS') : "Vreme nije uneto";
        
        document.getElementById('rep-t1').innerText = document.getElementById('team1-name').value || "DOMAĆI";
        document.getElementById('rep-t2').innerText = document.getElementById('team2-name').value || "GOSTI";
        document.getElementById('rep-final-score').innerText = `${mainScores.t1} - ${mainScores.t2}`;
        
        const table = document.getElementById('rep-table');
        table.innerHTML = "";
        history.forEach(h => {
            table.innerHTML += `<tr><td class="period-label">${h.label}</td><td class="period-res">${h.res}</td></tr>`;
        });

        document.getElementById('final-report').style.display = 'block';
        localStorage.setItem('sport_final_report', 'true');
        saveToStorage();
    }

    function clearStadium() {
        document.getElementById('rep-stadium').innerText = "STADION OBRISAN";
        document.getElementById('stadium').value = "";
        saveToStorage();
    }

    function saveToStorage() {
        const data = {
            sport: document.getElementById('sport-select').value,
            stadium: document.getElementById('stadium').value,
            time: document.getElementById('match-time').value,
            t1: document.getElementById('team1-name').value,
            t2: document.getElementById('team2-name').value,
            mainScores, 
            history, 
            usedPeriods, 
            isLive,
            lastSavedScores
        };
        localStorage.setItem('sport_pro_v4', JSON.stringify(data));
    }

    function resetAll() {
        if (confirm("Resetovati sve podatke i započeti novu pripremu?")) {
            localStorage.removeItem('sport_pro_v4');
            localStorage.removeItem('sport_final_report');
            location.reload();
        }
    }

    function updateLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const loc = `Poslednja lokacija: ${p.coords.latitude.toFixed(3)}, ${p.coords.longitude.toFixed(3)}`;
                document.getElementById('location-display').innerText = loc;
                localStorage.setItem('last_loc', loc);
            }, () => {
                const savedLoc = localStorage.getItem('last_loc');
                if (savedLoc) document.getElementById('location-display').innerText = savedLoc;
            });
        }
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('sport_pro_v4'));
        if (saved) {
            document.getElementById('sport-select').value = saved.sport;
            initSport();
            document.getElementById('stadium').value = saved.stadium;
            document.getElementById('match-time').value = saved.time;
            document.getElementById('team1-name').value = saved.t1;
            document.getElementById('team2-name').value = saved.t2;
            mainScores = saved.mainScores || { t1: 0, t2: 0 };
            history = saved.history || [];
            usedPeriods = saved.usedPeriods || [];
            lastSavedScores = saved.lastSavedScores || { t1: 0, t2: 0 };

            if (saved.isLive) {
                startLive();
                document.getElementById('score1').innerText = mainScores.t1;
                document.getElementById('score2').innerText = mainScores.t2;
            }
            if (localStorage.getItem('sport_final_report')) {
                finishMatch();
            }
        }
        updateLocation();
    };
</script>

</body>
</html>
