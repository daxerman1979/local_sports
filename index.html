<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; 
            text-transform: uppercase; 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(18, 16, 14, 0.6); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid rgba(255,149,0,0.3); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(10,8,5,0.95); border: 1px solid #FF9500; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,14,0.5), rgba(18,16,14,0.9)), url('sport.jpg') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #FF9500; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; color: #fff; margin-bottom: 30px; margin-top: -10px; }
        .auth-box { background: rgba(18,16,14,0.95); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,149,0,0.4); }
        .auth-btn { background: #FF9500; color: white; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; box-shadow: 0 4px 15px rgba(255,149,0,0.3); }

        .home-lang-switch { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .home-lang-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .home-lang-btn.active { border-color: #FF9500; color: white; background: #222; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #FF9500; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(255,149,0,0.4); border: 2px solid white; }
        .location-btn img { filter: brightness(0) invert(1); width: 24px; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .back-btn img { width: 18px; filter: invert(1); }
        .settings-btn { position: absolute; top: 70px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .settings-btn img { width: 20px; filter: invert(1); }

        .leaflet-popup-content-wrapper { background: rgba(18, 16, 14, 0.95) !important; color: white !important; border: 1px solid #FF9500 !important; border-radius: 20px !important; backdrop-filter: blur(10px); }
        .leaflet-popup-tip { background: #FF9500 !important; }
        .leaflet-popup-content { margin: 15px !important; width: 220px !important; }

        #disclaimer-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .disclaimer-box { background: #12100e; padding: 30px; border-radius: 30px; border: 1px solid #FF9500; width: 100%; max-width: 400px; text-align: center; color: white; }
        .disclaimer-box h2 { font-family: 'Oswald'; color: #FF9500; margin-top: 0; }
        .disclaimer-box p { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 25px; }
        .disclaimer-check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; text-align: left; font-size: 13px; font-weight: bold; }
        .disclaimer-check-row input { width: 20px; height: 20px; accent-color: #FF9500; }

        #lang-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9000; display: none; justify-content: center; align-items: center; }
        .lang-box { background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid #FF9500; width: 85%; max-width: 300px; text-align: center; }

        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-ball-only { font-size: 16px; transition: all 0.3s; filter: drop-shadow(0 0 2px black); position: relative; z-index: 5; }
        .ball-halo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, rgba(255,149,0,0.6) 0%, rgba(255,149,0,0) 70%); z-index: 4; pointer-events: none; animation: halo-pulse 2s infinite ease-in-out; }

        @keyframes halo-pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
        }

        .zoom-far .marker-ball-only { font-size: 10px; }
        .zoom-far .ball-halo { width: 20px; height: 20px; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .zoom-near .marker-ball-only, .zoom-near .ball-halo { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 20px solid #FFCC00; display: none; z-index: 10; }
        .zoom-near .marker-pointer { display: block; }
        .status-live-wrapper .marker-pointer { border-top-color: #FF9500; }

        .live-card-thin { 
            background: rgba(22, 18, 15, 0.98); border: 2px solid #FFCC00; border-radius: 12px; padding: 10px 14px; 
            display: none; flex-direction: column; width: max-content; min-width: 180px; color: white; 
            backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.8); position: relative; overflow: hidden; z-index: 25; margin-bottom: -1px;
        }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border-color: #FF9500; }

        .card-league-row { display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #333; margin-bottom: 6px; padding-bottom: 4px; }
        .league-ball-icon { font-size: 14px; animation: icon-bounce-rotate 2s infinite ease-in-out; }
        @keyframes icon-bounce-rotate { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(15deg); } }
        
        .card-league-mini { font-size: 9px; color: #FFCC00; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .status-live-wrapper .card-league-mini { color: #FF9500; }

        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 4px; width: 100%; }
        .team-name-col { font-size: 14px; font-weight: 900; text-transform: uppercase; color: #fff; white-space: normal; line-height: 1.1; max-width: 120px; }
        .score-val-col { font-family: 'Oswald'; font-size: 20px; color: #FFCC00; font-weight: 700; text-align: right; min-width: 30px; }
        .status-live-wrapper .score-val-col { color: #FF9500; }

        .extra-data-row { display: flex; justify-content: flex-end; gap: 5px; margin-top: -2px; margin-bottom: 4px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 2px; }
        .extra-val { font-size: 11px; font-family: 'Oswald'; background: rgba(255,255,255,0.1); padding: 0 4px; border-radius: 4px; color: #FFCC00; }

        .blink-live { animation: soft-blink 2s infinite ease-in-out; color: #FF9500; font-weight: 900; text-transform: uppercase; font-size: 10px; text-align: center; margin-top: 4px; }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .card-time-mini { font-size: 9px; color: #FFCC00; font-weight: 900; text-align: center; border-top: 1px solid #333; padding-top: 4px; margin-top: 4px; }

        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #12100e; z-index: 8000; border-top: 3px solid #FF9500; border-radius: 30px 30px 0 0; padding: 20px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto; color: white; }
        #match-details-view.active { bottom: 0; }
        .details-header { text-align: center; margin-bottom: 20px; position: relative; }
        .details-league { color: #FF9500; font-weight: 900; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .details-time-full { color: #FFCC00; font-weight: 800; font-size: 11px; margin-bottom: 15px; display: block; }
        .details-main-box { background: #1c1916; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .details-team-line { font-size: 22px; font-weight: 900; text-align: center; width: 100%; }
        .details-score-line { font-family: 'Oswald'; font-size: 50px; color: #FF9500; line-height: 1; margin: 5px 0; display: flex; align-items: center; gap: 15px; }
        .details-extra-line { color: #FFCC00; font-weight: 800; font-size: 16px; margin-top: 5px; }
        .details-section-title { color: #777; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; display: block; }
        
        .details-periods-grid { display: flex; flex-wrap: nowrap; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; justify-content: space-evenly; }
        .detail-period-tag { background: #0a0a0a; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; border-bottom: 3px solid #FFCC00; color: white; white-space: nowrap; flex: 1; text-align: center; }

        .events-container-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .events-column { display: flex; flex-direction: column; gap: 5px; }
        .detail-event-box { background: #0a0a0a; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 700; border-left: 3px solid #FFCC00; }
        .events-column.right .detail-event-box { border-left: none; border-right: 3px solid #FFCC00; text-align: right; }

        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #12100e; z-index: 7000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }
        .user-location-dot { background: #007AFF; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 20px #007AFF; }

        .animated-range-circle { animation: pulse-circle 4s infinite ease-in-out; }
        @keyframes pulse-circle { 0% { stroke-opacity: 0.8; stroke-width: 1px; } 50% { stroke-opacity: 0.3; stroke-width: 2.5px; } 100% { stroke-opacity: 0.8; stroke-width: 1px; } }
    </style>
</head>
<body>

    <div id="disclaimer-modal">
        <div class="disclaimer-box">
            <h2 id="disclaimer-h2">NAPOMENA</h2>
            <p id="disclaimer-text">Sav sadržaj na ovom sajtu je nezvaničnog karaktera. Vlasnik sajta ne odgovara za tačnost informacija. Sajt služi isključivo u svrhe zabave.</p>
            <div class="disclaimer-check-row">
                <input type="checkbox" id="disclaimer-check">
                <label for="disclaimer-check" id="disclaimer-label">Prihvatam uslove korišćenja.</label>
            </div>
            <button class="auth-btn" style="width:100%;" onclick="acceptDisclaimer()" id="disclaimer-btn">NASTAVI</button>
        </div>
    </div>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">SRB</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()">
            <input type="text" id="city-search" placeholder="Pretraži..." onkeydown="handleSearch(event)" onblur="handleSearch(event)" enterkeyhint="search">
        </div>
        <div class="back-btn" onclick="goBackToLogin()" id="main-back-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828479.png" id="back-icon" style="display:none;">
            <span id="back-x">&#10006;</span>
        </div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
        <div id="user-indicator" style="position:fixed; bottom:10px; left:10px; color:white; font-size:10px; z-index:5000; opacity:0.5;"></div>
    </div>

    <div id="lang-modal" onclick="toggleLangModal()">

            <button class="admin-btn" style="background:#1a1a1a; margin-bottom:10px; border: 1px solid #333;" onclick="setLanguage('sr')">SRPSKI</button>
            <button class="admin-btn" style="background:#1a1a1a; border: 1px solid #333;" onclick="setLanguage('en')">ENGLISH</button>

        <div id="adm-score-view" style="display:none; flex-direction:column;">

                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#FF9500;">0 : 0</div>
                <div id="adm-sub-display" style="color:#FFCC00; font-weight:900; font-family:'Oswald'; margin-top:10px;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            
            <div id="adm-events-manager" style="margin-bottom:15px; border-top:1px solid #333; padding-top:10px;"></div>

        function initMap() {
            if (map) return;
            const sLat = parseFloat(localStorage.getItem('lastLat')) || 44.7866;
            const sLng = parseFloat(localStorage.getItem('lastLng')) || 20.4489;
            const sZoom = parseInt(localStorage.getItem('lastZoom')) || 13;

            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: '#FF9500', weight: 1, fillOpacity: 0.03, interactive: false, className: 'animated-range-circle' }).addTo(map);

            map.on('move', () => { 
                let c = map.getCenter(); rangeCircle.setLatLng(c); 
                if(map.getZoom() > 10) rangeCircle.setStyle({opacity: 0, fillOpacity: 0}); else rangeCircle.setStyle({opacity: 1, fillOpacity: 0.03}); 
            });
            map.on('moveend', () => { 
                let c = map.getCenter(); 
                localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); 
                renderMarkers(); 
            });
            map.on('zoomend', renderMarkers); 
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); renderMarkers(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            
            const zoomNear = map.getZoom() > 14;
            const zoomFar = map.getZoom() < 11;

            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 30000) return;
                const isLive = d.status === 'live', isEnded = d.status === 'ended';
                const ball = sportEmojis[d.sport] || '⚽';
                const sportName = d.custom_sport || (translations[currentLang].sportNames[d.sport] || d.sport);

                let extraRows = "";
                if(isLive || isEnded) {
                    if(d.sport === "TENIS") {
                        const pts1 = (d.g1===6 && d.g2===6) ? (d.p1||0) : (tennisPoints[d.p1]||"0");
                        const pts2 = (d.g1===6 && d.g2===6) ? (d.p2||0) : (tennisPoints[d.p2]||"0");
                        extraRows = `<div class="extra-data-row"><span class="extra-val">${translations[currentLang].games}: ${d.g1||0}:${d.g2||0}</span><span class="extra-val">PTS: ${pts1}:${pts2}</span></div>`;
                    } else if(d.sport === "ODBOJKA") {
                        extraRows = `<div class="extra-data-row"><span class="extra-val">PTS: ${d.p1||0}:${d.p2||0}</span></div>`;
                    }
                }

                let timeInfo = isLive ? `<div class="blink-live">${translations[currentLang].live}</div>` : (d.match_time ? `<div class="card-time-mini">${new Date(d.match_time).toLocaleDateString([],{day:'2-digit',month:'2-digit'})} ${translations[currentLang].timeAt} ${new Date(d.match_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>` : "");

                let htmlContent = `
                    <div class="live-card-thin">
                        <div class="card-league-row">
                            <div class="league-ball-icon">${ball}</div>
                            <div class="card-league-mini">${d.league || sportName}</div>
                        </div>
                        <div class="score-row"><span class="team-name-col">${d.t1 || d.name}</span><span class="score-val-col">${(isLive || isEnded) ? (d.score1 || 0) : ""}</span></div>
                        <div class="score-row"><span class="team-name-col">${d.t2 || ""}</span><span class="score-val-col">${(isLive || isEnded) ? (d.score2 || 0) : ""}</span></div>
                        ${extraRows}
                        ${timeInfo}
                    </div>
                    <div class="marker-pointer"></div>`;

                const html = `
                    <div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''} ${zoomFar?'zoom-far':''}">
                        <div class="marker-content-box">
                            <div class="ball-halo"></div>
                            <div class="marker-ball-only">${ball}</div>
                            ${htmlContent}
                        </div>
                    </div>`;
                
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0], iconAnchor: [0, 0] }) }).addTo(map).on('click', e => { 
                    L.DomEvent.stopPropagation(e); 
                    if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); 
                });
            });
        }

        function refreshAdminPanel(key) {

            document.getElementById('adm-name').innerText = d.name; document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            let subS = d.sub_details ? Object.values(d.sub_details).join(' | ') : "";

        function proScore(team, sign) { 
            const d = allTereni.find(x => x.key === currentAdminKey); if(!d || d.status !== 'live') return; 
            if(d.sport === "ODBOJKA") { let p1 = d.p1 || 0, p2 = d.p2 || 0; if(team === 1) p1 = Math.max(0, p1 + sign); else p2 = Math.max(0, p2 + sign); db.ref(`tereni/${currentAdminKey}`).update({ p1, p2 }); } 
            else if(d.sport === "TENIS") { 
                let p1 = d.p1 || 0, p2 = d.p2 || 0, g1 = d.g1 || 0, g2 = d.g2 || 0;
                if(sign === 1) {
                    if(team === 1) { if(p1 === 3 && p2 < 3) { g1++; p1=0; p2=0; } else if(p1 === 3 && p2 === 3) p1 = 4; else if(p1 === 3 && p2 === 4) p2 = 3; else if(p1 === 4) { g1++; p1=0; p2=0; } else p1++; }
                    else { if(p2 === 3 && p1 < 3) { g2++; p1=0; p2=0; } else if(p2 === 3 && p1 === 3) p2 = 4; else if(p2 === 3 && p1 === 4) p1 = 3; else if(p2 === 4) { g2++; p1=0; p2=0; } else p2++; }
                } else { p1 = Math.max(0, p1 - 1); p2 = Math.max(0, p2 - 1); }
                db.ref(`tereni/${currentAdminKey}`).update({ p1, p2, g1, g2 });
            } else { db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`] || 0) + sign) }); }
        }

        function triggerLogic(type) { 
            const d = allTereni.find(x => x.key === currentAdminKey); 
            if(type === 'period') { 
                let sub = d.sub_details || {}; 
                let keys = Object.keys(sub);
                let n = keys.length;
                let pName = (document.getElementById('adm-period-name').value || (translations[currentLang].periods[d.sport][n] || "P"+(n+1))).toUpperCase();

                let pScore1 = d.score1 || 0;
                let pScore2 = d.score2 || 0;

                // Računanje rezultata samo za ovaj period
                if(n > 0) {
                    // Prolazimo kroz sve prethodne upisane periode i oduzimamo njihove vrednosti
                    keys.forEach(k => {
                        let parts = sub[k].split(' ');
                        let lastRes = parts[parts.length - 1].split(':');
                        pScore1 -= parseInt(lastRes[0]);
                        pScore2 -= parseInt(lastRes[1]);
                    });
                }
                
                sub["P"+n] = `${pName} ${pScore1}:${pScore2}`; 
                
                db.ref(`tereni/${currentAdminKey}`).update({ sub_details: sub });
                document.getElementById('adm-period-name').value = "";
            } else if(type === 'end') db.ref(`tereni/${currentAdminKey}`).update({ status: 'ended' }); 
        }

        async function setupMatch() { 
            let l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value; 
            if(!t1 || !t2) return; 
            await db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0, events: null, sub_details: null, p1: 0, p2: 0, g1: 0, g2: 0 }); 
        }
        
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function trackGPS() { if(!navigator.geolocation) return; navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }, null, { enableHighAccuracy: true }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); if(document.getElementById('search-container').classList.contains('expanded')) document.getElementById('city-search').focus(); }
        
        function handleSearch(e) { 
            if (e.key === "Enter" || e.type === "blur") { 
                const query = document.getElementById('city-search').value.toUpperCase();
                if (!query) return;
                
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
                .then(r => r.json())
                .then(data => { 
                    if(data[0]) { 
                        map.flyTo([data[0].lat, data[0].lon], 15); 
                        document.getElementById('search-container').classList.remove('expanded');
                        document.getElementById('city-search').blur(); 
                    } 
                }); 
            } 
        }

        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } } }
    </script>
</body>
</html>
