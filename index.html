<html lang="sr">
<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: #222; color: white; border: 1px solid #444; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%; margin-bottom: 5px;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(0,0,0,0.4); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(0,0,0,0.9); border: 1px solid #ff3b30; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #ff3b30; text-shadow: 4px 4px 0px #000; transform: rotate(-2deg); margin-bottom: 0; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; color: #fff; margin-bottom: 30px; margin-top: -10px; }
        .auth-box { background: rgba(10,10,10,0.95); backdrop-filter: blur(25px); padding: 35px; border-radius: 30px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,59,48,0.5); }
        .auth-btn { background: #ff3b30; color: white; border: none; padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 12px; font-family: 'Oswald'; box-shadow: 0 4px 15px rgba(255,59,48,0.3); }

        .home-lang-switch { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .home-lang-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .home-lang-btn.active { border-color: #ff3b30; color: white; background: #222; }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #ff3b30; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(255,59,48,0.5); border: 2px solid white; }
        .location-btn img { filter: brightness(0) invert(1); width: 24px; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .settings-btn { position: absolute; top: 70px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .settings-btn img { width: 20px; filter: invert(1); }

        #lang-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9000; display: none; justify-content: center; align-items: center; }
        .lang-box { background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid #ff3b30; width: 85%; max-width: 300px; text-align: center; }

        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }

        .marker-ball-only { font-size: 16px; filter: drop-shadow(0 0 5px #ffcc00); display: block; }
        .zoom-near .marker-ball-only { display: none; }

        .marker-pointer { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 20px solid #ffcc00; display: none; z-index: 10; }
        .zoom-near .marker-pointer { display: block; }
        .status-live-wrapper .marker-pointer { border-top-color: #ff3b30; }

        .live-card-thin { background: rgba(10, 10, 10, 0.98); border: 2px solid #ffcc00; border-radius: 12px; padding: 10px 14px; display: none; flex-direction: column; width: max-content; min-width: 150px; color: white; backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.8); position: relative; overflow: hidden; z-index: 25; margin-bottom: -1px; }
        .card-bg-icon { position: absolute; right: -10px; bottom: -10px; font-size: 60px; opacity: 0.1; transform: rotate(-15deg); pointer-events: none; z-index: 0; }
        .zoom-near .live-card-thin { display: flex; }
        .status-live-wrapper .live-card-thin { border-color: #ff3b30; }

        .blink-live { animation: soft-blink 2s infinite ease-in-out; color: #ff3b30; font-weight: 900; text-transform: uppercase; font-size: 10px; z-index: 1; }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card-league-mini { font-size: 8px; color: #ffcc00; font-weight: 900; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; border-bottom: 1px solid #222; position: relative; z-index: 1; }
        .status-live-wrapper .card-league-mini { color: #ff3b30; }
        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; position: relative; z-index: 1; margin-bottom: 3px; width: 100%; }
        .team-name-col { font-size: 15px; font-weight: 900; text-transform: uppercase; color: #fff; white-space: nowrap; }
        .score-val-col { font-family: 'Oswald'; font-size: 22px; color: #ffcc00; font-weight: 700; text-align: right; min-width: 30px; }
        .status-live-wrapper .score-val-col { color: #ff3b30; }
        .card-time-mini { font-size: 9px; color: #ffcc00; font-weight: 900; text-align: center; border-top: 1px solid #222; padding-top: 4px; margin-top: 4px; position: relative; z-index: 1; }

        /* Pro Choice Grids */
        .choice-container { background: #111; border-radius: 20px; border: 1px solid #333; padding: 15px; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }
        .choice-section-title { color: #ffcc00; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .ad-choice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sport-choice-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        
        .ad-type-btn { background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .ad-type-btn span { font-size: 24px; }
        .ad-type-label { font-size: 7px; font-weight: 900; color: #aaa; text-transform: uppercase; }

        .sport-type-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .sport-type-btn:hover { border-color: #ff3b30; }

        /* Share Button for Ads */
        .share-ad-btn { background: #25d366; color: white; font-weight: 900; border: none; padding: 14px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Inter'; font-size: 14px; }
        .share-ad-btn img { height: 18px; filter: brightness(0) invert(1); }

        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 8000; border-top: 3px solid #ff3b30; border-radius: 30px 30px 0 0; padding: 20px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto; color: white; }
        #match-details-view.active { bottom: 0; }
        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0a0a; z-index: 7000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }
        .user-location-dot { background: #007AFF; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 20px #007AFF; }
        .ad-form-label { color: #ffcc00; font-size: 10px; font-weight: bold; margin-bottom: 2px; text-align: left; display: block; text-transform: uppercase; }
        @keyframes pulse-circle { 0% { stroke-opacity: 0.8; stroke-width: 1px; } 50% { stroke-opacity: 0.3; stroke-width: 2.5px; } 100% { stroke-opacity: 0.8; stroke-width: 1px; } }
        .animated-range-circle { animation: pulse-circle 4s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#aaa; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">SRB</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container"><img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()"><input type="text" id="city-search" placeholder="Pretraži..." onkeypress="handleSearch(event)"></div>
        <div class="back-btn" onclick="goBackToLogin()">&#10006;</div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
        <div id="user-indicator"></div>
    </div>

    <div id="lang-modal" onclick="toggleLangModal()">
        <div class="lang-box" onclick="event.stopPropagation()">
            <h3 style="color:white; margin-bottom:20px; font-family:'Oswald';" id="lang-title">JEZIK / LANGUAGE</h3>
            <button class="admin-btn" style="background:#1a1a1a; margin-bottom:10px; border: 1px solid #333;" onclick="setLanguage('sr')">SRPSKI</button>
            <button class="admin-btn" style="background:#1a1a1a; border: 1px solid #333;" onclick="setLanguage('en')">ENGLISH</button>
        </div>
    </div>

    <div id="match-details-view">
        <div class="details-header">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:-10px; font-size:35px; color:#ff3b30; cursor:pointer;">&times;</div>
            <span id="det-league" class="details-league"></span>
            <span id="det-time" class="details-time-full"></span>
        </div>
        <div class="details-main-box">
            <div id="det-t1" class="details-team-line"></div>
            <div id="det-score" class="details-score-line"></div>
            <div id="det-t2" class="details-team-line"></div>
            <div id="det-extra-info" class="details-extra-line"></div>
        </div>
        <span class="details-section-title" id="txt-period-res">Rezultat po periodima</span>
        <div id="det-periods" class="details-periods-grid"></div>
        <div id="det-stats-container" style="display:none; margin-top:10px;">
            <span class="details-section-title" id="txt-match-events">Događaji na meču</span>
            <div class="events-container-grid">
                <div id="det-events-home" class="events-column left"></div>
                <div id="det-events-away" class="events-column right"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;"><div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#fff;">ADMIN TABLA</div><div onclick="closeAdmin()" style="font-size:40px; color:#ff3b30; cursor:pointer;">&times;</div></div>
        <div id="adm-score-view" style="display:none; flex-direction:column;">
            <div style="background:#151515; border:1px solid #ff3b30; border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#ff3b30;">0 : 0</div>
                <div id="adm-sub-display" style="color:#ffcc00; font-weight:900; font-family:'Oswald'; margin-top:10px;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            <button class="admin-btn" style="background:#444;" onclick="triggerLogic('period')" id="btn-save-period">SAČUVAJ PERIOD / SET</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#ff3b30; display:none;" onclick="triggerLogic('end')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#ff9500; display:none;" onclick="resetMatch()">RESET / NOVI MEČ</button>
        </div>
        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LIGA (NOVA)" list="league-list"><datalist id="league-list"></datalist>
            <input type="text" id="adm-t1" placeholder="TIM 1" maxlength="15" list="team-list">
            <input type="text" id="adm-t2" placeholder="TIM 2" maxlength="15" list="team-list">
            <input type="datetime-local" id="adm-time"><button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()" id="btn-schedule">ZAKAŽI MEČ</button>
        </div>
        <button style="background:none; border:none; color:#333; margin-top:auto; padding:20px; font-weight:bold;" onclick="adminDelete()" id="btn-delete-court">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], allAds = [], rangeCircle = null;
        let currentLang = localStorage.getItem('lang') || 'sr';
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };
        const adEmojis = { "CAFFE": "☕", "RESTORAN": "🍴", "FIRMA": "🏢" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        const translations = {
            sr: { subtitle: "Result Tracker", login: "ULAZ U SISTEM", explore: "ISTRAŽI MAPU", search: "Pretraži...", periodRes: "Rezultat po periodima", adminTitle: "ADMIN TABLA", savePeriod: "SAČUVAJ PERIOD / SET", goLive: "KRENI UŽIVO", endMatch: "ZAVRŠI MEČ", resetMatch: "RESET / NOVI MEČ", schedule: "ZAKAŽI MEČ", deleteCourt: "OBRIŠI TEREN", zoneOccupied: "ZONA ZAUZETA!", create: "POŠALJI ZAHTEV", courtName: "NAZIV TERENA", player: "IME IGRAČA", loggedAs: "ULOGOVAN KAO:", localMatch: "LOKALNI MEČ", points: "POENI", games: "GEMOVI", league: "LIGA (NOVA)", team1: "TIM 1", team2: "TIM 2", goal: "GOL", confirmDelete: "OBRISATI?", timeAt: "U", live: "UŽIVO", limitReached: "LIMIT OD 3 TERENA JE DOSTIGNUT!", addCourt: "DODAJ SPORTSKI TEREN", addAd: "DODAJ REKLAMU", adTitle: "BESPLATNA REKLAMA", adNamePlaceholder: "NAZIV OBJEKTA", adDescPlaceholder: "OPIS (DO 20 REČI)", adShareBtn: "PODELI ZA AKTIVACIJU (24h)", shareMsg: "Pogledaj sportske rezultate uživo na Maplay mapi!" },
            en: { subtitle: "Result Tracker", login: "ENTER SYSTEM", explore: "EXPLORE MAP", search: "Search...", periodRes: "Period Results", adminTitle: "ADMIN PANEL", savePeriod: "SAVE PERIOD / SET", goLive: "GO LIVE", endMatch: "END MATCH", resetMatch: "RESET / NEW MATCH", schedule: "SCHEDULE MATCH", deleteCourt: "DELETE COURT", zoneOccupied: "ZONE OCCUPIED!", create: "SEND REQUEST", courtName: "COURT NAME", player: "PLAYER NAME", loggedAs: "LOGGED AS:", localMatch: "LOCAL MATCH", points: "POINTS", games: "GAMES", league: "LEAGUE (NEW)", team1: "TEAM 1", team2: "TEAM 2", goal: "GOAL", confirmDelete: "DELETE?", timeAt: "AT", live: "LIVE", limitReached: "LIMIT OF 3 COURTS REACHED!", addCourt: "ADD SPORTS COURT", addAd: "ADD ADVERTISEMENT", adTitle: "FREE ADVERTISEMENT", adNamePlaceholder: "OBJECT NAME", adDescPlaceholder: "DESCRIPTION (MAX 20 WORDS)", adShareBtn: "SHARE TO ACTIVATE (24h)", shareMsg: "Check live sports results on Maplay map!" }
        };

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); updateUILanguage(); if(document.getElementById('lang-modal').style.display === 'flex') toggleLangModal(); renderMarkers(); }
        function updateUILanguage() { const t = translations[currentLang]; document.getElementById('txt-subtitle').innerText = t.subtitle; document.getElementById('btn-login').innerText = t.login; document.getElementById('btn-explore').innerText = t.explore; document.getElementById('city-search').placeholder = t.search; document.getElementById('txt-period-res').innerText = t.periodRes; document.getElementById('adm-name').innerText = t.adminTitle; document.getElementById('btn-save-period').innerText = t.savePeriod; document.getElementById('start-live-btn').innerText = t.goLive; document.getElementById('end-match-btn').innerText = t.endMatch; document.getElementById('reset-match-btn').innerText = t.resetMatch; document.getElementById('btn-schedule').innerText = t.schedule; document.getElementById('btn-delete-court').innerText = t.deleteCourt; document.getElementById('adm-league-input').placeholder = t.league; document.getElementById('h-lang-sr').classList.toggle('active', currentLang === 'sr'); document.getElementById('h-lang-en').classList.toggle('active', currentLang === 'en'); if(auth.currentUser) document.getElementById('user-indicator').innerText = `${t.loggedAs} ${auth.currentUser.email}`; }
        function toggleLangModal() { let m = document.getElementById('lang-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); updateUILanguage(); }
        function goBackToLogin() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); else updateUILanguage(); });

        function initMap() {
            if (map) return;
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: 'white', weight: 1, fillOpacity: 0.03, interactive: false, className: 'animated-range-circle' }).addTo(map);
            map.on('move', () => { let c = map.getCenter(); rangeCircle.setLatLng(c); });
            map.on('moveend', () => { let c = map.getCenter(); localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); renderMarkers(); });
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => allTereni.push({...c.val(), key: c.key})); renderMarkers(); });
            db.ref('oglasi').on('value', snap => { allAds = []; snap.forEach(c => allAds.push({...c.val(), key: c.key})); renderMarkers(); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;
            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 30000) return;
                const ball = sportEmojis[d.sport] || '⚽';
                const html = `<div class="sport-marker-wrapper ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div><div class="live-card-thin">${d.name}</div><div class="marker-pointer"></div></div></div>`;
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className:'', html, iconSize:[0,0] }) }).addTo(map).on('click', () => { if(auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); });
            });
            allAds.forEach(a => {
                if (a.pending) return;
                const icon = adEmojis[a.type] || '🏢';
                const html = `<div class="sport-marker-wrapper ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="ad-ball-only">${icon}</div><div class="ad-marker-full">${a.name}</div><div class="marker-pointer" style="border-top-color:#ffcc00;"></div></div></div>`;
                L.marker([a.lat, a.lng], { icon: L.divIcon({ className:'', html, iconSize:[0,0] }) }).addTo(map);
            });
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const t = translations[currentLang]; 
            if (allTereni.some(c => L.latLng(c.lat, c.lng).distanceTo(e.latlng) < 100)) { alert(t.zoneOccupied); return; }
            const h = `<div class="choice-container"><div class="choice-section-title">${t.addAd}</div><div class="ad-choice-grid"><div class="ad-type-btn" onclick="openAdFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'CAFFE')"><span>☕</span><div class="ad-type-label">CAFFE</div></div><div class="ad-type-btn" onclick="openAdFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'RESTORAN')"><span>🍴</span><div class="ad-type-label">RESTORAN</div></div><div class="ad-type-btn" onclick="openAdFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'FIRMA')"><span>🏢</span><div class="ad-type-label">FIRMA</div></div></div><div class="choice-section-title">${t.addCourt}</div><div class="sport-choice-grid"><div class="sport-type-btn" onclick="openTerenFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'FUDBAL')">⚽</div><div class="sport-type-btn" onclick="openTerenFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'KOŠARKA')">🏀</div><div class="sport-type-btn" onclick="openTerenFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'ODBOJKA')">🏐</div><div class="sport-type-btn" onclick="openTerenFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'TENIS')">🎾</div><div class="sport-type-btn" onclick="openTerenFinalForm(${e.latlng.lat}, ${e.latlng.lng}, 'RUKOMET')">🤾</div></div></div>`;
            L.popup().setLatLng(e.latlng).setContent(h).openOn(map); 
        }

        function openAdFinalForm(lat, lng, type) {
            const t = translations[currentLang];
            const h = `<div style="padding:15px; width:280px; display:flex; flex-direction:column; gap:8px; text-align:center; color:white;"><div style="color:#ffcc00; font-weight:900; font-size:14px; margin-bottom:5px;">${t.adTitle} (${type})</div><input type="text" id="ad_name_input" placeholder="${t.adNamePlaceholder}"><textarea id="ad_desc_input" placeholder="${t.adDescPlaceholder}" rows="2"></textarea><button onclick="handleShareForAd(${lat}, ${lng}, '${type}')" class="share-ad-btn"><img src="https://cdn-icons-png.flaticon.com/512/2958/2958783.png"> ${t.adShareBtn}</button></div>`;
            L.popup().setLatLng([lat, lng]).setContent(h).openOn(map);
        }

        async function handleShareForAd(lat, lng, type) {
            const t = translations[currentLang];
            const name = document.getElementById('ad_name_input').value.toUpperCase();
            if(!name) return;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'MAPLAY',
                        text: t.shareMsg,
                        url: window.location.href
                    });
                    processAd(lat, lng, type, name);
                } catch (err) {
                    console.log("Share cancelled or failed");
                }
            } else {
                alert(currentLang === 'sr' ? "Vaš pretraživač ne podržava automatsko deljenje, ali oglas će biti poslat na proveru." : "Your browser doesn't support automatic sharing, but the ad will be sent for review.");
                processAd(lat, lng, type, name);
            }
        }

        function processAd(lat, lng, type, name) {
            db.ref('oglasi').push({ 
                name: name, 
                lat, lng, type, 
                owner: auth.currentUser.uid, 
                pending: true,
                expiresAt: Date.now() + 86400000 // 24h
            }).then(() => { 
                alert(currentLang === 'sr' ? 'USPEŠNO! OGLAS ĆE BITI VIDLJIV NAKON PROVERE.' : 'SUCCESS! AD WILL BE VISIBLE AFTER REVIEW.'); 
                map.closePopup(); 
            });
        }

        function openTerenFinalForm(lat, lng, sport) {
            const t = translations[currentLang];
            const h = `<div style="padding:15px; text-align:center;"><input type="text" id="p_name" placeholder="${t.courtName}"><button onclick="saveTeren(${lat}, ${lng}, '${sport}')" style="background:#ff3b30; color:white; width:100%; padding:12px; border-radius:12px; border:none;">${t.create}</button></div>`;
            L.popup().setLatLng([lat, lng]).setContent(h).openOn(map);
        }

        async function saveTeren(lat, lng, sport) {
            const n = document.getElementById('p_name').value.toUpperCase(); if(!n) return;
            await db.ref('tereni').push({ name: n, lat, lng, sport, owner: auth.currentUser.uid, status: 'upcoming', score1:0, score2:0 });
            map.closePopup();
        }

        function trackGPS() { if(navigator.geolocation) navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } } }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function openAdmin(key) { currentAdminKey = key; document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
    </script>
</body>
</html>
