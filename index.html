<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Rezultati Uživo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff3b30;
            --bg-light: #f4f4f4;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg-light); font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; 
            background: #fff; color: #111; border: 1px solid #ddd; 
            padding: 14px; border-radius: 14px; font-family: 'Inter'; width: 100%;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }
        
        button { font-size: 16px !important; outline: none !important; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.9; }

        /* SEARCH KAO NA SLICI */
        #search-container { 
            position: absolute; top: 20px; left: 20px; z-index: 5000; 
            display: flex; align-items: center; transition: all 0.4s ease; 
            width: 50px; height: 50px; background: var(--glass); 
            border-radius: 25px; backdrop-filter: blur(15px); overflow: hidden; 
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.5); 
        }
        #search-container.expanded { width: calc(100% - 100px); border: 1px solid var(--primary); }
        #city-search { width: 100%; border: none; background: transparent; color: #111; padding: 12px 15px 12px 50px; font-size: 16px; opacity: 0; }
        #search-container.expanded #city-search { opacity: 1; }
        .search-icon { position: absolute; left: 15px; width: 20px; height: 20px; opacity: 0.6; cursor: pointer; z-index: 5001; }

        /* HERO - REPLIKA SLIKE */
        #hero { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 59, 48, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 59, 48, 0.05) 0px, transparent 50%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; padding: 20px;
        }
        .hero-logo { 
            font-family: 'Permanent Marker', cursive; 
            font-size: clamp(60px, 15vw, 90px); 
            color: var(--primary); text-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            margin-bottom: 0; text-align: center;
        }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 6px; color: #aaa; margin-bottom: 10px; }
        .hero-tagline { 
            font-family: 'Oswald'; font-weight: 900; font-size: 22px; color: #333; 
            text-transform: uppercase; margin-bottom: 40px; letter-spacing: 1px;
        }
        
        .auth-box { 
            background: var(--glass); 
            backdrop-filter: blur(20px); padding: 35px; border-radius: 30px; 
            width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
        }

        .auth-btn { 
            background: var(--primary); 
            color: #fff; border: none; padding: 20px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; border-radius: 16px; font-family: 'Oswald'; 
            font-size: 18px !important; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3);
        }

        .home-lang-switch { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .home-lang-btn { background: #eee; border: none; color: #999; padding: 10px 20px; border-radius: 10px; font-size: 11px; font-weight: 900; cursor: pointer; }
        .home-lang-btn.active { color: white; background: #333; }

        /* MAPA I KONTROLE */
        #map { width: 100vw; height: 100vh; background: #eee; display: none; }
        
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 60px; height: 60px; background: white; border-radius: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.05); }
        .location-btn img { width: 24px; opacity: 0.8; }
        
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 50px; height: 50px; background: var(--glass); border-radius: 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow); color: #111; font-size: 20px; }
        .settings-btn { position: absolute; top: 80px; right: 20px; z-index: 5500; width: 50px; height: 50px; background: var(--glass); border-radius: 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow); }
        .settings-btn img { width: 22px; opacity: 0.7; }

        /* MARKERI - REPLIKA "LIVE" KARTICE SA SLIKE */
        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }

        .marker-ball-only { 
            font-size: 20px; padding: 10px; background: white; border-radius: 50%; 
            box-shadow: var(--shadow); border: 2px solid white; display: block;
        }
        .zoom-near .marker-ball-only { display: none; }

        .live-card-thin { 
            background: white; border-radius: 18px; padding: 12px 16px; 
            display: none; flex-direction: column; width: max-content; min-width: 170px; 
            color: #111; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.05);
        }
        .zoom-near .live-card-thin { display: flex; }
        
        .status-live-wrapper .live-card-thin { border-top: 4px solid var(--primary); }
        .live-tag { background: var(--primary); color: white; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 5px; position: absolute; right: 10px; top: 10px; animation: soft-blink 2s infinite; }

        .card-league-mini { font-size: 9px; color: #999; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 4px; }
        .team-name-col { font-size: 14px; font-weight: 700; color: #333; }
        .score-val-col { font-family: 'Oswald'; font-size: 20px; color: var(--primary); font-weight: 700; }
        
        .marker-pointer { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 12px solid white; margin-top: -1px; display: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .zoom-near .marker-pointer { display: block; }

        /* MATCH DETAILS - MODERN BOTTOM SHEET */
        #match-details-view { 
            position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 92vh; 
            background: white; z-index: 8000; border-radius: 35px 35px 0 0; 
            padding: 30px 20px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 -20px 50px rgba(0,0,0,0.15); overflow-y: auto; 
        }
        #match-details-view.active { bottom: 0; }
        .details-handle { width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; }
        
        .details-main-box { background: #f9f9f9; border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 25px; }
        .details-score-line { font-family: 'Oswald'; font-size: 55px; color: var(--primary); margin: 10px 0; font-weight: 700; }

        /* ADMIN PANEL */
        #admin-panel { 
            position: fixed; right: -100%; top: 0; width: 100%; height: 100%; 
            background: white; z-index: 7000; transition: 0.5s; padding: 30px; 
            display: flex; flex-direction: column; 
        }
        #admin-panel.active { right: 0; }
        .admin-btn { padding: 16px; border: none; font-weight: 900; color: white; border-radius: 14px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 10px; }

        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .user-location-dot { background: #007AFF; width: 16px; height: 16px; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(0,122,255,0.5); }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">Result Tracker</div>
        <div class="hero-tagline" id="txt-tagline">CONNECTING LOCAL SPORT</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">ULAZ U SISTEM</button>
            <button id="btn-explore" onclick="exploreMap()" style="background:none; border:none; color:#888; cursor:pointer; font-weight:bold; margin-top:10px; text-decoration: underline; font-size:12px;">ISTRAŽI MAPU</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">SRB</div>
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">ENG</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    
    <div id="ui-controls" style="display:none;">
        <div id="search-container">
            <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()">
            <input type="text" id="city-search" placeholder="Pretraži..." onkeypress="handleSearch(event)">
        </div>
        <div class="back-btn" onclick="goBackToLogin()">&#10006;</div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
    </div>

    <div id="lang-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); backdrop-filter:blur(5px); z-index:9000; display:none; justify-content:center; align-items:center;" onclick="toggleLangModal()">
        <div class="auth-box" style="max-width:300px; text-align:center;" onclick="event.stopPropagation()">
            <h3 id="lang-title" style="margin-top:0;">JEZIK / LANGUAGE</h3>
            <button class="admin-btn" style="background:#333;" onclick="setLanguage('sr')">SRPSKI</button>
            <button class="admin-btn" style="background:#333;" onclick="setLanguage('en')">ENGLISH</button>
        </div>
    </div>

    <div id="match-details-view">
        <div class="details-handle"></div>
        <div class="details-header" style="text-align:center; position:relative;">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:-10px; font-size:30px; color:#ddd; cursor:pointer;">&times;</div>
            <span id="det-league" class="details-league" style="color:var(--primary); font-weight:900; letter-spacing:1px; font-size:12px; text-transform:uppercase;"></span><br>
            <span id="det-time" style="color:#aaa; font-size:11px;"></span>
        </div>
        <div class="details-main-box">
            <div id="det-t1" style="font-size:22px; font-weight:900;"></div>
            <div id="det-score" class="details-score-line"></div>
            <div id="det-t2" style="font-size:22px; font-weight:900;"></div>
            <div id="det-extra-info" style="color:var(--primary); font-weight:700; margin-top:10px;"></div>
        </div>
        <div style="padding:0 10px;">
            <span class="details-section-title" id="txt-period-res" style="font-size:11px; font-weight:900; color:#ccc; text-transform:uppercase;">Rezultat po periodima</span>
            <div id="det-periods" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;"></div>
            <div id="det-stats-container">
                <span class="details-section-title" id="txt-match-events" style="font-size:11px; font-weight:900; color:#ccc; text-transform:uppercase;">Događaji</span>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                    <div id="det-events-home"></div>
                    <div id="det-events-away" style="text-align:right;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#111;">ADMIN</div>
            <div onclick="closeAdmin()" style="font-size:40px; color:#ddd; cursor:pointer;">&times;</div>
        </div>
        <div id="adm-score-view">
            <div style="background:#f9f9f9; border-radius:20px; padding:30px; text-align:center; margin-bottom:20px;">
                <div id="adm-main-score" style="font-size:60px; font-family:'Oswald'; color:var(--primary); font-weight:700;">0 : 0</div>
                <div id="adm-sub-display" style="color:#999; font-weight:700; font-size:14px;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            <div id="adm-events-manager"></div>
            <button class="admin-btn" style="background:#eee; color:#333;" onclick="triggerLogic('period')" id="btn-save-period">SAČUVAJ PERIOD</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:var(--primary); display:none;" onclick="triggerLogic('end')">ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#ff9500; display:none;" onclick="resetMatch()">NOVI MEČ</button>
        </div>
        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LIGA" list="league-list">
            <input type="text" id="adm-t1" placeholder="TIM 1">
            <input type="text" id="adm-t2" placeholder="TIM 2">
            <input type="datetime-local" id="adm-time">
            <button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()" id="btn-schedule">ZAKAŽI MEČ</button>
        </div>
        <button style="background:none; border:none; color:#ccc; margin-top:auto; padding:20px; font-weight:700;" onclick="adminDelete()" id="btn-delete-court">OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // FIREBASE I LOGIKA - SVE ZADRŽANO I UNAPREĐENO
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [];
        let currentLang = localStorage.getItem('lang') || 'en';
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        const translations = {
            sr: { 
                subtitle: "Result Tracker", login: "ULAZ U SISTEM", explore: "ISTRAŽI MAPU", search: "Pretraži...", periodRes: "Rezultat po periodima", matchEvents: "Događaji na meču", adminTitle: "ADMIN TABLA", savePeriod: "SAČUVAJ PERIOD / SET", goLive: "KRENI UŽIVO", endMatch: "ZAVRŠI MEČ", resetMatch: "RESET / NOVI MEČ", schedule: "ZAKAŽI MEČ", deleteCourt: "OBRIŠI TEREN", zoneOccupied: "ZONA ZAUZETA!", create: "KRENI", courtName: "NAZIV TERENA", player: "IME IGRAČA", team: "TIM", loggedAs: "ULOGOVAN:", localMatch: "LOKALNI MEČ", points: "POENI", games: "GEMOVI", league: "LIGA", team1: "TIM 1", team2: "TIM 2", goal: "GOL", yellow: "ŽUTI", red: "CRVENI", confirmDelete: "OBRISATI?", timeAt: "U", live: "UŽIVO", limitReached: "LIMIT OD 3 TERENA!", addCourt: "DODAJ TEREN", 
                sports: { FUDBAL: "FUDBAL", KOŠARKA: "KOŠARKA", ODBOJKA: "ODBOJKA", TENIS: "TENIS", RUKOMET: "RUKOMET" },
                periods: { FUDBAL: ["1.POL", "2.POL", "PROD 1", "PROD 2", "PENALI"], KOŠARKA: ["Q1", "Q2", "Q3", "Q4", "PROD"], ODBOJKA: ["S1", "S2", "S3", "S4", "S5"], RUKOMET: ["1.POL", "2.POL", "PROD 1", "PROD 2", "PENALI"], TENIS: ["S1", "S2", "S3", "S4", "S5"] } 
            },
            en: { 
                subtitle: "Result Tracker", login: "ENTER SYSTEM", explore: "EXPLORE MAP", search: "Search...", periodRes: "Period Results", matchEvents: "Match Events", adminTitle: "ADMIN PANEL", savePeriod: "SAVE PERIOD / SET", goLive: "GO LIVE", endMatch: "END MATCH", resetMatch: "RESET / NEW MATCH", schedule: "SCHEDULE MATCH", deleteCourt: "DELETE COURT", zoneOccupied: "ZONE OCCUPIED!", create: "CREATE", courtName: "COURT NAME", player: "PLAYER NAME", team: "TEAM", loggedAs: "LOGGED:", localMatch: "LOCAL MATCH", points: "POINTS", games: "GAMES", league: "LEAGUE", team1: "TEAM 1", team2: "TEAM 2", goal: "GOAL", yellow: "YELLOW", red: "RED", confirmDelete: "DELETE?", timeAt: "AT", live: "LIVE", limitReached: "LIMIT OF 3 COURTS!", addCourt: "ADD COURT", 
                sports: { FUDBAL: "FOOTBALL", KOŠARKA: "BASKETBALL", ODBOJKA: "VOLLEYBALL", TENIS: "TENNIS", RUKOMET: "HANDBALL" },
                periods: { FUDBAL: ["1ST H", "2ND H", "ET 1", "ET 2", "PEN"], KOŠARKA: ["Q1", "Q2", "Q3", "Q4", "OT"], ODBOJKA: ["S1", "S2", "S3", "S4", "S5"], RUKOMET: ["1ST H", "2ND H", "ET 1", "ET 2", "PEN"], TENIS: ["S1", "S2", "S3", "S4", "S5"] } 
            }
        };

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); updateUILanguage(); if(document.getElementById('lang-modal').style.display === 'flex') toggleLangModal(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); renderMarkers(); }
        
        function updateUILanguage() { 
            const t = translations[currentLang]; 
            document.getElementById('txt-subtitle').innerText = t.subtitle; 
            document.getElementById('btn-login').innerText = t.login; 
            document.getElementById('btn-explore').innerText = t.explore; 
            document.getElementById('city-search').placeholder = t.search; 
            document.getElementById('txt-period-res').innerText = t.periodRes; 
            document.getElementById('txt-match-events').innerText = t.matchEvents; 
            document.getElementById('adm-name').innerText = t.adminTitle; 
            document.getElementById('btn-save-period').innerText = t.savePeriod; 
            document.getElementById('start-live-btn').innerText = t.goLive; 
            document.getElementById('end-match-btn').innerText = t.endMatch; 
            document.getElementById('reset-match-btn').innerText = t.resetMatch; 
            document.getElementById('btn-schedule').innerText = t.schedule; 
            document.getElementById('btn-delete-court').innerText = t.deleteCourt; 
            document.getElementById('adm-league-input').placeholder = t.league; 
            document.getElementById('adm-t1').placeholder = t.team1; 
            document.getElementById('adm-t2').placeholder = t.team2; 
            document.getElementById('h-lang-sr').classList.toggle('active', currentLang === 'sr'); 
            document.getElementById('h-lang-en').classList.toggle('active', currentLang === 'en'); 
        }

        function toggleLangModal() { let m = document.getElementById('lang-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        
        function exploreMap() { 
            document.getElementById('hero').style.display = 'none'; 
            document.getElementById('map').style.display = 'block'; 
            document.getElementById('ui-controls').style.display = 'block'; 
            initMap(); updateUILanguage(); 
        }

        function goBackToLogin() { auth.signOut(); location.reload(); }
        
        auth.onAuthStateChanged(user => { if (user) exploreMap(); else updateUILanguage(); });

        function initMap() {
            if (map) return;
            // Personalizacija: Pamćenje lokacije
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            
            // Profi mapa kao na slici (Svetlija i čistija)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            map.on('moveend', () => { 
                let c = map.getCenter(); 
                localStorage.setItem('lastLat', c.lat); 
                localStorage.setItem('lastLng', c.lng); 
                localStorage.setItem('lastZoom', map.getZoom()); 
                renderMarkers(); 
            });
            
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { 
                allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); 
                renderMarkers(); 
                if(currentAdminKey) refreshAdminPanel(currentAdminKey); 
            });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;
            
            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 50000) return;
                const isLive = d.status === 'live', isEnded = d.status === 'ended', isUpcoming = d.status === 'upcoming' && d.t1;
                const ball = sportEmojis[d.sport] || '⚽';
                
                let cardBody = "";
                if (isLive || isEnded || isUpcoming) {
                    let s1 = (isLive || isEnded) ? (d.score1 || 0) : "-";
                    let s2 = (isLive || isEnded) ? (d.score2 || 0) : "-";
                    let liveTag = isLive ? `<div class="live-tag">LIVE</div>` : "";
                    
                    cardBody = `<div class="live-card-thin">
                        ${liveTag}
                        <div class="card-league-mini">${d.league || 'Local'}</div>
                        <div class="score-row"><span class="team-name-col">${d.t1}</span><span class="score-val-col">${s1}</span></div>
                        <div class="score-row"><span class="team-name-col">${d.t2}</span><span class="score-val-col">${s2}</span></div>
                    </div><div class="marker-pointer"></div>`;
                } else {
                    cardBody = `<div class="live-card-thin"><div style="text-align:center; font-weight:800;">${d.name}</div></div><div class="marker-pointer"></div>`;
                }

                const html = `<div class="sport-marker-wrapper ${isLive?'status-live-wrapper':''} ${zoomNear?'zoom-near':''}">
                    <div class="marker-content-box">
                        <div class="marker-ball-only">${ball}</div>
                        ${cardBody}
                    </div>
                </div>`;

                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0], iconAnchor: [0, 0] }) })
                 .addTo(map).on('click', e => { 
                     L.DomEvent.stopPropagation(e); 
                     if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); 
                     else openDetails(d.key); 
                 });
            });
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const t = translations[currentLang]; 
            const isTooClose = allTereni.some(court => L.latLng(court.lat, court.lng).distanceTo(e.latlng) < 100);
            if (isTooClose) { alert(t.zoneOccupied); return; } 
            openTerenForm(e.latlng.lat, e.latlng.lng);
        }

        function openTerenForm(lat, lng) {
            const t = translations[currentLang];
            const html = `<div style="padding:10px; min-width:200px;">
                <select id="p_sport" style="margin-bottom:10px;">
                    <option value="FUDBAL">${t.sports.FUDBAL}</option>
                    <option value="KOŠARKA">${t.sports.KOŠARKA}</option>
                    <option value="ODBOJKA">${t.sports.ODBOJKA}</option>
                    <option value="TENIS">${t.sports.TENIS}</option>
                    <option value="RUKOMET">${t.sports.RUKOMET}</option>
                </select>
                <input type="text" id="p_name" placeholder="${t.courtName}" maxlength="15" style="margin-bottom:10px;">
                <button onclick="saveTeren(${lat}, ${lng})" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; font-weight:bold; border-radius:12px;">${t.create}</button>
            </div>`; 
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        async function saveTeren(lat, lng) { 
            const n = document.getElementById('p_name').value.toUpperCase();
            const myCourts = allTereni.filter(t => t.owner === auth.currentUser.uid);
            if (myCourts.length >= 3) { alert(translations[currentLang].limitReached); return; }
            await db.ref('tereni').push({ name: n, lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0 }); 
            map.closePopup(); 
        }

        function openDetails(key) { 
            const d = allTereni.find(x => x.key === key); if(!d) return; 
            const t = translations[currentLang];
            document.getElementById('det-league').innerText = d.league || t.localMatch; 
            document.getElementById('det-time').innerText = d.match_time ? new Date(d.match_time).toLocaleString() : ""; 
            document.getElementById('det-t1').innerText = d.t1 || t.team1; 
            document.getElementById('det-t2').innerText = d.t2 || t.team2; 
            document.getElementById('det-score').innerText = `${d.score1||0} : ${d.score2||0}`; 
            
            let pDiv = document.getElementById('det-periods'); pDiv.innerHTML = ""; 
            if(d.sub_details) { Object.values(d.sub_details).forEach(v => { pDiv.innerHTML += `<div style="background:#f0f0f0; padding:10px; border-radius:10px; font-size:12px; font-weight:700;">${v}</div>`; }); }
            document.getElementById('match-details-view').classList.add('active'); 
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }

        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            const t = translations[currentLang];
            document.getElementById('adm-name').innerText = d.name;
            document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            
            const ctrl = document.getElementById('adm-sport-controls'); ctrl.innerHTML = "";
            ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button class="admin-btn" style="background:var(--primary);" onclick="proScore(1,1)">+ ${d.t1 || 'T1'}</button>
                    <button class="admin-btn" style="background:#eee; color:#333;" onclick="proScore(1,-1)">-</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button class="admin-btn" style="background:var(--primary);" onclick="proScore(2,1)">+ ${d.t2 || 'T2'}</button>
                    <button class="admin-btn" style="background:#eee; color:#333;" onclick="proScore(2,-1)">-</button>
                </div>
            </div>`;

            if(d.t1) {
                document.getElementById('adm-score-view').style.display = 'block';
                document.getElementById('match-setup').style.display = 'none';
                document.getElementById('start-live-btn').style.display = d.status==='upcoming' ? 'block' : 'none';
                document.getElementById('end-match-btn').style.display = d.status==='live' ? 'block' : 'none';
                document.getElementById('reset-match-btn').style.display = d.status==='ended' ? 'block' : 'none';
            } else {
                document.getElementById('adm-score-view').style.display = 'none';
                document.getElementById('match-setup').style.display = 'flex';
            }
        }

        function proScore(team, sign) {
            const d = allTereni.find(x => x.key === currentAdminKey);
            if(!d || d.status !== 'live') return;
            db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: Math.max(0, (d[`score${team}`] || 0) + sign) });
        }

        async function setupMatch() {
            let l = document.getElementById('adm-league-input').value.toUpperCase(),
                t1 = document.getElementById('adm-t1').value.toUpperCase(),
                t2 = document.getElementById('adm-t2').value.toUpperCase(),
                time = document.getElementById('adm-time').value;
            if(!t1 || !t2) return;
            await db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0 });
        }

        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm(translations[currentLang].confirmDelete)) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        function resetMatch() { db.ref(`tereni/${currentAdminKey}`).update({ t1: null, t2: null, status: 'upcoming', score1: 0, score2: 0, sub_details: null }); }
        
        function trackGPS() {
            if(!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                currentLat = pos.coords.latitude; currentLon = pos.coords.longitude;
                if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [16, 16] }) }).addTo(map);
                else userMarker.setLatLng([currentLat, currentLon]);
            }, null, { enableHighAccuracy: true });
        }

        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 16); }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function handleSearch(e) { if(e.key === "Enter") { fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) { map.flyTo([data[0].lat, data[0].lon], 15); toggleSearch(); } }); } }
        async function handleAuth() {
            let e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } }
        }
        
        // Dodatna logika za trigger i periode (zadržana iz originala)
        function triggerLogic(type) {
            const d = allTereni.find(x => x.key === currentAdminKey);
            if(type === 'period') {
                let sub = d.sub_details || {};
                let n = Object.keys(sub).length;
                sub["P"+n] = `P${n+1} ${d.score1}:${d.score2}`;
                db.ref(`tereni/${currentAdminKey}`).update({ sub_details: sub });
            } else if(type === 'end') db.ref(`tereni/${currentAdminKey}`).update({ status: 'ended' });
        }
    </script>
</body>
</html>
