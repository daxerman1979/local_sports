<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>MAPLAY - Connecting Local Sports</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; position: fixed; }
        
        input, select, textarea, datalist { 
            font-size: 16px !important; outline: none !important; text-transform: uppercase; 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; width: 100%;
        }
        
        button { font-size: 16px !important; outline: none !important; transition: transform 0.1s active, opacity 0.2s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        #search-container { position: absolute; top: 20px; left: 20px; z-index: 5000; display: flex; align-items: center; transition: all 0.4s ease; width: 40px; height: 40px; background: rgba(0,0,0,0.4); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #search-container.expanded { width: calc(100% - 80px); background: rgba(0,0,0,0.9); border: 1px solid #ffcc00; }
        #city-search { width: 100%; border: none; background: transparent; color: white; padding: 12px 15px 12px 40px; font-size: 16px; outline: none; opacity: 0; transition: 0.3s; pointer-events: none; }
        #search-container.expanded #city-search { opacity: 1; pointer-events: all; }
        .search-icon { position: absolute; left: 10px; width: 20px; height: 20px; filter: brightness(0) invert(1); opacity: 0.8; cursor: pointer; z-index: 5001; }

        #hero { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1500&auto=format&fit=crop') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; color: white; padding: 20px; }
        .hero-logo { font-family: 'Permanent Marker', cursive; font-size: 82px; color: #ffcc00; text-shadow: 6px 6px 0px #000; transform: rotate(-1deg); margin-bottom: 0; letter-spacing: -2px; }
        .hero-subtitle { font-family: 'Oswald'; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #fff; margin-bottom: 40px; background: rgba(255,59,48,0.9); padding: 4px 15px; border-radius: 4px; }
        .auth-box { background: rgba(0,0,0,0.85); backdrop-filter: blur(30px); padding: 40px 30px; border-radius: 35px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,204,0,0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-btn { background: #ffcc00; color: #000; border: none; padding: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 15px; font-family: 'Oswald'; font-size: 18px !important; transition: 0.3s; }
        
        .home-lang-switch { display: flex; gap: 20px; justify-content: center; margin-top: 5px; }
        .home-lang-btn { opacity: 0.5; filter: grayscale(1); cursor: pointer; transition: 0.3s; font-size: 24px; }
        .home-lang-btn.active { opacity: 1; filter: grayscale(0); transform: scale(1.2); }

        #map { width: 100vw; height: 100vh; background: #111; display: none; }
        .location-btn { position: absolute; bottom: 40px; right: 20px; z-index: 5500; width: 55px; height: 55px; background: #ffcc00; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 2px solid #000; }
        .location-btn img { width: 24px; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .settings-btn { position: absolute; top: 70px; right: 20px; z-index: 5500; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .settings-btn img { width: 20px; filter: invert(1); }

        #lang-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9000; display: none; justify-content: center; align-items: center; }
        .lang-box { background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid #ffcc00; width: 85%; max-width: 300px; text-align: center; }

        .sport-marker-wrapper { display: flex; flex-direction: column; align-items: center; width: auto; position: relative; }
        .marker-content-box { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .marker-content-box > * { pointer-events: auto; }
        .marker-ball-only { font-size: 18px; filter: drop-shadow(0 0 5px #ffcc00); display: block; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 50%; border: 1px solid #ffcc00; }
        .zoom-near .marker-ball-only { display: none; }
        .marker-pointer { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 12px solid #ffcc00; display: none; z-index: 10; margin-top: -2px; }
        .zoom-near .marker-pointer { display: block; }

        .live-card-thin { 
            background: linear-gradient(145deg, #111, #000); border: 2px solid #ffcc00; border-radius: 12px; padding: 8px 12px; display: none; flex-direction: column; width: max-content; min-width: 160px; color: white; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.9); position: relative; overflow: hidden; z-index: 25;
        }
        .zoom-near .live-card-thin { display: flex; }
        .card-league-mini { font-size: 9px; color: #ffcc00; font-weight: 900; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 2px; }
        .team-name-col { font-size: 14px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .score-val-col { font-family: 'Oswald'; font-size: 20px; color: #ffcc00; font-weight: 700; }
        .blink-live { animation: soft-blink 2s infinite; font-weight: 900; }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* PRO MATCH DETAILS VIEW REDESIGN */
        #match-details-view { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 92vh; background: #080808; z-index: 8000; border-top: 5px solid #ffcc00; border-radius: 40px 40px 0 0; padding: 25px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); overflow-y: auto; color: white; box-shadow: 0 -20px 60px rgba(0,0,0,0.8); }
        #match-details-view.active { bottom: 0; }
        
        .details-header { text-align: center; margin-bottom: 25px; }
        .details-league { color: #ffcc00; font-weight: 900; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .details-time-full { color: #555; font-weight: 800; font-size: 11px; }

        .pro-score-board { background: linear-gradient(180deg, #121212 0%, #000 100%); border-radius: 30px; padding: 30px 15px; border: 1px solid #222; display: flex; align-items: center; justify-content: space-around; margin-bottom: 25px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .pro-team-box { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .pro-team-name { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1.1; max-width: 110px; }
        .pro-score-display { font-family: 'Oswald'; font-size: 64px; color: #ffcc00; line-height: 1; text-shadow: 0 0 20px rgba(255,204,0,0.2); }
        .pro-score-divider { font-family: 'Oswald'; font-size: 32px; color: #333; margin: 0 10px; }
        
        .pro-extra-info { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 900; color: #ff3b30; }

        .section-divider { border-top: 1px solid #1a1a1a; margin: 25px 0; position: relative; }
        .section-label { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #080808; padding: 0 15px; color: #444; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* PERIODS GRID */
        .pro-periods-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .pro-period-pill { background: #151515; border: 1px solid #222; padding: 12px 18px; border-radius: 15px; text-align: center; min-width: 80px; transition: 0.3s; animation: slideIn 0.5s ease-out backwards; }
        .pro-period-label { font-size: 9px; color: #ffcc00; font-weight: 900; display: block; margin-bottom: 3px; }
        .pro-period-value { font-family: 'Oswald'; font-size: 18px; color: #fff; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* EVENTS TIMELINE */
        .pro-events-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .pro-event-item { display: flex; align-items: center; gap: 15px; animation: fadeIn 0.4s ease-in; }
        .pro-event-item.team-2 { flex-direction: row-reverse; text-align: right; }
        .pro-event-icon { width: 32px; height: 32px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #222; font-size: 16px; flex-shrink: 0; }
        .pro-event-player { font-weight: 800; font-size: 15px; text-transform: uppercase; color: #ddd; }
        .pro-event-marker { width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; }

        #admin-panel { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0a0a; z-index: 7000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #admin-panel.active { left: 0; }
        .admin-btn { padding: 12px; border: none; font-weight: 900; color: white; text-transform: uppercase; width: 100%; border-radius: 12px; cursor: pointer; font-family: 'Oswald'; margin-bottom: 8px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="hero">
        <div class="hero-logo">MAPLAY</div>
        <div class="hero-subtitle" id="txt-subtitle">CONNECTING LOCAL SPORTS</div>
        <div class="auth-box">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="auth-btn" id="btn-login" onclick="handleAuth()">LOGIN / ULAZ</button>
            <div class="home-lang-switch">
                <div class="home-lang-btn" id="h-lang-en" onclick="setLanguage('en')">🇺🇸</div>
                <div class="home-lang-btn" id="h-lang-sr" onclick="setLanguage('sr')">RS</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="ui-controls" style="display:none;">
        <div id="search-container"><img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon" onclick="toggleSearch()"><input type="text" id="city-search" placeholder="Search..." onkeypress="handleSearch(event)"></div>
        <div class="back-btn" onclick="goBackToLogin()">&#10006;</div>
        <div class="settings-btn" onclick="toggleLangModal()"><img src="https://cdn-icons-png.flaticon.com/512/126/126472.png"></div>
        <div class="location-btn" onclick="goToMyLocation()"><img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png"></div>
        <div id="user-indicator" style="position: absolute; bottom: 10px; left: 10px; color: #555; font-size: 9px; font-weight: 900; z-index: 5000; text-transform: uppercase;"></div>
    </div>

    <div id="lang-modal" onclick="toggleLangModal()">
        <div class="lang-box" onclick="event.stopPropagation()">
            <h3 style="color:white; margin-bottom:20px; font-family:'Oswald';" id="lang-title">LANGUAGE / JEZIK</h3>
            <button class="admin-btn" style="background:#1a1a1a; margin-bottom:10px; border: 1px solid #333;" onclick="setLanguage('sr')">SRPSKI</button>
            <button class="admin-btn" style="background:#1a1a1a; border: 1px solid #333;" onclick="setLanguage('en')">ENGLISH</button>
        </div>
    </div>

    <div id="match-details-view">
        <div class="details-header">
            <div onclick="closeDetails()" style="position:absolute; right:0; top:-10px; font-size:40px; color:#ffcc00; cursor:pointer; font-weight:100;">&times;</div>
            <span id="det-league" class="details-league"></span>
            <span id="det-time" class="details-time-full"></span>
        </div>

        <div class="pro-score-board">
            <div class="pro-team-box">
                <div id="det-t1" class="pro-team-name">TEAM 1</div>
            </div>
            <div style="display:flex; align-items:center;">
                <span id="det-s1" class="pro-score-display">0</span>
                <span class="pro-score-divider">:</span>
                <span id="det-s2" class="pro-score-display">0</span>
            </div>
            <div class="pro-team-box">
                <div id="det-t2" class="pro-team-name">TEAM 2</div>
            </div>
            <div id="det-extra-info" class="pro-extra-info"></div>
        </div>

        <div class="section-divider"><span class="section-label">PERIODS / REZULTAT</span></div>
        <div id="det-periods" class="pro-periods-container"></div>

        <div id="det-stats-container" style="display:none;">
            <div class="section-divider"><span class="section-label">EVENTS / DOGAĐAJI</span></div>
            <div id="det-events-list" class="pro-events-list"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;"><div id="adm-name" style="font-family:'Oswald'; font-size:24px; color:#fff;">ADMIN PANEL</div><div onclick="closeAdmin()" style="font-size:40px; color:#ffcc00; cursor:pointer;">&times;</div></div>
        <div id="adm-score-view" style="display:none; flex-direction:column;">
            <div style="background:#151515; border:1px solid #ffcc00; border-radius:20px; padding:20px; text-align:center; margin-bottom:15px;">
                <div id="adm-main-score" style="font-size:55px; font-family:'Oswald'; color:#ffcc00;">0 : 0</div>
                <div id="adm-sub-display" style="color:#fff; font-weight:900; font-family:'Oswald'; margin-top:10px;"></div>
            </div>
            <div id="adm-sport-controls"></div>
            <div id="adm-events-manager" style="margin-bottom:15px; border-top:1px solid #222; padding-top:10px;"></div>
            <button class="admin-btn" style="background:#444;" onclick="triggerLogic('period')" id="btn-save-period">SAVE PERIOD / SET</button>
            <button id="start-live-btn" class="admin-btn" style="background:#007AFF;" onclick="adminStatus('live')">GO LIVE / KRENI UŽIVO</button>
            <button id="end-match-btn" class="admin-btn" style="background:#ff3b30; display:none;" onclick="adminStatus('ended')">END MATCH / ZAVRŠI MEČ</button>
            <button id="reset-match-btn" class="admin-btn" style="background:#ff9500; display:none;" onclick="resetMatch()">RESET / NEW MATCH</button>
        </div>
        <div id="match-setup" style="display:none; flex-direction:column; gap:12px;">
            <input type="text" id="adm-league-input" placeholder="LEAGUE / LIGA">
            <input type="text" id="adm-t1" placeholder="TEAM 1 / TIM 1" maxlength="15">
            <input type="text" id="adm-t2" placeholder="TEAM 2 / TIM 2" maxlength="15">
            <input type="datetime-local" id="adm-time">
            <button class="admin-btn" style="background:#007AFF;" onclick="setupMatch()" id="btn-schedule">SCHEDULE / ZAKAŽI MEČ</button>
        </div>
        <button style="background:none; border:none; color:#333; margin-top:auto; padding:20px; font-weight:bold;" onclick="adminDelete()" id="btn-delete-court">DELETE COURT / OBRIŠI TEREN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyyqnqeS-9jurBX-6VIRp8CiPTMbXkXgw", authDomain: "allsportslocal-ea1d4.firebaseapp.com", databaseURL: "https://allsportslocal-ea1d4-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "allsportslocal-ea1d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let map, userMarker, currentLat, currentLon, currentAdminKey = null, allTereni = [], allAds = [], rangeCircle = null;
        let currentLang = localStorage.getItem('lang') || 'en';
        const sportEmojis = { "FUDBAL": "⚽", "KOŠARKA": "🏀", "ODBOJKA": "🏐", "TENIS": "🎾", "RUKOMET": "🤾" };
        const tennisPoints = ["0", "15", "30", "40", "AD"];

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); updateUILanguage(); location.reload(); }
        function updateUILanguage() { 
            const t = currentLang === 'sr' ? 'USER / KORISNIK:' : 'USER / KORISNIK:';
            if(auth.currentUser) document.getElementById('user-indicator').innerText = `${t} ${auth.currentUser.email}`; 
        }
        function toggleLangModal() { let m = document.getElementById('lang-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function exploreMap() { document.getElementById('hero').style.display = 'none'; document.getElementById('map').style.display = 'block'; document.getElementById('ui-controls').style.display = 'block'; initMap(); updateUILanguage(); }
        auth.onAuthStateChanged(user => { if (user) exploreMap(); });

        function initMap() {
            if (map) return;
            const sLat = localStorage.getItem('lastLat') || 44.7866, sLng = localStorage.getItem('lastLng') || 20.4489, sZoom = localStorage.getItem('lastZoom') || 13;
            map = L.map('map', { zoomControl: false, tap: false }).setView([sLat, sLng], sZoom);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
            rangeCircle = L.circle([sLat, sLng], { radius: 30000, color: '#ffcc00', weight: 1, fillOpacity: 0.03, interactive: false, className: 'animated-range-circle' }).addTo(map);
            map.on('move', () => { let c = map.getCenter(); rangeCircle.setLatLng(c); });
            map.on('moveend', () => { let c = map.getCenter(); localStorage.setItem('lastLat', c.lat); localStorage.setItem('lastLng', c.lng); localStorage.setItem('lastZoom', map.getZoom()); renderMarkers(); });
            map.on('click', handleMapClick);
            db.ref('tereni').on('value', snap => { allTereni = []; snap.forEach(c => { let d = c.val(); d.key = c.key; allTereni.push(d); }); renderMarkers(); if(currentAdminKey) refreshAdminPanel(currentAdminKey); });
            trackGPS();
        }

        function renderMarkers() {
            if (!map) return;
            const center = map.getCenter();
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            const zoomNear = map.getZoom() > 12;
            allTereni.forEach(d => {
                if (map.distance(center, [d.lat, d.lng]) > 30000) return;
                const isLive = d.status === 'live';
                const ball = sportEmojis[d.sport] || '⚽';
                let cardBody = "";
                if (d.t1) {
                    let s1 = (d.status !== 'upcoming') ? (d.score1 || 0) : "";
                    let s2 = (d.status !== 'upcoming') ? (d.score2 || 0) : "";
                    cardBody = `<div class="live-card-thin">${d.league ? `<div class="card-league-mini">${d.league}</div>` : ""}<div class="score-row"><span class="team-name-col">${d.t1}</span><span class="score-val-col">${s1}</span></div><div class="score-row"><span class="team-name-col">${d.t2}</span><span class="score-val-col">${s2}</span></div>${isLive?'<div class="blink-live" style="color:#ff3b30; font-size:8px;">LIVE</div>':''}</div><div class="marker-pointer"></div>`;
                } else cardBody = `<div class="live-card-thin" style="min-width:100px; text-align:center;"><div style="font-size:10px; color:#fff; font-weight:900;">${d.name}</div></div><div class="marker-pointer"></div>`;
                const html = `<div class="sport-marker-wrapper ${zoomNear?'zoom-near':''}"><div class="marker-content-box"><div class="marker-ball-only">${ball}</div>${cardBody}</div></div>`;
                L.marker([d.lat, d.lng], { icon: L.divIcon({ className: '', html, iconSize: [0,0], iconAnchor: [0, 0] }) }).addTo(map).on('click', e => { L.DomEvent.stopPropagation(e); if (auth.currentUser && d.owner === auth.currentUser.uid) openAdmin(d.key); else openDetails(d.key); });
            });
        }

        function openDetails(key) { 
            const d = allTereni.find(x => x.key === key); if(!d) return; 
            document.getElementById('det-league').innerText = d.league || "LOCAL / LOKALNI"; 
            document.getElementById('det-time').innerText = d.match_time ? new Date(d.match_time).toLocaleString() : ""; 
            document.getElementById('det-t1').innerText = d.t1 || "TEAM 1"; 
            document.getElementById('det-t2').innerText = d.t2 || "TEAM 2"; 
            document.getElementById('det-s1').innerText = d.score1 || 0;
            document.getElementById('det-s2').innerText = d.score2 || 0;
            
            let ex = ""; if(d.sport === "ODBOJKA") ex = `${d.p1||0} : ${d.p2||0}`; 
            if(d.sport === "TENIS") { const isTB = (d.g1 === 6 && d.g2 === 6); const pts1 = isTB ? (d.p1||0) : (tennisPoints[d.p1]||"0"); const pts2 = isTB ? (d.p2||0) : (tennisPoints[d.p2]||"0"); ex = `${d.g1||0}:${d.g2||0} (${pts1}:${pts2})`; } 
            document.getElementById('det-extra-info').innerText = ex; 

            let pDiv = document.getElementById('det-periods'); pDiv.innerHTML = ""; 
            if(d.sub_details) { 
                Object.values(d.sub_details).forEach((v, index) => { 
                    const match = v.match(/(.*)\s(\d+:\d+)/);
                    const label = match ? match[1] : "P"+(index+1);
                    const val = match ? match[2] : v;
                    pDiv.innerHTML += `<div class="pro-period-pill" style="animation-delay:${index*0.1}s"><span class="pro-period-label">${label}</span><span class="pro-period-value">${val}</span></div>`; 
                }); 
            }
            
            let evList = document.getElementById('det-events-list'); evList.innerHTML = "";
            if(d.events) { 
                document.getElementById('det-stats-container').style.display = 'block'; 
                Object.values(d.events).forEach(ev => {
                    const side = ev.team == 1 ? 'team-1' : 'team-2';
                    evList.innerHTML += `<div class="pro-event-item ${side}"><div class="pro-event-icon">${ev.emoji}</div><div class="pro-event-player">${ev.player}</div><div class="pro-event-marker"></div></div>`;
                });
            } else document.getElementById('det-stats-container').style.display = 'none'; 
            
            document.getElementById('match-details-view').classList.add('active'); 
        }

        function handleMapClick(e) { 
            if (!auth.currentUser) return; 
            const choiceHtml = `<div style="padding:15px; background:#000; border:1px solid #ffcc00; border-radius:15px;"><button onclick="openTerenForm(${e.latlng.lat}, ${e.latlng.lng})" style="width:100%; background:#ffcc00; color:black; border:none; padding:12px; font-weight:900; border-radius:12px;">COURT / TEREN</button></div>`;
            L.popup().setLatLng(e.latlng).setContent(choiceHtml).openOn(map); 
        }

        function openTerenForm(lat, lng) {
            const html = `<div style="padding:10px; background:#000; border:1px solid #ffcc00; border-radius:15px;"><select id="p_sport"><option value="FUDBAL">FUDBAL</option><option value="KOŠARKA">KOŠARKA</option><option value="ODBOJKA">ODBOJKA</option><option value="TENIS">TENIS</option><option value="RUKOMET">RUKOMET</option></select><input type="text" id="p_name" placeholder="NAME / NAZIV" maxlength="15" style="margin:10px 0;"><button onclick="saveTeren(${lat}, ${lng})" style="width:100%; background:#ffcc00; color:black; border:none; padding:10px; font-weight:900; border-radius:12px;">CREATE</button></div>`; 
            L.popup().setLatLng([lat, lng]).setContent(html).openOn(map);
        }

        function openAdmin(key) { currentAdminKey = key; refreshAdminPanel(key); document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); currentAdminKey = null; }
        function refreshAdminPanel(key) {
            const d = allTereni.find(x => x.key === key); if(!d) return;
            document.getElementById('adm-name').innerText = d.name; document.getElementById('adm-main-score').innerText = `${d.score1 || 0} : ${d.score2 || 0}`;
            const ctrl = document.getElementById('adm-sport-controls'); ctrl.innerHTML = "";
            if(d.sport === "FUDBAL" || d.sport === "RUKOMET") {
                ctrl.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><button class="admin-btn" style="background:#28a745;" onclick="proScore(1,1)">T1 +</button><button class="admin-btn" style="background:#28a745;" onclick="proScore(2,1)">T2 +</button></div>`;
                if(d.sport === "FUDBAL") ctrl.innerHTML += `<div style="margin-top:10px;"><input type="text" id="event-player" placeholder="PLAYER"><select id="event-team"><option value="1">T1</option><option value="2">T2</option></select><button onclick="addEvent('⚽')" class="admin-btn">GOL</button></div>`;
            } else { ctrl.innerHTML = `<button class="admin-btn" onclick="proScore(1,1)">T1 +</button><button class="admin-btn" onclick="proScore(2,1)">T2 +</button>`; }
            document.getElementById('adm-score-view').style.display = d.t1 ? 'flex' : 'none';
            document.getElementById('match-setup').style.display = d.t1 ? 'none' : 'flex';
            document.getElementById('end-match-btn').style.display = d.status === 'live' ? 'block' : 'none';
        }

        function proScore(team, sign) { db.ref(`tereni/${currentAdminKey}`).update({ [`score${team}`]: (allTereni.find(x => x.key === currentAdminKey)[`score${team}`] || 0) + sign }); }
        function addEvent(emoji) { const p = document.getElementById('event-player').value.toUpperCase(), t = document.getElementById('event-team').value; if(p) db.ref(`tereni/${currentAdminKey}/events`).push({ player: p, team: t, emoji: emoji }); }
        function setupMatch() { const l = document.getElementById('adm-league-input').value.toUpperCase(), t1 = document.getElementById('adm-t1').value.toUpperCase(), t2 = document.getElementById('adm-t2').value.toUpperCase(), time = document.getElementById('adm-time').value; db.ref(`tereni/${currentAdminKey}`).update({ league: l, t1, t2, match_time: time, status: 'upcoming', score1: 0, score2: 0 }); }
        function closeDetails() { document.getElementById('match-details-view').classList.remove('active'); }
        function trackGPS() { navigator.geolocation.watchPosition(pos => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; if(!userMarker) userMarker = L.marker([currentLat, currentLon], { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map); else userMarker.setLatLng([currentLat, currentLon]); }); }
        function goToMyLocation() { if(currentLat) map.flyTo([currentLat, currentLon], 18); }
        function handleSearch(e) { if(e.key === "Enter") fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`).then(r => r.json()).then(data => { if(data[0]) map.flyTo([data[0].lat, data[0].lon], 15); }); }
        async function handleAuth() { let e = document.getElementById('email').value.toUpperCase(), p = document.getElementById('password').value; try { await auth.signInWithEmailAndPassword(e, p); } catch { await auth.createUserWithEmailAndPassword(e, p); } }
        async function saveTeren(lat, lng) { await db.ref('tereni').push({ name: document.getElementById('p_name').value.toUpperCase(), lat, lng, owner: auth.currentUser.uid, sport: document.getElementById('p_sport').value, status: 'upcoming', score1: 0, score2: 0 }); map.closePopup(); }
        function adminStatus(s) { db.ref(`tereni/${currentAdminKey}`).update({ status: s }); }
        function adminDelete() { if(confirm("DELETE?")) { db.ref(`tereni/${currentAdminKey}`).remove(); closeAdmin(); } }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('expanded'); }
        function resetMatch() { db.ref(`tereni/${currentAdminKey}`).update({ t1: null, t2: null, status: 'upcoming', score1: 0, score2: 0, sub_details: null, events: null }); }
    </script>
</body>
</html>
